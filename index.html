<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семейный Квест</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Comic Sans MS', cursive; background: #e0f7fa; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 30px; padding: 20px; }
        button { background: #ff9800; border: none; padding: 10px 20px; border-radius: 30px; margin: 5px; cursor: pointer; }
        input { padding: 10px; border-radius: 30px; border: 2px solid #00796b; margin: 5px; }
        .player-card { background: #fff3e0; border-radius: 20px; padding: 10px; margin: 10px 0; display: flex; justify-content: space-between; }
        .chat-area { border-top: 2px solid #ff9800; margin-top: 20px; }
        .messages { height: 150px; overflow-y: auto; background: #f5f5f5; border-radius: 20px; padding: 10px; margin: 10px 0; }
        .loading { text-align: center; padding: 40px; font-size: 18px; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="loading">Загрузка...</div>
</div>

<script>
    // ============== ВАШИ КЛЮЧИ (ПРОВЕРЬ, ЧТО ОНИ ТУТ) ==============
    const SUPABASE_URL = 'https://qyemgoxxlryqezuvmerw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_huHz5Ox00GXUNYW-ncHCRw_RU-49Kn6';
    // =================================================================

    console.log('Скрипт запущен');
    console.log('URL:', SUPABASE_URL);
    
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentPlayer = null;
    let players = [];
    
    async function init() {
        document.getElementById('app').innerHTML = '<div class="loading">Проверка подключения к Supabase...</div>';
        
        // Проверяем подключение
        const { data, error } = await supabase.from('players').select('count');
        console.log('Результат проверки:', data, error);
        
        if (error) {
            document.getElementById('app').innerHTML = `<div class="loading">❌ Ошибка подключения: ${error.message}<br><br>Проверьте:</div>`;
            return;
        }
        
        // Проверяем, есть ли сохранённый игрок
        const savedId = localStorage.getItem('playerId');
        if (savedId) {
            const { data: playerData } = await supabase.from('players').select('*').eq('id', savedId);
            if (playerData && playerData.length > 0) {
                currentPlayer = playerData[0];
            }
        }
        
        if (!currentPlayer) {
            // Показываем форму создания первого игрока
            document.getElementById('app').innerHTML = `
                <h2>🏠 Создание семьи</h2>
                <p>Придумайте имя первого игрока:</p>
                <input type="text" id="playerName" placeholder="Ваше имя">
                <button onclick="createPlayer()" style="background:#4caf50; color:white;">✨ Создать</button>
            `;
        } else {
            await loadGame();
        }
    }
    
    window.createPlayer = async function() {
        const name = document.getElementById('playerName').value.trim();
        if (!name) { alert("Введите имя"); return; }
        
        const newId = Date.now().toString();
        const { data, error } = await supabase
            .from('players')
            .insert([{ id: newId, name: name, points: 0, avatar: '👤', is_admin: true }])
            .select();
        
        if (error) {
            alert("Ошибка: " + error.message);
        } else {
            currentPlayer = data[0];
            localStorage.setItem('playerId', currentPlayer.id);
            await loadGame();
        }
    };
    
    async function loadGame() {
        // Загружаем всех игроков
        const { data: playersData } = await supabase.from('players').select('*').order('created_at');
        players = playersData || [];
        
        const current = players.find(p => p.id === currentPlayer.id);
        
        document.getElementById('app').innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <span style="font-size: 40px;">${current?.avatar || '👤'}</span>
                    <h2 style="display: inline; margin-left: 10px;">${current?.name}</h2>
                </div>
                <div style="background: gold; padding: 8px 15px; border-radius: 30px;">⭐️ ${current?.points || 0}</div>
            </div>
            
            <button onclick="addMember()" style="width:100%; background:#4caf50; color:white;">➕ Добавить игрока</button>
            
            <h3>Семья (${players.length})</h3>
            ${players.map(p => `
                <div class="player-card">
                    <div>${p.avatar} ${p.name} ${p.is_admin ? '👑' : ''}</div>
                    <div>⭐️ ${p.points}</div>
                </div>
            `).join('')}
            
            <div class="chat-area">
                <h3>💬 Чат</h3>
                <div class="messages" id="chatMessages"></div>
                <div style="display: flex;">
                    <input type="text" id="messageInput" placeholder="Сообщение..." style="flex:1;">
                    <button onclick="sendMessage()">Отправить</button>
                </div>
            </div>
        `;
        
        // Загружаем сообщения
        const { data: messages } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(30);
        const messagesDiv = document.getElementById('chatMessages');
        if (messagesDiv && messages) {
            messagesDiv.innerHTML = messages.reverse().map(m => `<div><b>${m.sender_name}:</b> ${m.text}</div>`).join('');
        }
        
        // Подписка на новые сообщения
        supabase.removeAllChannels();
        supabase.channel('chat')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadGame())
            .subscribe();
    }
    
    window.addMember = async function() {
        const name = prompt("Имя нового игрока:");
        if (name) {
            await supabase.from('players').insert([{
                id: Date.now().toString(),
                name: name,
                points: 0,
                avatar: '👤',
                is_admin: false
            }]);
            await loadGame();
        }
    };
    
    window.sendMessage = async function() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (text && currentPlayer) {
            await supabase.from('messages').insert([{ sender_name: currentPlayer.name, text: text }]);
            input.value = '';
        }
    };
    
    init();
</script>
</body>
</html>
