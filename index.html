<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Семейный Квест - Живая синхронизация</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body { background-color: #e0f7fa; display: flex; flex-direction: column; align-items: center; padding: 0; margin: 0; height: 100vh; overflow: hidden; font-family: 'Comic Sans MS', cursive, sans-serif; }
        .main-wrapper { width: 100%; max-width: 500px; display: flex; flex-direction: column; height: 100%; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: stretch; padding: 10px; gap: 8px; z-index: 100; flex-shrink: 0; }
        .profile-card { background: white; padding: 10px; border-radius: 25px; border: 4px solid #00796b; display: flex; align-items: center; gap: 10px; flex: 2; position: relative; min-width: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .crown-icon { position: absolute; top: -18px; left: 5px; font-size: 32px; transform: rotate(-15deg); display: none; z-index: 10; }
        .is-admin .crown-icon { display: block; }
        .avatar-circle { width: 60px; height: 60px; background: #eee; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; cursor: pointer; border: 3px solid #00796b; flex-shrink: 0; }
        
        .btn-group { display: flex; flex-direction: column; gap: 5px; flex: 0.8; }
        .menu-btn, .chat-btn { height: 100%; min-height: 45px; border-radius: 18px; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 16px; border: 3px solid; display: flex; justify-content: center; align-items: center; }
        .menu-btn { background: #ff9800; color: white; border-color: #e65100; }
        .chat-btn { background: #4caf50; color: white; border-color: #2e7d32; }

        .map-viewport { flex: 1; width: 100%; position: relative; overflow: hidden; background: #cfd8dc; touch-action: none; border-top: 2px solid #004d40; }
        #map-container { position: absolute; width: 1000px; height: 1000px; transform-origin: 0 0; }
        .layer { position: absolute; top: 0; left: 0; width: 1000px; height: 1000px; pointer-events: none; background-size: contain; background-repeat: no-repeat; transition: filter 0.3s; }
        
        .highlight { filter: drop-shadow(0 0 25px #00e5ff) brightness(1.4) !important; }

        #quest-arrows { position: absolute; top: 0; left: 0; width: 1000px; height: 1000px; pointer-events: none; z-index: 60; }
        .arrow { position: absolute; width: 55px; height: 55px; cursor: pointer; animation: bounce 1.5s infinite; transform: translate(-50%, -50%); pointer-events: auto; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3)); }
        @keyframes bounce { 0%, 100% { transform: translate(-50%, -50%); } 50% { transform: translate(-50%, -80%); } }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 500; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 35px; border: 6px solid #00796b; text-align: center; width: 85%; max-width: 420px; z-index: 1000; box-shadow: 0 0 50px rgba(0,0,0,0.4); }
        .btn-choice { width: 100%; padding: 16px; margin: 8px 0; border-radius: 20px; border: 3px solid #00796b; cursor: pointer; font-family: inherit; font-size: 20px; background: white; font-weight: bold; }

        .sidebar { position: fixed; right: -550px; top: 0; width: 85%; max-width: 420px; height: 100%; background: white; border-left: 8px solid #ff9800; transition: 0.4s; padding: 30px; z-index: 1000; overflow-y: auto; box-sizing: border-box; }
        .sidebar.active { right: 0; }
        .member-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 2px solid #ffcc80; }
        
        .zoom-controls { position: absolute; bottom: 15px; right: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 110; }
        .z-btn { width: 50px; height: 50px; border-radius: 15px; border: 4px solid #004d40; background: white; font-size: 26px; font-weight: bold; color: #004d40; cursor: pointer; }
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #00796b; font-weight: bold; }
        
        .chat-messages { flex: 1; overflow-y: auto; background: #f5f5f5; border-radius: 20px; padding: 10px; margin-bottom: 10px; text-align: left; }
        .chat-message { padding: 8px; border-bottom: 1px solid #ddd; font-size: 14px; }
        .chat-sender { font-weight: bold; color: #00796b; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="loader" class="loading-screen">Синхронизация с облаком... ☁️</div>

<div class="main-wrapper">
    <div class="top-bar">
        <div id="p-card" class="profile-card">
            <div class="crown-icon">👑</div>
            <div id="current-avatar" class="avatar-circle" onclick="openAvatarPicker()">👤</div>
            <div style="flex:1; min-width: 0;">
                <b id="current-user-name">...</b>
                <div style="color: #00796b; font-weight: bold; font-size: 18px;">⭐️ <span id="score-val">0</span> <button onclick="renameCurrentPlayer()" style="background:none; border:none; font-size:18px; cursor:pointer;">✏️</button></div>
            </div>
        </div>
        <div class="btn-group">
            <button class="chat-btn" onclick="openChat()">💬</button>
            <button class="menu-btn" onclick="toggleSidebar()">⚙️</button>
        </div>
    </div>

    <div class="map-viewport" id="viewport">
        <div id="map-container">
            <!-- СЛОИ КАРТЫ (оставлены как в вашем примере, замените пути к файлам, если нужно) -->
            <div class="layer" style="background-image: url('Sanuzel1.png');"></div>
            <div class="layer" style="background-image: url('Koridor.png');"></div>
            <div class="layer" style="background-image: url('Gostinaya.png');"></div>
            <div class="layer" style="background-image: url('Spalnya1.png');"></div>
            <div class="layer" style="background-image: url('Spalnya2.png');"></div>
            <div class="layer" style="background-image: url('Vannaya.png');"></div>
            <div class="layer" style="background-image: url('Sanuzel2.png');"></div>
            <div class="layer" style="background-image: url('Kuhnya.png');"></div>
            <div class="layer" style="background-image: url('Balcon.png');"></div>
            <div id="obj-Lapomoika" class="layer" style="background-image: url('Lapomoika.png');"></div>
            <div id="obj-Unitaz1" class="layer" style="background-image: url('Unitaz1.png');"></div>
            <div id="obj-Stiralka" class="layer" style="background-image: url('Stiralka.png');"></div>
            <div id="obj-Korzina" class="layer" style="background-image: url('Korzina.png');"></div>
            <div id="obj-Tumbochka" class="layer" style="background-image: url('Tumbochka.png');"></div>
            <div id="obj-Veshalka" class="layer" style="background-image: url('Veshalka.png');"></div>
            <div id="obj-Shkaf1" class="layer" style="background-image: url('Shkaf1.png');"></div>
            <div id="obj-Shkaf2" class="layer" style="background-image: url('Shkaf2.png');"></div>
            <div id="obj-Shkaf3" class="layer" style="background-image: url('Shkaf3.png');"></div>
            <div id="obj-Shkaf4" class="layer" style="background-image: url('Shkaf4.png');"></div>
            <div id="obj-Shkaf5" class="layer" style="background-image: url('Shkaf5.png');"></div>
            <div id="quest-arrows"></div>
        </div>
        <div class="zoom-controls">
            <button class="z-btn" onclick="btnZoom(0.3)">+</button>
            <button class="z-btn" onclick="btnZoom(-0.3)">−</button>
        </div>
    </div>
</div>

<div id="overlay" onclick="closeAll()" class="overlay"></div>

<!-- МОДАЛЬНЫЕ ОКНА -->
<div id="createQuestModal" class="modal">
    <h2>Задание 📝</h2>
    <p id="furniture-hint" style="color:#00796b; font-weight:bold;"></p>
    <input type="text" id="new-quest-text" placeholder="Какое задание?">
    <button class="btn-choice" style="background:#4caf50; color:white;" onclick="confirmCreateQuest()">ПОСТАВИТЬ ✅</button>
    <button class="btn-choice" onclick="cancelQuest()">ОТМЕНА ❌</button>
</div>

<div id="taskModal" class="modal">
    <h2 id="taskText">...</h2>
    <button class="btn-choice" style="background:#00796b; color:white;" onclick="completeTask()">ГОТОВО ✅</button>
    <button class="btn-choice" onclick="closeAll()">ЗАКРЫТЬ 🔙</button>
</div>

<div id="sidebar" class="sidebar">
    <h2>🏡 Семья</h2>
    <div id="family-list" style="background:#fff3e0; padding:15px; border-radius:20px; margin-bottom:20px;"></div>
    <button class="btn-choice" style="background:#4caf50; color:white;" onclick="addNewMember()">➕ ДОБАВИТЬ ИГРОКА</button>
    <div id="switch-list"></div>
    <button class="btn-choice" onclick="closeAll()" style="margin-top:40px;">ЗАКРЫТЬ ❌</button>
</div>

<div id="createFamilyModal" class="modal">
    <h2>🏠 Создание семьи</h2>
    <p>Придумайте имя для первого игрока (администратора):</p>
    <input type="text" id="firstPlayerName" placeholder="Имя" autocomplete="off">
    <button class="btn-choice" style="background:#4caf50; color:white;" onclick="createFirstPlayer()">СОЗДАТЬ 👑</button>
</div>

<div id="chatModal" class="modal" style="max-width: 500px; width: 90%; height: 70vh; display: none; flex-direction: column;">
    <h2>💬 Семейный чат</h2>
    <div id="chatMessages" style="flex:1; overflow-y: auto; background:#f5f5f5; border-radius:20px; padding:15px; margin:10px 0; text-align:left;"></div>
    <div style="display:flex; gap:10px;">
        <input type="text" id="chatInput" placeholder="Сообщение..." style="flex:1; padding:12px; border-radius:25px; border:2px solid #00796b;">
        <button onclick="sendMessage()" style="background:#4caf50; color:white; border:none; border-radius:25px; padding:12px 20px;">📤</button>
    </div>
    <button class="btn-choice" onclick="closeChat()" style="margin-top:15px;">ЗАКРЫТЬ</button>
</div>

<div id="avatarModal" class="modal">
    <h2>Аватар героя 🎭</h2>
    <div id="emoji-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:20px 0;"></div>
    <button class="btn-choice" onclick="closeAll()">🔙 НАЗАД</button>
</div>

<script>
    // ======================== ПОДКЛЮЧЕНИЕ К SUPABASE ========================
    const SUPABASE_URL = 'https://kpibkmvhyevebjjpvwxn.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_MiKitncKVznOIY28I14BjQ_3MdpLUB7';
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // =====================================================================

    let appData = {
        players: [],
        quests: [],
        messages: [],
        currentPlayerId: null,
        adminId: null
    };
    let currentTaskIndex = null;
    let subscriptions = [];

    // --- ЭЛЕМЕНТЫ УПРАВЛЕНИЯ КАРТОЙ (ваша логика из оригинального кода) ---
    const container = document.getElementById('map-container');
    const view = document.getElementById('viewport');
    const qBox = document.getElementById('quest-arrows');
    const furnitureZones = [
        { id: 'Lapomoika', name: '🐾 Лапомойка', x: 745, y: 405, r: 85 },
        { id: 'Unitaz1', name: '🚽 Унитаз', x: 865, y: 405, r: 85 },
        { id: 'Stiralka', name: '🧼 Стиральная машина', x: 865, y: 555, r: 95 },
        { name: '🧺 Корзина', x: 765, y: 555, r: 85 },
        { id: 'Veshalka', name: '🧥 Вешалка', x: 690, y: 420, r: 75 },
        { name: '🗄 Тумбочка', x: 640, y: 500, r: 60 },
        { id: 'Shkaf1', name: '👟 Шкаф обуви', x: 505, y: 620, r: 85 },
        { id: 'Shkaf2', name: '👗 Шкаф одежды', x: 410, y: 620, r: 85 },
        { id: 'Shkaf3', name: '🧹 Хоз. шкаф', x: 330, y: 630, r: 75 },
        { id: 'Shkaf4', name: '⛺️ Шкаф спорт', x: 330, y: 710, r: 75 },
        { id: 'Shkaf5', name: '📦 Доп. шкаф', x: 330, y: 790, r: 75 }
    ];

    let scale = 0.5, posX = 0, posY = 0, isDragging = false, startX, startY, lastTap = 0, initialDist = null, initialScale = 0, oldPos = {s: 0.5, x: 0, y: 0};
    function updateTransform() { container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
    function applyZoom(delta, clientX, clientY) {
        const rect = view.getBoundingClientRect();
        const newScale = Math.min(Math.max(0.1, scale + delta), 4);
        posX = (clientX - rect.left) - (clientX - rect.left - posX) * (newScale / scale);
        posY = (clientY - rect.top) - (clientY - rect.top - posY) * (newScale / scale);
        scale = newScale; updateTransform();
    }
    function btnZoom(delta) { applyZoom(delta, view.offsetWidth / 2, view.offsetHeight / 2); }
    view.addEventListener('touchstart', e => {
        if (e.touches.length === 1) { isDragging = true; startX = e.touches[0].clientX - posX; startY = e.touches[0].clientY - posY; container.style.transition = 'none'; }
        else if (e.touches.length === 2) { isDragging = false; initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); initialScale = scale; }
    }, {passive: false});
    view.addEventListener('touchmove', e => {
        e.preventDefault();
        if (e.touches.length === 1 && isDragging) { posX = e.touches[0].clientX - startX; posY = e.touches[0].clientY - startY; updateTransform(); }
        else if (e.touches.length === 2 && initialDist) {
            const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            applyZoom((initialScale * (currentDist / initialDist)) - scale, (e.touches[0].clientX + e.touches[1].clientX)/2, (e.touches[0].clientY + e.touches[1].clientY)/2);
        }
    }, {passive: false});
    view.addEventListener('touchend', () => { isDragging = false; initialDist = null; });
    view.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY; container.style.transition = 'none'; });
    window.addEventListener('mousemove', e => { if (isDragging) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); } });
    window.addEventListener('mouseup', () => isDragging = false);
    view.addEventListener('wheel', e => { e.preventDefault(); applyZoom(e.deltaY < 0 ? 0.1 : -0.1, e.clientX, e.clientY); }, {passive:false});
    view.addEventListener('click', e => {
        if (appData.players.length === 0) return;
        if (appData.currentPlayerId !== appData.adminId) return;
        const now = Date.now();
        if (now - lastTap < 300) {
            const rect = container.getBoundingClientRect();
            const mapX = (e.clientX - rect.left) / scale, mapY = (e.clientY - rect.top) / scale;
            let found = furnitureZones.find(f => Math.hypot(f.x - mapX, f.y - mapY) < f.r);
            if(found) {
                const el = document.getElementById('obj-' + found.id);
                if(el) { el.classList.add('highlight'); setTimeout(() => el.classList.remove('highlight'), 1000); }
            }
            oldPos = {s: scale, x: posX, y: posY};
            applyZoom(1.4 - scale, e.clientX, e.clientY);
            container.style.transition = 'transform 0.4s ease-out';
            window.tempCoords = { x: mapX, y: mapY };
            setTimeout(() => {
                document.getElementById('furniture-hint').innerText = found ? `Объект: ${found.name}` : "Пустая зона";
                document.getElementById('createQuestModal').style.display='block';
                document.getElementById('overlay').style.display='block';
            }, 350);
        }
        lastTap = now;
    });

    // --- ОСНОВНЫЕ ФУНКЦИИ ПРИЛОЖЕНИЯ ---
    async function loadAllData() {
        document.getElementById('loader').style.display = 'flex';
        try {
            const [playersRes, questsRes, messagesRes] = await Promise.all([
                supabase.from('players').select('*').order('created_at', { ascending: true }),
                supabase.from('quests').select('*'),
                supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(50)
            ]);
            if (playersRes.error) throw playersRes.error;
            if (questsRes.error) throw questsRes.error;
            if (messagesRes.error) throw messagesRes.error;
            
            appData.players = playersRes.data || [];
            appData.quests = questsRes.data || [];
            appData.messages = (messagesRes.data || []).reverse();
            
            if (appData.players.length > 0) {
                const admin = appData.players.find(p => p.is_admin === true);
                appData.adminId = admin ? admin.id : appData.players[0].id;
                if (!appData.currentPlayerId || !appData.players.find(p => p.id === appData.currentPlayerId)) {
                    appData.currentPlayerId = appData.players[0].id;
                }
                document.getElementById('p-card').style.opacity = '1';
                updateUI();
                renderQuestsOnMap();
                setupRealtimeSubscriptions();
            } else {
                document.getElementById('p-card').style.opacity = '0.5';
                document.getElementById('createFamilyModal').style.display = 'block';
                document.getElementById('overlay').style.display = 'block';
            }
        } catch (error) {
            console.error("Ошибка загрузки:", error);
            alert("Ошибка загрузки: " + error.message);
        }
        document.getElementById('loader').style.display = 'none';
    }

    function setupRealtimeSubscriptions() {
        subscriptions.forEach(sub => supabase.removeSubscription(sub));
        subscriptions = [];
        const playersSub = supabase.channel('players-channel').on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, () => loadAllData()).subscribe();
        const questsSub = supabase.channel('quests-channel').on('postgres_changes', { event: '*', schema: 'public', table: 'quests' }, () => loadAllData()).subscribe();
        const messagesSub = supabase.channel('messages-channel').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadAllData()).subscribe();
        subscriptions.push(playersSub, questsSub, messagesSub);
    }

    function renderQuestsOnMap() {
        qBox.innerHTML = '';
        appData.quests.forEach((q, idx) => {
            const img = document.createElement('img');
            img.src = 'arrow.png';
            img.className = 'arrow';
            img.style.left = q.x_coord + 'px';
            img.style.top = q.y_coord + 'px';
            img.onclick = (e) => { e.stopPropagation(); openQuest(idx); };
            qBox.appendChild(img);
        });
    }

    function updateUI() {
        const currentPlayer = appData.players.find(p => p.id === appData.currentPlayerId);
        if (!currentPlayer) return;
        document.getElementById('current-user-name').innerText = currentPlayer.name;
        document.getElementById('score-val').innerText = currentPlayer.points;
        document.getElementById('current-avatar').innerText = currentPlayer.avatar;
        document.getElementById('p-card').classList.toggle('is-admin', appData.currentPlayerId === appData.adminId);
        
        const familyList = document.getElementById('family-list');
        const switchList = document.getElementById('switch-list');
        familyList.innerHTML = '';
        switchList.innerHTML = '<h3>🔄 Сменить героя:</h3>';
        for (const p of appData.players) {
            familyList.innerHTML += `<div class="member-item"><span>${p.avatar} ${p.name} ${p.id === appData.adminId ? '👑' : ''} (⭐️ ${p.points})</span><div><button onclick="setAdmin('${p.id}')" style="border:none;background:none;font-size:24px;">👑</button><button onclick="renamePlayer('${p.id}')" style="border:none;background:none;font-size:24px;">✏️</button></div></div>`;
            if (p.id !== appData.currentPlayerId) switchList.innerHTML += `<button class="btn-choice" onclick="switchPlayer('${p.id}')">${p.name}</button>`;
        }
    }

    async function createFirstPlayer() {
        const name = document.getElementById('firstPlayerName').value.trim();
        if (!name) { alert("Введите имя!"); return; }
        const { error } = await supabase.from('players').insert([{ id: Date.now().toString(), name: name, points: 0, avatar: '👤', is_admin: true }]);
        if (error) alert("Ошибка: " + error.message);
        else { closeAll(); await loadAllData(); }
    }

    async function addNewMember() {
        let name = prompt("Имя игрока:");
        if (name) {
            const { error } = await supabase.from('players').insert([{ id: Date.now().toString(), name: name, points: 0, avatar: '👤', is_admin: false }]);
            if (error) alert("Ошибка: " + error.message);
            else await loadAllData();
        }
    }

    async function renamePlayer(id) {
        const player = appData.players.find(p => p.id === id);
        let newName = prompt("Новое имя:", player?.name);
        if (newName && player) {
            const { error } = await supabase.from('players').update({ name: newName }).eq('id', id);
            if (error) alert("Ошибка: " + error.message);
        }
    }

    async function setAdmin(id) {
        const { error: resetError } = await supabase.from('players').update({ is_admin: false }).neq('id', 'none');
        if (resetError) { alert("Ошибка: " + resetError.message); return; }
        const { error } = await supabase.from('players').update({ is_admin: true }).eq('id', id);
        if (error) alert("Ошибка: " + error.message);
        else await loadAllData();
    }

    async function confirmCreateQuest() {
        const text = document.getElementById('new-quest-text').value.trim();
        if (text && window.tempCoords) {
            const { error } = await supabase.from('quests').insert([{ id: Date.now().toString(), text: text, x_coord: window.tempCoords.x, y_coord: window.tempCoords.y, created_by: appData.currentPlayerId }]);
            if (error) alert("Ошибка: " + error.message);
        }
        cancelQuest();
    }

    async function completeTask() {
        if (currentTaskIndex !== null && appData.quests[currentTaskIndex]) {
            const quest = appData.quests[currentTaskIndex];
            const player = appData.players.find(p => p.id === appData.currentPlayerId);
            if (player) {
                const { error: updateError } = await supabase.from('players').update({ points: player.points + 10 }).eq('id', player.id);
                if (updateError) { alert("Ошибка: " + updateError.message); return; }
                const { error: deleteError } = await supabase.from('quests').delete().eq('id', quest.id);
                if (deleteError) alert("Ошибка: " + deleteError.message);
            }
        }
        closeAll();
        await loadAllData();
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (text) {
            const currentPlayer = appData.players.find(p => p.id === appData.currentPlayerId);
            const { error } = await supabase.from('messages').insert([{ sender_name: currentPlayer?.name || "Аноним", text: text }]);
            if (error) alert("Ошибка: " + error.message);
            else { input.value = ''; await openChat(); }
        }
    }

    async function setAvatar(emoji) {
        const player = appData.players.find(p => p.id === appData.currentPlayerId);
        if (player) {
            const { error } = await supabase.from('players').update({ avatar: emoji }).eq('id', player.id);
            if (error) alert("Ошибка: " + error.message);
            else await loadAllData();
            closeAll();
        }
    }

    async function renameCurrentPlayer() {
        const player = appData.players.find(p => p.id === appData.currentPlayerId);
        let newName = prompt("Ваше имя:", player?.name);
        if (newName && player) {
            const { error } = await supabase.from('players').update({ name: newName }).eq('id', player.id);
            if (error) alert("Ошибка: " + error.message);
        }
    }

    async function switchPlayer(id) { appData.currentPlayerId = id; updateUI(); closeAll(); }
    async function openChat() { await loadAllData(); const chatDiv = document.getElementById('chatMessages'); chatDiv.innerHTML = appData.messages.map(m => `<div class="chat-message"><span class="chat-sender">${m.sender_name}:</span> ${m.text}</div>`).join(''); document.getElementById('chatModal').style.display = 'flex'; document.getElementById('overlay').style.display = 'block'; }
    function closeChat() { document.getElementById('chatModal').style.display = 'none'; closeAll(); }
    function openQuest(idx) { currentTaskIndex = idx; document.getElementById('taskText').innerText = appData.quests[idx].text; document.getElementById('taskModal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
    function cancelQuest() { scale = oldPos.s; posX = oldPos.x; posY = oldPos.y; container.style.transition = 'transform 0.4s'; updateTransform(); closeAll(); }
    function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
    function toggleSidebar() { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
    function openAvatarPicker() { document.getElementById('avatarModal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }

    const emojis = ['🐱','🐶','🦊','🐼','🐨','🐯','🦁','🦄','🐷','🐸','🐮','🦒'];
    document.getElementById('emoji-grid').innerHTML = emojis.map(e => `<span onclick="setAvatar('${e}')" style="font-size:35px; cursor:pointer;">${e}</span>`).join('');
    
    loadAllData();
    setTimeout(() => { posX = (view.offsetWidth - 1000 * 0.4) / 2; posY = (view.offsetHeight - 1000 * 0.4) / 2; scale = 0.4; updateTransform(); }, 600);
</script>
</body>
</html>
