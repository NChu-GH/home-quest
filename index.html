<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Home Quest 🏡</title>
    <style>
        /* --- Фирменный UI/UX стиль --- */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .phone-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background-color: #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Навигационная панель (Вкладки) --- */
        .nav-tabs {
            display: flex;
            background: #00796b;
            border-bottom: 4px solid #004d40;
            z-index: 10;
        }
        .nav-tab {
            flex: 1;
            color: white;
            text-align: center;
            padding: 12px 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .nav-tab.active {
            background: #004d40;
            box-shadow: inset 0 -4px 0 #00cbd6;
        }

        /* --- Экраны приложения --- */
        .app-screen {
            flex: 1;
            display: none;
            position: relative;
            overflow: hidden;
        }
        .app-screen.active {
            display: flex;
            flex-direction: column;
        }

        /* --- Экран 1: Интерактивная карта --- */
        .map-viewport {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-color: #eaeaea;
            cursor: grab;
        }
        .map-viewport:active {
            cursor: grabbing;
        }
        .map-container {
            width: 1000px;
            height: 1000px;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            will-change: transform;
        }
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 1000px;
            height: 1000px;
            pointer-events: none;
        }
        .furniture {
            pointer-events: auto;
            cursor: pointer;
            transition: filter 0.2s ease;
        }
        .furniture.highlighted {
            filter: drop-shadow(0 0 15px #00cbd6) brightness(1.3) !important;
        }
        .quest-arrow {
            position: absolute;
            width: 50px;
            height: 50px;
            pointer-events: none;
            z-index: 10;
            transform: translate(-50%, -50%);
            transition: transform 0.3s ease;
        }

        /* --- Экран 2: Семейный Чат --- */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #e5ddd5;
            touch-action: pan-y;
        }
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            touch-action: pan-y;
        }
        .chat-message {
            background: white;
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 80%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            position: relative;
        }
        .chat-message.my-msg {
            align-self: flex-end;
            background: #dcf8c6;
        }
        .msg-meta {
            font-size: 11px;
            color: #777;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .msg-avatar {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            object-fit: cover;
        }
        .msg-text {
            font-size: 15px;
            word-break: break-word;
        }
        .chat-input-area {
            display: flex;
            padding: 10px;
            background: #f0f0f0;
            gap: 8px;
            border-top: 1px solid #ddd;
        }

        /* --- Экран 3: Настройки Профиля и Семьи --- */
        .profile-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f9fbfd;
            touch-action: pan-y;
        }
        .section-card {
            background: white;
            border: 4px solid #00796b;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-title {
            color: #00796b;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .avatar-picker-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .profile-avatar-preview {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00796b;
            background: #eee;
        }
        .hidden-file-input {
            display: none;
        }
        .members-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }
        .member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f4f8;
            padding: 8px 12px;
            border-radius: 15px;
        }
        .member-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* --- Всплывающие модальные окна --- */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }
        .modal-window {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            border: 6px solid #00796b;
            border-radius: 35px;
            padding: 25px;
            text-align: center;
            animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-title {
            font-size: 22px;
            color: #00796b;
            margin-top: 0;
            margin-bottom: 15px;
        }

        /* Элементы ввода и кнопки */
        .input-field {
            width: 100%;
            padding: 12px 20px;
            margin: 10px 0;
            border: 3px solid #b2dfdb;
            border-radius: 15px;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            touch-action: manipulation;
        }
        .input-field:focus {
            border-color: #00796b;
        }
        .btn {
            background-color: #00796b;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            margin: 5px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 0 #004d40;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #004d40;
        }
        .btn-cancel {
            background-color: #e57373;
            box-shadow: 0 4px 0 #b71c1c;
        }
        .loader {
            position: absolute;
            top: 60px;
            right: 15px;
            background: rgba(0,121,107,0.9);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            display: none;
            z-index: 90;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- Навигационное верхнее меню (Вкладки) -->
    <div class="nav-tabs">
        <div class="nav-tab active" onclick="switchScreen('map-screen')">🏡 Карта</div>
        <div class="nav-tab" onclick="switchScreen('chat-screen')">💬 Чат</div>
        <div class="nav-tab" onclick="switchScreen('profile-screen')">👤 Профиль</div>
    </div>

    <div id="loader" class="loader">Синхронизация... 🚀</div>

    <!-- ЭКРАН 1: ИНТЕРАКТИВНАЯ КАРТА -->
    <div id="map-screen" class="app-screen active">
        <div class="map-viewport" id="viewport">
            <div class="map-container" id="mapContainer">
                <!-- Базовые слои -->
                <img src="Sanuzel1.png" class="layer" alt="Sanuzel1">
                <img src="Koridor.png" class="layer" alt="Koridor">
                <img src="Gostinaya.png" class="layer" alt="Gostinaya">
                <img src="Spalnya1.png" class="layer" alt="Spalnya1">
                <img src="Spalnya2.png" class="layer" alt="Spalnya2">
                <img src="Vannaya.png" class="layer" alt="Vannaya">
                <img src="Sanuzel2.png" class="layer" alt="Sanuzel2">
                <img src="Kuhnya.png" class="layer" alt="Kuhnya">
                <img src="Balcon.png" class="layer" alt="Balcon">

                <!-- Интерактивная мебель -->
                <img src="Lapomoika.png" class="layer furniture" id="Lapomoika" alt="Lapomoika">
                <img src="Unitaz1.png" class="layer furniture" id="Unitaz1" alt="Unitaz1">
                <img src="Stiralka.png" class="layer furniture" id="Stiralka" alt="Stiralka">
                <img src="Korzina.png" class="layer furniture" id="Korzina" alt="Korzina">
                <img src="Tumbochka.png" class="layer furniture" id="Tumbochka" alt="Tumbochka">
                <img src="Veshalka.png" class="layer furniture" id="Veshalka" alt="Veshalka">
                <img src="Shkaf1.png" class="layer furniture" id="Shkaf1" alt="Shkaf1">
                <img src="Shkaf2.png" class="layer furniture" id="Shkaf2" alt="Shkaf2">
                <img src="Shkaf3.png" class="layer furniture" id="Shkaf3" alt="Shkaf3">
                <img src="Shkaf4.png" class="layer furniture" id="Shkaf4" alt="Shkaf4">
                <img src="Shkaf5.png" class="layer furniture" id="Shkaf5" alt="Shkaf5">

                <img src="arrow.png" class="quest-arrow" id="questArrow" style="display:none;" alt="arrow">
            </div>
        </div>
    </div>

    <!-- ЭКРАН 2: СЕМЕЙНЫЙ ЧАТ -->
    <div id="chat-screen" class="app-screen">
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <!-- Сообщения генерируются скриптом -->
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="input-field" style="margin:0;" placeholder="Написать семье...">
                <button class="btn" id="btnSendMsg" style="margin:0; padding: 12px 18px;">🚀</button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН 3: НАСТРОЙКИ ПРОФИЛЯ И СЕМЬИ -->
    <div id="profile-screen" class="app-screen">
        <div class="profile-container">
            
            <!-- Карточка Личного Профиля -->
            <div class="section-card">
                <h3 class="section-title">👤 Мой Профиль</h3>
                <div class="avatar-picker-wrapper">
                    <img id="userAvatar" class="profile-avatar-preview" src="data:image/svg+xml;utf8,<svg xmlns='w3.org' width='100' height='100' viewBox='0 0 100 100'><circle cx='50' cy='35' r='20' fill='%2300796b'/><path d='M20,80 C20,60 80,60 80,80' fill='%2300796b'/></svg>" alt="Avatar">
                    <button class="btn" style="padding: 6px 15px; font-size: 13px;" onclick="document.getElementById('avatarFileInput').click()">📸 Изменить фото</button>
                    <input type="file" id="avatarFileInput" class="hidden-file-input" accept="image/*">
                </div>
                <input type="text" id="userNameInput" class="input-field" placeholder="Ваше имя">
                <button class="btn" id="btnSaveProfile" style="width: 100%; justify-content: center;">✅ Сохранить профиль</button>
            </div>

            <!-- Карточка Семьи -->
            <div class="section-card">
                <h3 class="section-title">🏡 Моя Семья</h3>
                <input type="text" id="familyNameInput" class="input-field" placeholder="Название семьи (например: Ивановы)">
                
                <h4 style="margin: 15px 0 5px 0; color: #004d40;">Участники:</h4>
                <div class="members-list" id="familyMembersContainer">
                    <!-- Список участников генерируется скриптом -->
                </div>
                
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="newMemberInput" class="input-field" style="margin:0;" placeholder="Имя нового участника">
                    <button class="btn" id="btnAddMember" style="margin:0; padding: 12px 18px;">➕</button>
                </div>
                <button class="btn" id="btnSaveFamily" style="width: 100%; justify-content: center; margin-top: 15px; background-color: #004d40;">✅ Сохранить настройки семьи</button>
            </div>

        </div>
    </div>

    <!-- Модальное окно администратора (Форма объекта) -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal-window">
            <h3 class="modal-title" id="modalTitle">Мебель 🏡</h3>
            <p>Назначить задание для этого объекта:</p>
            <input type="text" id="questInput" class="input-field" placeholder="Введите квест...">
            <div style="margin-top: 15px;">
                <button class="btn" id="btnSave">✅ Сохранить</button>
                <button class="btn btn-cancel" id="btnCancel">🔙 Отмена</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "google.com";

    // Состояние приложения (добавлены настройки профиля, семьи и чата)
    let state = {
        zoom: 0.5,
        panX: 0,
        panY: 0,
        isDragging: false,
        startX: 0,
        startY: 0
    };

    // Данные профиля по умолчанию (сохраняются в localStorage и синхронизируются)
    let profileData = {
        name: localStorage.getItem('hq_user_name') || "Пользователь",
        avatar: localStorage.getItem('hq_user_avatar') || ""
    };

    let familyData = {
        name: "Наша Семья 🏡",
        members: ["Мама", "Папа", "Я"]
    };

    let chatMessages = [
        { sender: "Мама", text: "Кто оставил квест на стиральной машине? Нам нужно помыть кота! 🐾", time: "12:30", avatar: "" },
        { sender: "Папа", text: "Я проверил шкаф 1, там пусто.", time: "12:45", avatar: "" }
    ];

    let questData = {};

    // Элементы DOM
    const viewport = document.getElementById('viewport');
    const mapContainer = document.getElementById('mapContainer');
    const adminModal = document.getElementById('adminModal');
    const questInput = document.getElementById('questInput');
    const modalTitle = document.getElementById('modalTitle');
    const loader = document.getElementById('loader');
    const questArrow = document.getElementById('questArrow');

    // Новые элементы DOM для профиля, семьи и чата
    const chatMessagesContainer = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const btnSendMsg = document.getElementById('btnSendMsg');
    const userNameInput = document.getElementById('userNameInput');
    const userAvatar = document.getElementById('userAvatar');
    const avatarFileInput = document.getElementById('avatarFileInput');
    const familyNameInput = document.getElementById('familyNameInput');
    const familyMembersContainer = document.getElementById('familyMembersContainer');
    const newMemberInput = document.getElementById('newMemberInput');
    const btnAddMember = document.getElementById('btnAddMember');

    let currentSelectedTarget = null;
    let originalTransformBeforeZoom = null;

    // --- Переключение экранов (Вкладки) ---
    function switchScreen(screenId) {
        document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        
        document.getElementById(screenId).classList.add('active');
        event.currentTarget.classList.add('active');

        if(screenId === 'map-screen') {
            initMapPosition();
        } else if(screenId === 'chat-screen') {
            renderChat();
        } else if(screenId === 'profile-screen') {
            renderProfileAndFamily();
        }
    }

    // --- Логика Управления Профилем и Семьей ---
    function renderProfileAndFamily() {
        userNameInput.value = profileData.name;
        if(profileData.avatar) userAvatar.src = profileData.avatar;
        
        familyNameInput.value = familyData.name;
        
        familyMembersContainer.innerHTML = "";
        familyData.members.forEach((member, index) => {
            const item = document.createElement('div');
            item.className = 'member-item';
            item.innerHTML = `
                <div class="member-avatar" style="background:#00796b; display:flex; align-items:center; justify-content:center; color:white; font-size:12px;">${member[0]}</div>
                <span style="flex:1;">${member}</span>
                <span style="cursor:pointer; color:#e57373;" onclick="removeFamilyMember(${index})">❌</span>
            `;
            familyMembersContainer.appendChild(item);
        });
    }

    // Изменение фото профиля (перевод в Base64)
    avatarFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                profileData.avatar = event.target.result;
                userAvatar.src = profileData.avatar;
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('btnSaveProfile').addEventListener('click', () => {
        profileData.name = userNameInput.value.trim() || "Пользователь";
        localStorage.setItem('hq_user_name', profileData.name);
        if(profileData.avatar) localStorage.setItem('hq_user_avatar', profileData.avatar);
        alert("Профиль успешно сохранен! ✅");
        saveFamilyToCloud();
    });

    // Управление членами семьи и названием
    btnAddMember.addEventListener('click', () => {
        const name = newMemberInput.value.trim();
        if(name) {
            familyData.members.push(name);
            newMemberInput.value = "";
            renderProfileAndFamily();
        }
    });

    function removeFamilyMember(index) {
        familyData.members.splice(index, 1);
        renderProfileAndFamily();
    }

    document.getElementById('btnSaveFamily').addEventListener('click', () => {
        familyData.name = familyNameInput.value.trim() || "Наша Семья 🏡";
        alert("Данные семьи обновлены! ✅");
        saveFamilyToCloud();
    });

    // --- Логика Семейного Чата ---
    function renderChat() {
        chatMessagesContainer.innerHTML = "";
        chatMessages.forEach(msg => {
            const isMe = msg.sender === profileData.name;
            const msgEl = document.createElement('div');
            msgEl.className = `chat-message ${isMe ? 'my-msg' : ''}`;
            
            const avatarHtml = msg.avatar 
                ? `<img class="msg-avatar" src="${msg.avatar}">` 
                : `<div class="msg-avatar" style="background:#00796b; display:inline-block; width:14px; height:14px; border-radius:50%;"></div>`;

            msgEl.innerHTML = `
                <div class="msg-meta">${avatarHtml} <span>${msg.sender}</span> • ${msg.time}</div>
                <div class="msg-text">${msg.text}</div>
            `;
            chatMessagesContainer.appendChild(msgEl);
        });
        chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
    }

    btnSendMsg.addEventListener('click', sendNewMessage);
    chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendNewMessage(); });

    function sendNewMessage() {
        const text = chatInput.value.trim();
        if(!text) return;

        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

        const newMsg = {
            sender: profileData.name,
            text: text,
            time: timeStr,
            avatar: profileData.avatar
        };

        chatMessages.push(newMsg);
        chatInput.value = "";
        renderChat();
        saveFamilyToCloud(); // Синхронизируем чат вместе с остальными данными в облако
    }

    // --- Код Карты (Оригинальная Логика Сохранена в точности) ---
    function initMapPosition() {
        const viewRect = viewport.getBoundingClientRect();
        if(viewRect.width === 0) return;
        state.zoom = viewRect.width / 1000;
        state.panX = 0;
        state.panY = (viewRect.height - (1000 * state.zoom)) / 2;
        updateTransform();
    }

    function updateTransform() {
        mapContainer.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.zoom})`;
    }

    let lastTap = 0;
    viewport.addEventListener('click', function(e) {
        const now = Date.now();
        const DOUBLE_TAP_DELAY = 300;
        const targetFurniture = e.target.closest('.furniture');
        
        if ((now - lastTap) < DOUBLE_TAP_DELAY) {
            if (targetFurniture) {
                e.preventDefault();
                handleFurnitureDoubleClick(targetFurniture, e);
            }
        } else {
            if (targetFurniture && !state.isDragging) {
                showActiveQuest(targetFurniture.id);
            }
        }
        lastTap = now;
    });

    function handleFurnitureDoubleClick(element, event) {
        element.classList.add('highlighted');
        setTimeout(() => element.classList.remove('highlighted'), 1000);

        originalTransformBeforeZoom = { zoom: state.zoom, panX: state.panX, panY: state.panY };

        const rect = mapContainer.getBoundingClientRect();
        const clickX = (event.clientX - rect.left) / state.zoom;
        const clickY = (event.clientY - rect.top) / state.zoom;

        state.zoom = 1.2;
        const viewRect = viewport.getBoundingClientRect();
        state.panX = viewRect.width / 2 - clickX * state.zoom;
        state.panY = viewRect.height / 2 - clickY * state.zoom;
        
        keepMapInBounds();
        updateTransform();

        currentSelectedTarget = element.id;
        modalTitle.innerText = `Объект: ${currentSelectedTarget} 🏡`;
        questInput.value = questData[currentSelectedTarget] || "";
        
        setTimeout(() => {
            adminModal.style.display = 'flex';
        }, 300);
    }

    function keepMapInBounds() {
        const minPanX = -1000 * state.zoom + 50;
        const maxPanX = viewport.clientWidth - 50;
        const minPanY = -1000 * state.zoom + 50;
        const maxPanY = viewport.clientHeight - 50;

        state.panX = Math.min(Math.max(state.panX, minPanX), maxPanX);
        state.panY = Math.min(Math.max(state.panY, minPanY), maxPanY);
    }

    function startDrag(clientX, clientY) {
        state.isDragging = true;
        state.startX = clientX - state.panX;
        state.startY = clientY - state.panY;
    }

    function moveDrag(clientX, clientY) {
        if (!state.isDragging) return;
        state.panX = clientX - state.startX;
        state.panY = clientY - state.startY;
        keepMapInBounds();
        updateTransform();
    }

    function stopDrag() {
        state.isDragging = false;
    }

    viewport.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
