<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Home Quest 🏡</title>
    <style>
        /* --- Фирменный UI/UX стиль (Сохранено полностью) --- */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .phone-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background-color: #ffffff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
        }

        /* --- Нижнее меню навигации (Добавлено для переключения разделов) --- */
        .bottom-nav {
            display: flex;
            background: #00796b;
            border-top: 4px solid #004d40;
            z-index: 90;
            height: 60px;
        }
        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .nav-btn.active {
            background: #004d40;
            font-weight: bold;
        }

        /* --- Экраны приложения --- */
        .app-screen {
            flex: 1;
            display: none;
            position: relative;
            overflow: hidden;
        }
        .app-screen.active {
            display: flex;
            flex-direction: column;
        }

        /* --- Область интерактивной карты --- */
        .map-viewport {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-color: #eaeaea;
            cursor: grab;
        }
        .map-viewport:active {
            cursor: grabbing;
        }

        .map-container {
            width: 1000px;
            height: 1000px;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            will-change: transform;
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 1000px;
            height: 1000px;
            pointer-events: none;
        }

        .furniture {
            pointer-events: auto;
            cursor: pointer;
            transition: filter 0.2s ease;
        }

        .furniture.highlighted {
            filter: drop-shadow(0 0 15px #00cbd6) brightness(1.3) !important;
        }

        .quest-arrow {
            position: absolute;
            width: 50px;
            height: 50px;
            pointer-events: none;
            z-index: 10;
            transform: translate(-50%, -50%);
            transition: transform 0.3s ease;
        }

        /* --- Контентные экраны (Профиль, Семья, Чат) --- */
        .screen-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #fdfdfd;
            touch-action: pan-y; /* Разрешаем вертикальный скролл списков */
        }

        /* --- Элементы Профиля и Семьи --- */
        .profile-avatar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }
        .avatar-preview {
            width: 100px;
            height: 100px;
            border: 4px solid #00796b;
            border-radius: 50%;
            object-fit: cover;
            background: #eee;
            margin-bottom: 10px;
        }
        .hidden-input {
            display: none;
        }
        .section-box {
            background: #f0fdfa;
            border: 3px solid #b2dfdb;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .member-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 8px 0;
            border-bottom: 1px dashed #b2dfdb;
        }
        .member-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #00796b;
        }

        /* --- Интерфейс Чата --- */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #f7f9fa;
            border: 3px solid #b2dfdb;
            border-radius: 20px;
            margin-bottom: 10px;
            touch-action: pan-y;
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
        }
        .message-bubble {
            margin-bottom: 10px;
            padding: 8px 14px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 14px;
        }
        .message-bubble.my-msg {
            background: #e0f2f1;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }
        .message-bubble.other-msg {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        /* --- Всплывающие модальные окна (UI сохранен строго по ТЗ) --- */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .modal-window {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            border: 6px solid #00796b; /* Исходная 6px бирюзовая рамка */
            border-radius: 35px;       /* Исходный радиус 35px */
            padding: 25px;
            text-align: center;
            animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 22px;
            color: #00796b;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .input-field {
            width: 100%;
            padding: 12px 20px;
            margin: 10px 0;
            border: 3px solid #b2dfdb;
            border-radius: 15px;
            font-family: inherit;
            font-size: 16px;
            outline: none;
        }
        .input-field:focus {
            border-color: #00796b;
        }

        .btn {
            background-color: #00796b;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            margin: 5px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 0 #004d40;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #004d40;
        }
        .btn-cancel {
            background-color: #e57373;
            box-shadow: 0 4px 0 #b71c1c;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 10px;
            box-shadow: 0 2px 0 #004d40;
        }
    </style>
</head>
<body>

<div class="phone-container">

    <!-- ЭКРАН 1: КАРТА КВАРТИРЫ -->
    <div id="screenMap" class="app-screen active">
        <div class="map-viewport" id="viewport">
            <div class="map-container" id="mapContainer">
                <!-- Базовые слои (9 шт.) -->
                <img src="Sanuzel1.png" class="layer" alt="Sanuzel1">
                <img src="Koridor.png" class="layer" alt="Koridor">
                <img src="Gostinaya.png" class="layer" alt="Gostinaya">
                <img src="Spalnya1.png" class="layer" alt="Spalnya1">
                <img src="Spalnya2.png" class="layer" alt="Spalnya2">
                <img src="Vannaya.png" class="layer" alt="Vannaya">
                <img src="Sanuzel2.png" class="layer" alt="Sanuzel2">
                <img src="Kuhnya.png" class="layer" alt="Kuhnya">
                <img src="Balcon.png" class="layer" alt="Balcon">

                <!-- Интерактивная мебель (11 шт.) -->
                <img src="Lapomoika.png" class="layer furniture" id="Lapomoika" alt="Lapomoika">
                <img src="Unitaz1.png" class="layer furniture" id="Unitaz1" alt="Unitaz1">
                <img src="Stiralka.png" class="layer furniture" id="Stiralka" alt="Stiralka">
                <img src="Korzina.png" class="layer furniture" id="Korzina" alt="Korzina">
                <img src="Tumbochka.png" class="layer furniture" id="Tumbochka" alt="Tumbochka">
                <img src="Veshalka.png" class="layer furniture" id="Veshalka" alt="Veshalka">
                <img src="Shkaf1.png" class="layer furniture" id="Shkaf1" alt="Shkaf1">
                <img src="Shkaf2.png" class="layer furniture" id="Shkaf2" alt="Shkaf2">
                <img src="Shkaf3.png" class="layer furniture" id="Shkaf3" alt="Shkaf3">
                <img src="Shkaf4.png" class="layer furniture" id="Shkaf4" alt="Shkaf4">
                <img src="Shkaf5.png" class="layer furniture" id="Shkaf5" alt="Shkaf5">

                <img src="arrow.png" class="quest-arrow" id="questArrow" style="display:none;" alt="arrow">
            </div>
        </div>
    </div>

    <!-- ЭКРАН 2: ПРОФИЛЬ -->
    <div id="screenProfile" class="app-screen">
        <div class="screen-content">
            <h2 style="color: #00796b; text-align:center;">Мой Профиль 👤</h2>
            <div class="profile-avatar-container">
                <img src="" id="profileAvatar" class="avatar-preview" alt="Аватар">
                <button class="btn btn-sm" onclick="document.getElementById('avatarLoader').click()">📷 Изменить фото</button>
                <input type="file" id="avatarLoader" class="hidden-input" accept="image/*">
            </div>
            <div class="section-box">
                <label>Ваше Имя:</label>
                <input type="text" id="profileNameInput" class="input-field" placeholder="Введите имя...">
                <button class="btn btn-sm" id="btnSaveProfile">✅ Сохранить имя</button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН 3: СЕМЬЯ -->
    <div id="screenFamily" class="app-screen">
        <div class="screen-content">
            <h2 style="color: #00796b; text-align:center;">Моя Семья 🏡</h2>
            <div class="section-box">
                <label>Название Семьи:</label>
                <input type="text" id="familyNameInput" class="input-field" placeholder="Название вашей семьи...">
                <button class="btn btn-sm" id="btnSaveFamilyName">✅ Обновить название</button>
            </div>
            <div class="section-box">
                <h3>Участники:</h3>
                <div id="membersList"></div>
                <div style="margin-top: 15px;">
                    <input type="text" id="newMemberInput" class="input-field" placeholder="Имя нового участника...">
                    <button class="btn btn-sm" id="btnAddMember">➕ Добавить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН 4: ЧАТ -->
    <div id="screenChat" class="app-screen">
        <div class="screen-content chat-container">
            <h2 style="color: #00796b; text-align:center; margin: 0 0 10px 0;">Семейный Чат 💬</h2>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInputField" class="input-field" style="margin:0;" placeholder="Сообщение...">
                <button class="btn" id="btnSendMsg" style="margin:0; padding: 0 20px;">🚀</button>
            </div>
        </div>
    </div>

    <!-- НИЖНЕЕ МЕНЮ НАВИГАЦИИ -->
    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="switchScreen('screenMap', this)">🏡 Карта</button>
        <button class="nav-btn" onclick="switchScreen('screenProfile', this)">👤 Профиль</button>
        <button class="nav-btn" onclick="switchScreen('screenFamily', this)">👨‍👩‍👧 Семья</button>
        <button class="nav-btn" onclick="switchScreen('screenChat', this)">💬 Чат</button>
    </nav>

    <!-- МОДАЛЬНОЕ ОКНО КВЕСТОВ (Сохранено полностью) -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal-window">
            <h3 class="modal-title" id="modalTitle">Мебель 🏡</h3>
            <p>Назначить задание для этого объекта:</p>
            <input type="text" id="questInput" class="input-field" placeholder="Введите квест...">
            <div style="margin-top: 15px;">
                <button class="btn" id="btnSave">✅ Сохранить</button>
                <button class="btn btn-cancel" id="btnCancel">🔙 Отмена</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Локальное хранилище данных (чтобы ничего не пропадало без настроенного GAS) ---
    let appState = {
        zoom: 0.5, panX: 0, panY: 0, isDragging: false, startX: 0, startY: 0
    };
    
    let profileData = JSON.parse(localStorage.getItem('hq_profile')) || { name: "Пользователь", avatar: "" };
    let familyData = JSON.parse(localStorage.getItem('hq_family')) || { name: "Наша Семья", members: ["Мама", "Папа"] };
    let chatMessages = JSON.parse(localStorage.getItem('hq_chat')) || [{ sender: "Система", text: "Чат активирован! 🚀" }];
    let questData = {};

    // Элементы
    const viewport = document.getElementById('viewport');
    const mapContainer = document.getElementById('mapContainer');
    const adminModal = document.getElementById('adminModal');
    const questInput = document.getElementById('questInput');
    const modalTitle = document.getElementById('modalTitle');
    const questArrow = document.getElementById('questArrow');

    // Переключение экранов
    function switchScreen(screenId, btnElement) {
        document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        btnElement.classList.add('active');
        if(screenId === 'screenMap') initMapPosition();
    }

    // --- Логика Карта (Инициализация и перемещение без изменений) ---
    function initMapPosition() {
        const viewRect = viewport.getBoundingClientRect();
        appState.zoom = viewRect.width / 1000;
        appState.panX = 0;
        appState.panY = (viewRect.height - (1000 * appState.zoom)) / 2;
        updateTransform();
    }

    function updateTransform() {
        mapContainer.style.transform = `translate(${appState.panX}px, ${appState.panY}px) scale(${appState.zoom})`;
    }

    // Обработка кликов (Умный зум и подсветка)
    let lastTap = 0;
    let currentSelectedTarget = null;
    let originalTransformBeforeZoom = null;

    viewport.addEventListener('click', function(e) {
        const now = Date.now();
        const targetFurniture = e.target.closest('.furniture');
        if ((now - lastTap) < 300) {
            if (targetFurniture) {
                e.preventDefault();
                targetFurniture.classList.add('highlighted');
                setTimeout(() => targetFurniture.classList.remove('highlighted'), 1000);
                originalTransformBeforeZoom = { zoom: appState.zoom, panX: appState.panX, panY: appState.panY };
                const rect = mapContainer.getBoundingClientRect();
                const clickX = (e.clientX - rect.left) / appState.zoom;
                const clickY = (e.clientY - rect.top) / appState.zoom;
                appState.zoom = 1.2;
                const viewRect = viewport.getBoundingClientRect();
                appState.panX = viewRect.width / 2 - clickX * appState.zoom;
                appState.panY = viewRect.height / 2 - clickY * appState.zoom;
                keepMapInBounds();
                updateTransform();
                currentSelectedTarget = targetFurniture.id;
                modalTitle.innerText = `Объект: ${currentSelectedTarget} 🏡`;
                questInput.value = questData[currentSelectedTarget] || "";
                setTimeout(() => adminModal.style.display = 'flex', 300);
            }
        } else {
            if (targetFurniture && !appState.isDragging) {
                if (questData[targetFurniture.id]) alert(`Квест: "${questData[targetFurniture.id]}"`);
            }
        }
        lastTap = now;
    });

    function keepMapInBounds() {
        const minX = -1000 * appState.zoom + 50, maxX = viewport.clientWidth - 50;
        const minY = -1000 * appState.zoom + 50, maxY = viewport.clientHeight - 50;
        appState.panX = Math.min(Math.max(appState.panX, minX), maxX);
        appState.panY = Math.min(Math.max(appState.panY, minY), maxY);
    }

    function startDrag(cX, cY) { appState.isDragging = true; appState.startX = cX - appState.panX; appState.startY = cY - appState.panY; }
    function moveDrag(cX, cY) { if (!appState.isDragging) return; appState.panX = cX - appState.startX; appState.panY = cY - appState.startY; keepMapInBounds(); updateTransform(); }
    function stopDrag() { appState.isDragging = false; }

    viewport.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
    window.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
    window.addEventListener('mouseup', stopDrag);
    viewport.addEventListener('touchstart', (e) => { if(e.touches.length === 1) startDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    viewport.addEventListener('touchmove', (e) => { if(e.touches.length === 1) { e.preventDefault(); moveDrag(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
    viewport.addEventListener('touchend', stopDrag);

    document.getElementById('btnCancel').addEventListener('click', () => {
        adminModal.style.display = 'none';
        if (originalTransformBeforeZoom) { appState.zoom = originalTransformBeforeZoom.zoom; appState.panX = originalTransformBeforeZoom.panX; appState.panY = originalTransformBeforeZoom.panY; updateTransform(); }
    });
    document.getElementById('btnSave').addEventListener('click', () => {
        const txt = questInput.value.trim(); adminModal.style.display = 'none';
        if(txt) questData[currentSelectedTarget] = txt; else delete questData[currentSelectedTarget];
        const keys = Object.keys(questData);
        if (keys.length > 0) { questArrow.style.left = `500px`; questArrow.style.top = `500px`; questArrow.style.display = 'block'; } else { questArrow.style.display = 'none'; }
    });

    // --- Логика Управления Профилем (Исправлено) ---
    function renderProfile() {
        document.getElementById('profileNameInput').value = profileData.name;
        document.getElementById('profileAvatar').src = profileData.avatar || "data:image/svg+xml;utf8,<svg xmlns='w3.org' width='100' height='100' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23b2dfdb'/></svg>";
    }
    
    document.getElementById('btnSaveProfile').addEventListener('click', () => {
        profileData.name = document.getElementById('profileNameInput').value.trim() || "Пользователь";
        localStorage.setItem('hq_profile', JSON.stringify(profileData));
        alert("Имя профиля успешно сохранено! ✅");
    });

    document.getElementById('avatarLoader').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                profileData.avatar = event.target.result;
                localStorage.setItem('hq_profile', JSON.stringify(profileData));
                renderProfile();
            };
            reader.readAsDataURL(file);
        }
    });

    // --- Логика Управления Семьей и Участниками (Исправлено) ---
    function renderFamily() {
        document.getElementById('familyNameInput').value = familyData.name;
        const listContainer = document.getElementById('membersList');
        listContainer.innerHTML = "";
        familyData.members.forEach(member => {
            const div = document.createElement('div');
            div.className = "member-item";
            div.innerHTML = `<div class="member-avatar" style="background:#b2dfdb; display:flex; align-items:center; justify-content:center; font-size:12px;">👤</div><span>${member}</span>`;
            listContainer.appendChild(div);
        });
    }

    document.getElementById('btnSaveFamilyName').addEventListener('click', () => {
        familyData.name = document.getElementById('familyNameInput').value.trim() || "Наша Семья";
        localStorage.setItem('hq_family', JSON.stringify(familyData));
        alert("Название семьи обновлено! ✅");
    });

    document.getElementById('btnAddMember').addEventListener('click', () => {
        const newName = document.getElementById('newMemberInput').value.trim();
        if(newName) {
            familyData.members.push(newName);
            localStorage.setItem('hq_family', JSON.stringify(familyData));
            document.getElementById('newMemberInput').value = "";
            renderFamily();
        }
    });

    // --- Логика Семейного Чата (Исправлено) ---
    function renderChat() {
        const box = document.getElementById('chatMessages');
        box.innerHTML = "";
        chatMessages.forEach(m => {
            const isMe = m.sender === profileData.name;
            const div = document.createElement('div');
            div.className = `message-bubble ${isMe ? 'my-msg' : 'other-msg'}`;
            div.innerHTML = `<strong>${m.sender}:</strong> ${m.text}`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('btnSendMsg').addEventListener('click', () => {
        const inp = document.getElementById('chatInputField');
        const txt = inp.value.trim();
        if(txt) {
            chatMessages.push({ sender: profileData.name, text: txt });
            localStorage.setItem('hq_chat', JSON.stringify(chatMessages));
            inp.value = "";
            renderChat();
        }
    });

    // Инициализация при старте
    window.addEventListener('load', () => {
        initMapPosition();
        renderProfile();
        renderFamily();
        renderChat();
    });
    window.addEventListener('resize', initMapPosition);
</script>

</body>
</html>
