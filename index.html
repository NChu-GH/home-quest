<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Семейный Квест — с синхронизацией</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(145deg, #2e5f4b 0%, #1e3e31 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Chalkboard SE', 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .app {
            max-width: 1000px;
            width: 100%;
            background: #fdf8e7;
            border-radius: 70px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 20px;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            background: #ffd966;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 25px;
        }
        h1 { margin: 0; font-size: 1.5rem; color: #3b2a1f; }
        .player-selector {
            background: white;
            padding: 5px 12px;
            border-radius: 40px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        select, input {
            font-size: 1rem;
            padding: 6px;
            border-radius: 30px;
            font-family: inherit;
            border: 1px solid #ccc;
        }
        button {
            background: #ffb142;
            border: none;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
        }
        .bonus-box {
            background: #2c2b28;
            padding: 6px 18px;
            border-radius: 40px;
            color: #ffd966;
            font-weight: bold;
            font-size: 1.4rem;
        }
        .floorplan {
            background: #ecd9b4;
            border-radius: 50px;
            padding: 20px;
        }
        .rooms-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            justify-content: center;
        }
        .room-card {
            flex: 1;
            min-width: 160px;
            background: #fffaf0;
            border-radius: 35px;
            padding: 15px 10px 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 8px 0 #bba88a;
        }
        .room-card:active { transform: translateY(3px); box-shadow: 0 4px 0 #bba88a; }
        .room-name {
            font-size: 1.3rem;
            font-weight: bold;
            background: #ffb882;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            margin-bottom: 12px;
        }
        .task-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            background: #ffe1a0;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #ffb347;
        }
        .task-icon img { width: 60px; height: 60px; }
        .task-status {
            margin-top: 10px;
            font-size: 0.75rem;
            font-weight: bold;
            background: #e9e0cf;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-card {
            background: #fff6e8;
            border-radius: 50px;
            max-width: 320px;
            width: 85%;
            padding: 20px;
            text-align: center;
        }
        .close-btn { background: #b0aa9a; padding: 6px 18px; border-radius: 40px; border: none; cursor: pointer; }
        .loading, .empty-state {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
        }
        .add-player-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .add-player-form input, .add-player-form button {
            padding: 12px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="loading">Загрузка данных из таблицы... 🔄</div>
</div>

<div id="taskModal" class="modal">
    <div class="modal-card">
        <h3 id="modalRoomName"></h3>
        <div id="modalTaskImg" style="font-size: 4rem;"></div>
        <p id="modalTaskDesc"></p>
        <p>Награда: +<span id="modalReward"></span> ⭐️</p>
        <button id="completeTaskBtn" style="background:#ffb142;">✅ Выполнить!</button>
        <button class="close-btn" id="closeModalBtn">Закрыть</button>
    </div>
</div>

<script>
    // ======================== ВАШИ ССЫЛКИ ========================
    const PLAYERS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5LxPN-yeR88dl3gavERiHxE3XifP1IbupLaiHTjuRhQ9LJBkw9FnInodu0AuQKMWZz0wQ-Ai5UiVR/pub?gid=0&single=true&output=csv";
    const TASKS_CSV_URL   = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5LxPN-yeR88dl3gavERiHxE3XifP1IbupLaiHTjuRhQ9LJBkw9FnInodu0AuQKMWZz0wQ-Ai5UiVR/pub?gid=1230357202&single=true&output=csv";
    const COMPLETIONS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5LxPN-yeR88dl3gavERiHxE3XifP1IbupLaiHTjuRhQ9LJBkw9FnInodu0AuQKMWZz0wQ-Ai5UiVR/pub?gid=1681233988&single=true&output=csv";
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzz4tLNf6jdU85F_IZVE0xBpdyxiu4TGJlDEGXVop3WSTOFKJp4Alh_NdRSMZuDN1fQ/exec";
    // =============================================================

    let players = [], tasks = [], completions = [];
    let currentPlayerId = null, currentTask = null;
    const appDiv = document.getElementById("app");

    async function fetchCSV(url) {
        try {
            const resp = await fetch(url, { cache: "no-store" });
            if (!resp.ok) return [];
            const text = await resp.text();
            const rows = text.split("\n").filter(r => r.trim() !== "");
            if (rows.length < 2) return [];
            const headers = rows[0].split(",").map(h => h.trim());
            const data = [];
            for (let i = 1; i < rows.length; i++) {
                const values = rows[i].split(",");
                let obj = {};
                headers.forEach((h, idx) => { obj[h] = values[idx]?.trim() || ""; });
                data.push(obj);
            }
            return data;
        } catch (e) { return []; }
    }

    async function loadAllData() {
        const [playersRaw, tasksRaw, completionsRaw] = await Promise.all([
            fetchCSV(PLAYERS_CSV_URL),
            fetchCSV(TASKS_CSV_URL),
            fetchCSV(COMPLETIONS_CSV_URL)
        ]);
        players = playersRaw.map(p => ({ ...p, total_bonus: Number(p.total_bonus) || 0, id: String(p.id) }));
        tasks = tasksRaw.map(t => ({ ...t, reward: Number(t.reward) || 5, id: String(t.id) }));
        completions = completionsRaw.map(c => ({ task_id: String(c.task_id), player_id: String(c.player_id) }));
        
        console.log("Загружено игроков:", players.length);
        
        if (players.length === 0) {
            renderEmptyState();
        } else {
            if (!currentPlayerId || !players.find(p => p.id === currentPlayerId)) {
                currentPlayerId = players[0].id;
            }
            renderApp();
        }
    }

    function renderEmptyState() {
        appDiv.innerHTML = `
            <div class="empty-state">
                <h2>🏠 Добро пожаловать в Семейный Квест!</h2>
                <p>Пока нет ни одного игрока. Создайте первого (например, себя):</p>
                <div class="add-player-form">
                    <input type="text" id="newPlayerName" placeholder="Имя игрока" autocomplete="off">
                    <input type="text" id="newPlayerAvatar" placeholder="Эмодзи (🐶 🐱 🦊)" autocomplete="off" value="🐣">
                    <button id="createFirstPlayerBtn">✨ Создать первого игрока</button>
                </div>
                <p style="margin-top:20px; font-size:0.9rem;">После создания можно будет добавлять остальных.</p>
            </div>
        `;
        const btn = document.getElementById("createFirstPlayerBtn");
        if (btn) {
            btn.addEventListener("click", async () => {
                const name = document.getElementById("newPlayerName").value.trim();
                if (!name) { alert("Введите имя"); return; }
                const avatar = document.getElementById("newPlayerAvatar").value.trim() || "🐣";
                await addPlayerToSheet(name, avatar);
            });
        }
    }

    async function addPlayerToSheet(name, avatar) {
        try {
            const params = new URLSearchParams();
            params.append("action", "addPlayer");
            params.append("name", name);
            params.append("avatar", avatar);
            const response = await fetch(WEBAPP_URL, { 
                method: "POST", 
                body: params, 
                headers: { "Content-Type": "application/x-www-form-urlencoded" } 
            });
            const text = await response.text();
            if (!response.ok || text !== "OK") throw new Error("Сервер вернул: " + text);
            alert(`Игрок ${name} добавлен!`);
            // Принудительно очищаем кэш и перезагружаем
            currentPlayerId = null;
            await loadAllData();
        } catch (err) {
            alert("Ошибка при добавлении: " + err.message);
        }
    }

    function isTaskCompletedByPlayer(taskId) {
        return completions.some(c => c.task_id === taskId && c.player_id === currentPlayerId);
    }

    async function sendCompletion(taskId, playerId, reward) {
        const params = new URLSearchParams();
        params.append("task_id", taskId);
        params.append("player_id", playerId);
        params.append("reward", reward);
        const response = await fetch(WEBAPP_URL, { 
            method: "POST", 
            body: params, 
            headers: { "Content-Type": "application/x-www-form-urlencoded" } 
        });
        if (!response.ok) throw new Error("Ошибка записи");
        return await response.text();
    }

    async function onCompleteTask() {
        if (!currentTask || !currentPlayerId) return;
        if (isTaskCompletedByPlayer(currentTask.id)) {
            alert("Вы уже получали бонус за это задание!");
            closeModal();
            return;
        }
        try {
            await sendCompletion(currentTask.id, currentPlayerId, currentTask.reward);
            completions.push({ task_id: currentTask.id, player_id: currentPlayerId });
            const player = players.find(p => p.id === currentPlayerId);
            if (player) player.total_bonus += currentTask.reward;
            renderApp();
            closeModal();
            alert(`🎉 +${currentTask.reward} бонусов! Задание выполнено.`);
        } catch (err) {
            alert("Ошибка: " + err.message);
        }
    }

    function showTaskModal(task) {
        currentTask = task;
        document.getElementById("modalRoomName").innerText = task.room;
        document.getElementById("modalTaskImg").innerHTML = task.icon_url ? `<img src="${task.icon_url}" width="80">` : "🧹";
        document.getElementById("modalTaskDesc").innerText = task.description;
        document.getElementById("modalReward").innerText = task.reward;
        document.getElementById("taskModal").style.display = "flex";
    }

    function closeModal() { 
        document.getElementById("taskModal").style.display = "none"; 
        currentTask = null; 
    }

    function renderApp() {
        const currentPlayer = players.find(p => p.id === currentPlayerId);
        if (!currentPlayer) return;
        
        const roomsMap = new Map();
        tasks.forEach(task => { 
            if (!roomsMap.has(task.room)) roomsMap.set(task.room, []); 
            roomsMap.get(task.room).push(task); 
        });
        
        const playerOptions = players.map(p => 
            `<option value="${p.id}" ${p.id === currentPlayerId ? "selected" : ""}>${p.name} ${p.avatar || "🐣"} (⭐️ ${p.total_bonus})</option>`
        ).join("");
        
        const roomsHtml = Array.from(roomsMap.entries()).map(([roomName, roomTasks]) => `
            <div class="room-card">
                <div class="room-name">${roomName}</div>
                ${roomTasks.map(task => `
                    <div class="task-icon" data-task-id="${task.id}">${task.icon_url ? `<img src="${task.icon_url}">` : "📋"}</div>
                    <div class="task-status" style="background:${isTaskCompletedByPlayer(task.id) ? "#c8e6b5" : "#fff0c0"}">
                        ${isTaskCompletedByPlayer(task.id) ? "✅ Выполнено" : "⭐️ Ждёт"}
                    </div>
                `).join("")}
            </div>
        `).join("");
        
        appDiv.innerHTML = `
            <div class="header">
                <h1>🏠 Семейный Квест</h1>
                <div class="player-selector">👤 <select id="playerSelect">${playerOptions}</select></div>
                <div class="bonus-box">⭐️ ${currentPlayer.total_bonus}</div>
            </div>
            <div class="floorplan">
                <div class="rooms-grid">${roomsHtml}</div>
                <button id="resetLocalHint" style="width:100%; margin-top:20px;">🔄 Обновить</button>
            </div>
        `;
        
        document.querySelectorAll(".task-icon").forEach(el => {
            const task = tasks.find(t => t.id === el.dataset.taskId);
            if (task) el.addEventListener("click", (e) => { e.stopPropagation(); showTaskModal(task); });
        });
        
        const playerSelect = document.getElementById("playerSelect");
        if (playerSelect) {
            playerSelect.addEventListener("change", (e) => { 
                currentPlayerId = e.target.value; 
                renderApp(); 
            });
        }
        
        const resetBtn = document.getElementById("resetLocalHint");
        if (resetBtn) {
            resetBtn.addEventListener("click", () => loadAllData());
        }
    }

    // Навешиваем обработчики модалки после загрузки DOM
    document.addEventListener("DOMContentLoaded", () => {
        const completeBtn = document.getElementById("completeTaskBtn");
        const closeBtn = document.getElementById("closeModalBtn");
        if (completeBtn) completeBtn.addEventListener("click", onCompleteTask);
        if (closeBtn) closeBtn.addEventListener("click", closeModal);
        window.onclick = (e) => { if (e.target === document.getElementById("taskModal")) closeModal(); };
    });
    
    loadAllData();
</script>
</body>
</html>
