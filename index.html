<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Семейные Квесты - План Квартиры</title>
    <style>
        body { background-color: #e0f7fa; display: flex; flex-direction: column; align-items: center; padding: 10px; font-family: 'Comic Sans MS', cursive, sans-serif; margin: 0; min-height: 100vh; overflow: hidden; }
        .main-wrapper { width: 100%; max-width: 500px; display: flex; flex-direction: column; height: 100vh; }
        .top-bar { display: flex; justify-content: space-between; align-items: stretch; margin-bottom: 10px; gap: 8px; z-index: 100; }
        .profile-card { background: white; padding: 10px; border-radius: 20px; border: 3px solid #00796b; display: flex; align-items: center; gap: 10px; flex: 2; position: relative; min-width: 0; }
        .crown-icon { position: absolute; top: -15px; left: 5px; font-size: 25px; transform: rotate(-15deg); display: none; z-index: 10; }
        .is-admin .crown-icon { display: block; }
        .avatar-circle { width: 50px; height: 50px; background: #eee; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: pointer; border: 3px solid #00796b; overflow: hidden; background-size: cover; background-position: center; flex-shrink: 0; }
        .btn-group { display: flex; flex-direction: column; gap: 5px; flex: 0.8; }
        .menu-btn, .chat-btn { height: 100%; min-height: 40px; border-radius: 15px; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 16px; border: 3px solid; display: flex; justify-content: center; align-items: center; }
        .menu-btn { background: #ff9800; color: white; border-color: #e65100; }
        .chat-btn { background: #4caf50; color: white; border-color: #2e7d32; position: relative; }
        #chat-badge { position: absolute; top: -5px; right: -5px; background: #ff5252; color: white; border-radius: 50%; padding: 2px 7px; font-size: 12px; border: 2px solid white; font-weight: bold; }

        .map-viewport { flex: 1; width: 100%; position: relative; overflow: hidden; border: 6px solid #004d40; border-radius: 20px; background: #90a4ae; touch-action: none; }
        #map-outer { position: absolute; transform-origin: 0 0; width: 1000px; height: 1000px; transition: transform 0.4s ease-out; }
        
        /* ЗДЕСЬ ЗАМЕНЕНО НА Kvartira.png */
        .game-container { width: 100%; height: 100%; background-image: url('Kvartira.png'); background-size: contain; background-repeat: no-repeat; cursor: grab; }
        
        .arrow { position: absolute; width: 50px; height: 50px; cursor: pointer; animation: bounce 1.5s infinite; transform: translate(-50%, -50%); z-index: 20; }
        @keyframes bounce { 0%, 100% { transform: translate(-50%, -50%); } 50% { transform: translate(-50%, -75%); } }
        
        .zoom-controls { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .zoom-btn { width: 50px; height: 50px; border-radius: 15px; border: 3px solid #004d40; background: white; color: #004d40; font-size: 24px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 500; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 30px; border: 5px solid #00796b; text-align: center; width: 85%; max-width: 400px; z-index: 1000; box-shadow: 0 0 40px rgba(0,0,0,0.4); }
        .btn-choice { width: 100%; padding: 15px; margin: 5px 0; border-radius: 15px; border: 3px solid #00796b; cursor: pointer; font-family: inherit; font-size: 18px; background: white; font-weight: bold; }
        .sidebar { position: fixed; right: -100%; top: 0; width: 80%; max-width: 400px; height: 100%; background: white; border-left: 8px solid #ff9800; transition: 0.3s; padding: 20px; z-index: 1000; overflow-y: auto; box-sizing: border-box; }
        .sidebar.active { right: 0; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #00796b; font-family: inherit; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        .member-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #ffcc80; }
        .mini-ava { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #00796b; background-size: cover; background-position: center; display: inline-block; vertical-align: middle; margin-right: 8px; text-align: center; line-height: 35px; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="top-bar">
            <div id="p-card" class="profile-card">
                <div class="crown-icon">👑</div>
                <div id="current-avatar" class="avatar-circle" onclick="openAvatarPicker()"></div>
                <div style="flex:1; min-width: 0;">
                    <b id="current-user-name">...</b>
                    <div style="color: #00796b; font-weight: bold; font-size: 16px;">⭐️ <span id="score-val">0</span> <button onclick="renameCurrentPlayer()" style="border:none; background:none; font-size:16px; cursor:pointer;">✏️</button></div>
                </div>
            </div>
            <div class="btn-group">
                <button class="chat-btn" onclick="openChat()">💬<div id="chat-badge" style="display:none;">0</div></button>
                <button class="menu-btn" onclick="toggleSidebar()">⚙️</button>
            </div>
        </div>

        <div class="map-viewport" id="viewport">
            <div id="map-outer">
                <div id="game-map" class="game-container"></div>
            </div>
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="changeZoom(0.2)">+</button>
                <button class="zoom-btn" onclick="changeZoom(-0.2)">−</button>
            </div>
        </div>
    </div>

    <div id="overlay" onclick="closeAll()" class="overlay"></div>

    <div id="createQuestModal" class="modal">
        <h2 style="color:#00796b;">Создать задание 📝</h2>
        <input type="text" id="new-quest-text" placeholder="Например: Помыть коридор">
        <button class="btn-choice" style="background:#4caf50; color:white;" onclick="confirmCreateQuest()">ПОСТАВИТЬ ✅</button>
        <button class="btn-choice" onclick="cancelQuest()" style="color: #888; border-color:#ccc">ОТМЕНА</button>
    </div>

    <div id="taskModal" class="modal">
        <h2 id="taskText">...</h2>
        <button class="btn-choice" style="background:#00796b; color:white;" onclick="completeTask()">ГОТОВО! ✅</button>
    </div>

    <div id="chatModal" class="modal">
        <h2>Чат 💬</h2>
        <div id="chat-box" style="height:200px; overflow-y:auto; background:#f1f8e9; padding:10px; border-radius:20px; margin-bottom:10px; display:flex; flex-direction:column-reverse; text-align:left; font-size:18px;"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" placeholder="...">
            <button class="chat-btn" onclick="sendChat()" style="min-width:60px;">🚀</button>
        </div>
        <button class="btn-choice" onclick="closeAll()">ЗАКРЫТЬ</button>
    </div>

    <div id="avatarModal" class="modal">
        <h3>Аватар 🎭</h3>
        <button class="btn-choice" onclick="document.getElementById('photo-input').click()">📸 ФОТО</button>
        <input type="file" id="photo-input" style="display:none;" accept="image/*" onchange="handlePhoto(this)">
        <div id="emoji-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:10px 0;"></div>
        <button class="btn-choice" onclick="closeAll()">ОТМЕНА</button>
    </div>

    <div id="sidebar" class="sidebar">
        <h2 style="color:#00796b;">🏡 Семья</h2>
        <div id="family-list" style="background:#fff3e0; padding:12px; border-radius:15px; margin-bottom:20px;"></div>
        <button class="btn-choice" style="background:#4caf50; color:white; border:none;" onclick="addNewMember()">➕ НОВЫЙ ИГРОК</button>
        <h3 style="margin-top:25px; color:#e65100;">🔄 СМЕНИТЬ:</h3>
        <div id="switch-list"></div>
        <button class="btn-choice" onclick="closeAll()" style="margin-top:40px; background:#eee;">ЗАКРЫТЬ</button>
    </div>

    <script>
        let state;
        const storageKey = 'familyApp_FINAL';
        const mapOuter = document.getElementById('map-outer');
        const viewport = document.getElementById('viewport');
        const gameMap = document.getElementById('game-map');
        
        let scale = 0.5, posX = -250, posY = -250, isDragging = false, startX, startY;
        let lastTap = 0;
        let oldScale, oldPosX, oldPosY;

        function updateTransform() { mapOuter.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
        function changeZoom(delta) { scale = Math.min(Math.max(0.2, scale + delta), 2.5); updateTransform(); }

        const handleStart = (x, y) => { isDragging = true; startX = x - posX; startY = y - posY; mapOuter.style.transition = 'none'; };
        const handleMove = (x, y) => { if (!isDragging) return; posX = x - startX; posY = y - startY; updateTransform(); };
        const handleEnd = () => { isDragging = false; };

        viewport.addEventListener('mousedown', (e) => handleStart(e.pageX, e.pageY));
        window.addEventListener('mousemove', (e) => handleMove(e.pageX, e.pageY));
        window.addEventListener('mouseup', handleEnd);
        viewport.addEventListener('touchstart', (e) => { if (e.touches.length === 1) handleStart(e.touches.pageX, e.touches.pageY); });
        viewport.addEventListener('touchmove', (e) => { if (e.touches.length === 1) handleMove(e.touches.pageX, e.touches.pageY); });
        viewport.addEventListener('touchend', handleEnd);

        viewport.addEventListener('click', (e) => {
            if (state.currentUserIndex !== state.adminIndex) return;
            const now = Date.now();
            if (now - lastTap < 300) {
                oldScale = scale; oldPosX = posX; oldPosY = posY;
                const rect = viewport.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const clickY = e.clientY - rect.top;
                scale = 1.2; 
                posX = -( (clickX - oldPosX) / oldScale * scale - rect.width / 2 );
                posY = -( (clickY - oldPosY) / oldScale * scale - rect.height / 2 );
                mapOuter.style.transition = 'transform 0.4s ease-out';
                updateTransform();
                const mapRect = gameMap.getBoundingClientRect();
                window.tempCoords = { x: (e.clientX - mapRect.left) / oldScale, y: (e.clientY - mapRect.top) / oldScale };
                setTimeout(() => {
                    document.getElementById('createQuestModal').style.display = 'block';
                    document.getElementById('overlay').style.display = 'block';
                }, 400);
            }
            lastTap = now;
        });

        function cancelQuest() { scale = oldScale; posX = oldPosX; posY = oldPosY; updateTransform(); closeAll(); }

        function confirmCreateQuest() {
            const txt = document.getElementById('new-quest-text').value;
            if(txt) {
                state.quests.push({ x: window.tempCoords.x, y: window.tempCoords.y, text: txt, reward: 10 });
                document.getElementById('new-quest-text').value = '';
            }
            cancelQuest();
            save();
        }

        function loadData() {
            const saved = localStorage.getItem(storageKey);
            state = saved ? JSON.parse(saved) : { familyName: "Наша Семья", currentUserIndex: 0, adminIndex: 0, quests: [], messages: [], members: [{name: "Админ", points: 0, avatar: "👤", isPhoto: false, lastRead: Date.now()}] };
            updateUI();
        }
        function save() { localStorage.setItem(storageKey, JSON.stringify(state)); updateUI(); }
        function updateUI() {
            const user = state.members[state.currentUserIndex];
            document.getElementById('current-user-name').innerText = user.name;
            document.getElementById('score-val').innerText = user.points;
            document.getElementById('p-card').classList.toggle('is-admin', state.currentUserIndex === state.adminIndex);
            const avaDiv = document.getElementById('current-avatar');
            if (user.isPhoto) { avaDiv.innerText = ''; avaDiv.style.backgroundImage = `url(${user.avatar})`; }
            else { avaDiv.innerText = user.avatar; avaDiv.style.backgroundImage = 'none'; }
            gameMap.querySelectorAll('.arrow').forEach(a => a.remove());
            state.quests.forEach((q, i) => {
                const img = document.createElement('img'); img.src = 'arrow.png'; img.className = 'arrow';
                img.style.left = q.x + 'px'; img.style.top = q.y + 'px';
                img.onclick = (e) => { e.stopPropagation(); openQuest(i); };
                gameMap.appendChild(img);
            });
            const fList = document.getElementById('family-list');
            const sList = document.getElementById('switch-list');
            fList.innerHTML = ''; sList.innerHTML = '';
            state.members.forEach((m, i) => {
                let ava = m.isPhoto ? `<div class="mini-ava" style="background-image:url(${m.avatar})"></div>` : `<div class="mini-ava">${m.avatar}</div>`;
                fList.innerHTML += `<div class="member-item"><span>${ava} ${m.name} ${i === state.adminIndex ? '👑' : ''}</span><button onclick="setAdmin(${i})" style="border:none; background:none; font-size:22px;">👑</button></div>`;
                if(i !== state.currentUserIndex) sList.innerHTML += `<button class="btn-choice" onclick="switchProfile(${i})">${m.name}</button>`;
            });
            const count = state.messages.filter(m => m.date > (user.lastRead || 0) && m.text.includes('@' + user.name)).length;
            const badge = document.getElementById('chat-badge'); badge.style.display = count > 0 ? 'flex' : 'none'; badge.innerText = count;
        }

        function openQuest(idx) { window.activeIdx = idx; document.getElementById('taskText').innerText = state.quests[idx].text; document.getElementById('taskModal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
        function completeTask() { state.members[state.currentUserIndex].points += state.quests[window.activeIdx].reward; state.quests.splice(window.activeIdx, 1); closeAll(); save(); }
        function sendChat() { const inp = document.getElementById('chat-input'); if(!inp.value.trim()) return; state.messages.push({ author: state.members[state.currentUserIndex].name, text: inp.value, date: Date.now() }); inp.value = ''; renderChat(); save(); }
        function renderChat() { const box = document.getElementById('chat-box'); box.innerHTML = state.messages.map(m => `<div style="margin-bottom:8px; padding:10px; border-radius:12px; background:white; font-size:16px; border:1px solid #eee;"><b>${m.author}:</b> ${m.text}</div>`).reverse().join(''); }
        function openChat() { state.members[state.currentUserIndex].lastRead = Date.now(); document.getElementById('chatModal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; renderChat(); save(); }
        function switchProfile(i) { state.currentUserIndex = i; closeAll(); save(); }
        function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display='none'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
        function setAdmin(i) { state.adminIndex = i; save(); }
        function addNewMember() { let n = prompt("Имя:"); if(n) { state.members.push({name: n, points: 0, avatar: '👤', isPhoto: false, lastRead: Date.now()}); save(); } }
        function renameCurrentPlayer() { let n = prompt("Имя:", state.members[state.currentUserIndex].name); if(n) { state.members[state.currentUserIndex].name = n; save(); } }
        function renameAnyMember(i) { let n = prompt("Имя:", state.members[i].name); if(n) { state.members[i].name = n; save(); } }
        function openAvatarPicker() { closeAll(); document.getElementById('avatarModal').style.display='block'; document.getElementById('overlay').style.display='block'; }
        function setAvatar(e) { state.members[state.currentUserIndex].avatar = e; state.members[state.currentUserIndex].isPhoto = false; save(); closeAll(); }
        function handlePhoto(input) { if (input.files && input.files) { const reader = new FileReader(); reader.onload = (e) => { state.members[state.currentUserIndex].avatar = e.target.result; state.members[state.currentUserIndex].isPhoto = true; save(); closeAll(); }; reader.readAsDataURL(input.files); } }
        const emojis = ['🐱','🐶','🦊','🐼','🐨','🐯','🦁','🦄','👤','🐷','🐸','🦒'];
        document.getElementById('emoji-grid').innerHTML = emojis.map(e => `<span onclick="setAvatar('${e}')" style="font-size:35px; cursor:pointer;">${e}</span>`).join('');
        loadData();
        updateTransform();
    </script>
</body>
</html>
