<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Семейный Квест — с синхронизацией</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #2e5f4b 0%, #1e3e31 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Chalkboard SE', 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .app {
            max-width: 1000px;
            width: 100%;
            background: #fdf8e7;
            border-radius: 70px 70px 50px 50px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 20px 20px 30px;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            background: #ffd966;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 25px;
        }
        h1 { margin: 0; font-size: 1.5rem; color: #3b2a1f; }
        .player-selector {
            background: white;
            padding: 5px 12px;
            border-radius: 40px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        select {
            font-size: 1rem;
            padding: 6px;
            border-radius: 30px;
            font-family: inherit;
        }
        .bonus-box {
            background: #2c2b28;
            padding: 6px 18px;
            border-radius: 40px;
            color: #ffd966;
            font-weight: bold;
            font-size: 1.4rem;
        }

        .floorplan {
            background: #ecd9b4;
            border-radius: 50px;
            padding: 20px;
        }
        .rooms-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            justify-content: center;
        }
        .room-card {
            flex: 1;
            min-width: 160px;
            background: #fffaf0;
            border-radius: 35px;
            padding: 15px 10px 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 8px 0 #bba88a;
            transition: 0.1s linear;
        }
        .room-card:active { transform: translateY(3px); box-shadow: 0 4px 0 #bba88a; }
        .room-name {
            font-size: 1.3rem;
            font-weight: bold;
            background: #ffb882;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            margin-bottom: 12px;
        }
        .task-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            background: #ffe1a0;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #ffb347;
        }
        .task-icon img { width: 60px; height: 60px; }
        .task-status {
            margin-top: 10px;
            font-size: 0.75rem;
            font-weight: bold;
            background: #e9e0cf;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
        }
        .reset-btn {
            background: #6c4f2e;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            margin-top: 20px;
            width: 100%;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-card {
            background: #fff6e8;
            border-radius: 50px;
            max-width: 320px;
            width: 85%;
            padding: 20px;
            text-align: center;
        }
        .get-bonus-btn {
            background: #ffb142;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 50px;
            margin: 10px 0;
            cursor: pointer;
        }
        .close-btn { background: #b0aa9a; padding: 6px 18px; border-radius: 40px; border: none; cursor: pointer; }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="loading">Загрузка данных из таблицы... 🔄</div>
</div>

<div id="taskModal" class="modal">
    <div class="modal-card">
        <h3 id="modalRoomName"></h3>
        <div id="modalTaskImg" style="font-size: 4rem;"></div>
        <p id="modalTaskDesc"></p>
        <p>Награда: +<span id="modalReward"></span> ⭐️</p>
        <button class="get-bonus-btn" id="completeTaskBtn">✅ Выполнить!</button>
        <button class="close-btn" id="closeModalBtn">Закрыть</button>
    </div>
</div>

<script>
    // ======================== ВАШИ ССЫЛКИ (ВСТАВЛЕНЫ) ========================
    const PLAYERS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5LxPN-yeR88dl3gavERiHxE3XifP1IbupLaiHTjuRhQ9LJBkw9FnInodu0AuQKMWZz0wQ-Ai5UiVR/pub?gid=0&single=true&output=csv";
    const TASKS_CSV_URL   = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5LxPN-yeR88dl3gavERiHxE3XifP1IbupLaiHTjuRhQ9LJBkw9FnInodu0AuQKMWZz0wQ-Ai5UiVR/pub?gid=1230357202&single=true&output=csv";
    const COMPLETIONS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5LxPN-yeR88dl3gavERiHxE3XifP1IbupLaiHTjuRhQ9LJBkw9FnInodu0AuQKMWZz0wQ-Ai5UiVR/pub?gid=1681233988&single=true&output=csv";
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzz4tLNf6jdU85F_IZVE0xBpdyxiu4TGJlDEGXVop3WSTOFKJp4Alh_NdRSMZuDN1fQ/exec";
    // =========================================================================

    let players = [];
    let tasks = [];
    let completions = [];
    
    let currentPlayerId = null;
    let currentTask = null;

    const appDiv = document.getElementById("app");

    async function fetchCSV(url) {
        const resp = await fetch(url);
        const text = await resp.text();
        const rows = text.split("\n").filter(r => r.trim() !== "");
        if (rows.length < 2) return [];
        const headers = rows[0].split(",").map(h => h.trim());
        const data = [];
        for (let i = 1; i < rows.length; i++) {
            const values = rows[i].split(",");
            let obj = {};
            headers.forEach((h, idx) => { obj[h] = values[idx]?.trim() || ""; });
            data.push(obj);
        }
        return data;
    }

    async function loadAllData() {
        try {
            const [playersRaw, tasksRaw, completionsRaw] = await Promise.all([
                fetchCSV(PLAYERS_CSV_URL),
                fetchCSV(TASKS_CSV_URL),
                fetchCSV(COMPLETIONS_CSV_URL)
            ]);
            players = playersRaw.map(p => ({ ...p, total_bonus: Number(p.total_bonus) || 0, id: String(p.id) }));
            tasks = tasksRaw.map(t => ({ ...t, reward: Number(t.reward) || 5, id: String(t.id) }));
            completions = completionsRaw.map(c => ({ task_id: String(c.task_id), player_id: String(c.player_id) }));
            
            if (players.length === 0) throw new Error("Нет игроков. Добавьте хотя бы одного в лист players.");
            if (!currentPlayerId || !players.find(p => p.id === currentPlayerId)) {
                currentPlayerId = players[0].id;
            }
            renderApp();
        } catch (err) {
            appDiv.innerHTML = `<div class="loading">❌ Ошибка загрузки: ${err.message}<br>Проверьте ссылки CSV и доступ к таблицам.</div>`;
        }
    }

    function isTaskCompletedByPlayer(taskId) {
        return completions.some(c => c.task_id === taskId && c.player_id === currentPlayerId);
    }

    async function sendCompletion(taskId, playerId, reward) {
        const params = new URLSearchParams();
        params.append("task_id", taskId);
        params.append("player_id", playerId);
        params.append("reward", reward);
        const response = await fetch(WEBAPP_URL, {
            method: "POST",
            body: params,
            headers: { "Content-Type": "application/x-www-form-urlencoded" }
        });
        if (!response.ok) throw new Error("Ошибка записи");
        return await response.text();
    }

    async function onCompleteTask() {
        if (!currentTask || !currentPlayerId) return;
        const taskId = currentTask.id;
        const reward = currentTask.reward;
        
        if (isTaskCompletedByPlayer(taskId)) {
            alert("Вы уже получали бонус за это задание!");
            closeModal();
            return;
        }
        
        try {
            await sendCompletion(taskId, currentPlayerId, reward);
            completions.push({ task_id: taskId, player_id: currentPlayerId });
            const player = players.find(p => p.id === currentPlayerId);
            if (player) player.total_bonus += reward;
            renderApp();
            closeModal();
            alert(`🎉 +${reward} бонусов! Задание выполнено.`);
        } catch (err) {
            alert("Не удалось сохранить выполнение: " + err.message);
        }
    }

    function showTaskModal(task) {
        currentTask = task;
        document.getElementById("modalRoomName").innerText = task.room;
        document.getElementById("modalTaskImg").innerHTML = task.icon_url ? `<img src="${task.icon_url}" width="80">` : "🧹";
        document.getElementById("modalTaskDesc").innerText = task.description;
        document.getElementById("modalReward").innerText = task.reward;
        document.getElementById("taskModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("taskModal").style.display = "none";
        currentTask = null;
    }

    function renderApp() {
        const currentPlayer = players.find(p => p.id === currentPlayerId);
        if (!currentPlayer) return;
        
        const roomsMap = new Map();
        tasks.forEach(task => {
            if (!roomsMap.has(task.room)) roomsMap.set(task.room, []);
            roomsMap.get(task.room).push(task);
        });
        
        const playerOptions = players.map(p => `<option value="${p.id}" ${p.id === currentPlayerId ? "selected" : ""}>${p.name} ${p.avatar || "🐣"} (⭐️ ${p.total_bonus})</option>`).join("");
        
        const roomsHtml = Array.from(roomsMap.entries()).map(([roomName, roomTasks]) => `
            <div class="room-card">
                <div class="room-name">${roomName}</div>
                ${roomTasks.map(task => {
                    const completed = isTaskCompletedByPlayer(task.id);
                    return `
                        <div class="task-icon" data-task-id="${task.id}">
                            ${task.icon_url ? `<img src="${task.icon_url}" alt="задание">` : "📋"}
                        </div>
                        <div class="task-status" style="background:${completed ? "#c8e6b5" : "#fff0c0"}">
                            ${completed ? "✅ Выполнено" : "⭐️ Ждёт"}
                        </div>
                    `;
                }).join("")}
            </div>
        `).join("");
        
        const fullHtml = `
            <div class="header">
                <h1>🏠 Семейный Квест</h1>
                <div class="player-selector">
                    👤 <select id="playerSelect">${playerOptions}</select>
                </div>
                <div class="bonus-box">⭐️ ${currentPlayer.total_bonus}</div>
            </div>
            <div class="floorplan">
                <div class="rooms-grid">${roomsHtml}</div>
                <button class="reset-btn" id="resetLocalHint">🔄 Сменить игрока или обновить</button>
            </div>
        `;
        appDiv.innerHTML = fullHtml;
        
        document.querySelectorAll(".task-icon").forEach(el => {
            const taskId = el.dataset.taskId;
            const task = tasks.find(t => t.id === taskId);
            if (task) el.addEventListener("click", (e) => { e.stopPropagation(); showTaskModal(task); });
        });
        document.getElementById("playerSelect").addEventListener("change", (e) => {
            currentPlayerId = e.target.value;
            renderApp();
        });
        document.getElementById("resetLocalHint").addEventListener("click", () => loadAllData());
    }

    document.getElementById("completeTaskBtn").addEventListener("click", onCompleteTask);
    document.getElementById("closeModalBtn").addEventListener("click", closeModal);
    window.onclick = (e) => { if (e.target === document.getElementById("taskModal")) closeModal(); };
    
    loadAllData();
</script>
</body>
</html>
