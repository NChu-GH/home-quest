<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Семейный Квест</title>
    <style>
        *{box-sizing:border-box}
        body{background:#e0f7fa;font-family:'Comic Sans MS',cursive,sans-serif;margin:0;padding:0;height:100vh;overflow:hidden;font-size:18px}
        .main-wrapper{width:100%;max-width:500px;margin:0 auto;display:flex;flex-direction:column;height:100%}
        .top-bar{display:flex;align-items:stretch;gap:8px;padding:10px;flex-shrink:0}
        .profile-card{flex:1;background:white;padding:6px 10px;border-radius:30px;border:3px solid #00796b;display:flex;align-items:center;gap:8px;position:relative;cursor:pointer;min-width:0}
        .btn-group{flex:2;display:flex;gap:10px;position:relative}
        .menu-btn,.chat-btn{flex:1;border-radius:30px;cursor:pointer;font-weight:bold;font-size:22px;border:3px solid;display:flex;align-items:center;justify-content:center;position:relative}
        .chat-btn{background:#4caf50;color:white;border-color:#2e7d32}
        .menu-btn{background:#ff9800;color:white;border-color:#e65100}
        .badge{position:absolute;top:-8px;right:-8px;background:red;color:white;border-radius:20px;padding:2px 8px;font-size:12px;font-weight:bold;min-width:20px;text-align:center}
        .crown-icon{position:absolute;top:-16px;left:5px;font-size:28px;display:none}
        .is-admin .crown-icon{display:block}
        .avatar-circle{width:46px;height:46px;background:#eee;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;border:2px solid #00796b;flex-shrink:0}
        .user-info{flex:1;min-width:0}
        .user-name{font-weight:bold;font-size:18px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .bonus-line{display:flex;align-items:center;gap:4px;font-size:16px;color:#00796b}
        .bonus-line button{background:none;border:none;font-size:18px;cursor:pointer;padding:0 4px}
        .map-viewport{flex:1;position:relative;overflow:hidden;background:#cfd8dc;touch-action:none}
        #map-container{position:absolute;width:1000px;height:1000px;transform-origin:0 0}
        .layer{position:absolute;top:0;left:0;width:1000px;height:1000px;pointer-events:none;background-size:contain;background-repeat:no-repeat}
        .highlight{filter:drop-shadow(0 0 18px #00e5ff)brightness(1.3)!important}
        #quest-arrows{position:absolute;top:0;left:0;width:1000px;height:1000px;pointer-events:none;z-index:60}
        .arrow{position:absolute;width:40px;height:40px;cursor:pointer;animation:bounce 1.5s infinite;transform:translate(-50%,-50%);pointer-events:auto}
        @keyframes bounce{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,-75%)}}
        .overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:500}
        .modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:40px;border:5px solid #00796b;text-align:center;width:85%;max-width:420px;z-index:1000}
        .btn-choice{width:100%;padding:14px;margin:8px 0;border-radius:40px;border:2px solid #00796b;cursor:pointer;font-size:18px;font-weight:bold;background:white}
        .sidebar{position:fixed;right:-550px;top:0;width:85%;max-width:420px;height:100%;background:white;border-left:8px solid #ff9800;transition:0.4s;padding:25px;z-index:1000;overflow-y:auto}
        .sidebar.active{right:0}
        .member-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:2px solid #ffcc80;font-size:18px}
        .zoom-controls{position:absolute;bottom:15px;right:15px;display:flex;flex-direction:column;gap:8px;z-index:110}
        .z-btn{width:55px;height:55px;border-radius:20px;border:3px solid #004d40;background:white;font-size:28px;font-weight:bold;cursor:pointer}
        .status-msg{position:fixed;bottom:10px;left:10px;background:rgba(0,0,0,0.7);color:white;padding:8px 12px;border-radius:20px;font-size:14px;z-index:999}
        .messages{height:200px;overflow-y:auto;background:#f5f5f5;border-radius:20px;padding:12px;margin:10px 0;font-size:16px;text-align:left}
        .chat-message{padding:8px;border-bottom:1px solid #ddd}
        .chat-sender{font-weight:bold;color:#00796b;font-size:16px}
        .chat-input-area{display:flex;gap:10px}
        .chat-input-area input{flex:1;padding:14px;border-radius:40px;border:2px solid #00796b;font-size:16px}
        .chat-tabs{display:flex;gap:12px;margin-bottom:12px}
        .chat-tab{flex:1;padding:10px;text-align:center;cursor:pointer;border-radius:40px;background:#e0e0e0;font-size:16px;position:relative}
        .chat-tab.active{background:#00796b;color:white}
        .tab-badge{position:absolute;top:-5px;right:-5px;background:red;color:white;border-radius:20px;padding:2px 8px;font-size:11px;min-width:18px}
        .admin-notice{background:#ffe0b3;border-left:4px solid #ff9800;padding:8px;margin:5px 0}
        .profile-actions{margin-top:15px;display:flex;flex-direction:column;gap:10px}
        .profile-btn{background:#f0f0f0;border:2px solid #00796b;border-radius:40px;padding:12px;font-size:18px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
        .player-selector-title{font-size:20px;margin:15px 0 10px;color:#e65100}
        input,button{font-family:inherit}
    </style>
</head>

let unreadCounts={general:0,tech:0};
const container=document.getElementById('map-container'),view=document.getElementById('viewport'),qBox=document.getElementById('quest-arrows');

// ========== ВСЯ МЕБЕЛЬ С КООРДИНАТАМИ ==========
const furnitureZones = [

// ========== ЗОНЫ КОМНАТ (для пустых мест) ==========
const roomZones = [

function getZoneName(x,y){
    for(let z of roomZones){
        if(x>=z.x1 && x<=z.x2 && y>=z.y1 && y<=z.y2) return z.name;
    }
    return "Комната";
}

let scale=0.5,posX=0,posY=0,isDragging=false,startX,startY,lastTap=0,initialDist=null,initialScale=0,oldPos={s:0.5,x:0,y:0};
function updateTransform(){container.style.transform=`translate(${posX}px,${posY}px) scale(${scale})`;}
function applyZoom(d,cx,cy){let r=view.getBoundingClientRect(),ns=Math.min(Math.max(0.1,scale+d),4);posX=(cx-r.left)-(cx-r.left-posX)*(ns/scale);posY=(cy-r.top)-(cy-r.top-posY)*(ns/scale);scale=ns;updateTransform();}
function btnZoom(d){applyZoom(d,view.offsetWidth/2,view.offsetHeight/2);}
view.addEventListener('touchstart',e=>{if(e.touches.length===1){isDragging=true;startX=e.touches[0].clientX-posX;startY=e.touches[0].clientY-posY;container.style.transition='none';}else if(e.touches.length===2){isDragging=false;initialDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);initialScale=scale;}},{passive:false});
view.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&isDragging){posX=e.touches[0].clientX-startX;posY=e.touches[0].clientY-startY;updateTransform();}else if(e.touches.length===2&&initialDist){let cd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);applyZoom((initialScale*(cd/initialDist))-scale,(e.touches[0].clientX+e.touches[1].clientX)/2,(e.touches[0].clientY+e.touches[1].clientY)/2);}},{passive:false});
view.addEventListener('touchend',()=>{isDragging=false;initialDist=null;});
view.addEventListener('mousedown',e=>{isDragging=true;startX=e.clientX-posX;startY=e.clientY-posY;container.style.transition='none';});
window.addEventListener('mousemove',e=>{if(isDragging){posX=e.clientX-startX;posY=e.clientY-startY;updateTransform();}});
window.addEventListener('mouseup',()=>isDragging=false);
view.addEventListener('wheel',e=>{e.preventDefault();applyZoom(e.deltaY<0?0.1:-0.1,e.clientX,e.clientY);},{passive:false});

// ГЛАВНЫЙ КЛИК: СНАЧАЛА МЕБЕЛЬ, ПОТОМ КОМНАТА
view.addEventListener('click',e=>{
    if(state.members.length>0 && state.currentUserId !== state.adminId) return;
    let now=Date.now();
    if(now-lastTap<300){
        let rect=container.getBoundingClientRect();
        let mapX=(e.clientX-rect.left)/scale, mapY=(e.clientY-rect.top)/scale;
        let foundFurniture=null;
        for(let f of furnitureZones){
            let dx=f.x-mapX, dy=f.y-mapY;
            let dist=Math.sqrt(dx*dx+dy*dy);
            if(dist<f.r){
                foundFurniture=f;
                break;
            }
        }
        let zoneName = "";
        if(foundFurniture){
            let el=document.getElementById('obj-'+foundFurniture.id);
            if(el){el.classList.add('highlight');setTimeout(()=>el.classList.remove('highlight'),800);}
            zoneName = foundFurniture.name;
            showStatus(`📍 ${zoneName}`, false);
        } else {
            zoneName = getZoneName(mapX, mapY);
            showStatus(`📍 ${zoneName}`, false);
        }
        oldPos={s:scale,x:posX,y:posY};
        applyZoom(1.4-scale,e.clientX,e.clientY);
        container.style.transition='transform 0.4s ease-out';
        window.tempCoords={x:mapX,y:mapY,room:zoneName};
        setTimeout(()=>{
            document.getElementById('furniture-hint').innerHTML = `📍 ${zoneName}`;
            document.getElementById('createQuestModal').style.display='block';
            document.getElementById('overlay').style.display='block';
        },350);
    }
    lastTap=now;
});

function updateBadges(){
    const total = unreadCounts.general + unreadCounts.tech;
    const chatBadge = document.getElementById('chatBadge');
    if(total>0){chatBadge.style.display='flex';chatBadge.innerText=total>99?'99+':total;}
    else chatBadge.style.display='none';
    const gb=document.getElementById('generalBadge'), tb=document.getElementById('techBadge');
    if(unreadCounts.general>0){gb.style.display='flex';gb.innerText=unreadCounts.general>99?'99+':unreadCounts.general;}
    else gb.style.display='none';
    if(unreadCounts.tech>0){tb.style.display='flex';tb.innerText=unreadCounts.tech>99?'99+':unreadCounts.tech;}
    else tb.style.display='none';
}

function showStatus(m,e){let el=document.getElementById('statusMsg');el.innerHTML=m;el.style.background=e?'rgba(255,0,0,0.8)':'rgba(0,0,0,0.7)';setTimeout(()=>el.innerHTML='',3000);}
function loadToken(){let t=localStorage.getItem('githubToken');if(t&&t.startsWith('ghp_')){githubToken=t;return true;}return false;}
function saveToken(){let t=document.getElementById('tokenInput').value.trim();if(t&&t.startsWith('ghp_')){githubToken=t;localStorage.setItem('githubToken',t);showStatus('✅ Токен сохранён');closeModal();loadFromGitHub();}else showStatus('❌ Неверный токен',true);}
function skipToken(){showStatus('⚠️ Режим просмотра',true);closeModal();loadFromGitHub();}
async function loadFromGitHub(){document.getElementById('loader').style.display='flex';try{let res=await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${DATA_FILE}?t=${Date.now()}`);if(res.ok){let d=await res.json();state.members=d.members||[];state.quests=d.quests||[];state.messages=d.messages||{general:[],tech:[]};state.adminId=d.adminId||(state.members[0]?.id||null);state.currentUserId=d.currentUserId||(state.members[0]?.id||null);if(!state.messages.general)state.messages.general=[];if(!state.messages.tech)state.messages.tech=[];}else{state.members=[];state.quests=[];state.messages={general:[],tech:[]};state.adminId=null;state.currentUserId=null;}}catch(e){state.members=[];state.quests=[];state.messages={general:[],tech:[]};state.adminId=null;state.currentUserId=null;}
let sid=localStorage.getItem('currentUserId');if(sid&&state.members.find(m=>m.id===sid))state.currentUserId=sid;else if(state.members.length>0){state.currentUserId=state.members[0].id;localStorage.setItem('currentUserId',state.currentUserId);}
updateUI();renderQuestsOnMap();updateBadges();document.getElementById('loader').style.display='none';}
async function saveToGitHub(){if(!githubToken){showStatus('⚠️ Нет токена',true);return false;}
let data={members:state.members,quests:state.quests,messages:state.messages,adminId:state.adminId,currentUserId:state.currentUserId,updated:new Date().toISOString()};
try{let content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),url=`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`;
let shaRes=await fetch(url,{headers:{'Authorization':`token ${githubToken}`}}),sha=null;if(shaRes.ok){let ex=await shaRes.json();sha=ex.sha;}
let res=await fetch(url,{method:'PUT',headers:{'Authorization':`token ${githubToken}`,'Content-Type':'application/json'},body:JSON.stringify({message:'Обновление',content:content,sha:sha})});
if(res.ok){showStatus('✅ Сохранено');return true;}else{let err=await res.text();showStatus('❌ '+err.substring(0,100),true);return false;}}catch(e){showStatus('❌ '+e.message,true);return false;}}
function renderQuestsOnMap(){qBox.innerHTML='';if(!state.quests||state.quests.length===0)return;state.quests.forEach((q,i)=>{let img=document.createElement('img');img.src='arrow.png';img.className='arrow';img.style.left=q.x+'px';img.style.top=q.y+'px';img.onclick=e=>{e.stopPropagation();openQuest(i);};qBox.appendChild(img);});}
function updateUI(){let user=state.members.find(m=>m.id===state.currentUserId)||state.members[0];if(!user&&state.members.length===0){document.getElementById('current-user-name').innerText='Нет игроков';document.getElementById('score-val').innerText='0';document.getElementById('current-avatar').innerText='👤';document.getElementById('p-card').classList.remove('is-admin');return;}
document.getElementById('current-user-name').innerText=user.name;document.getElementById('score-val').innerText=user.points;document.getElementById('current-avatar').innerText=user.avatar;document.getElementById('p-card').classList.toggle('is-admin',state.currentUserId===state.adminId);
let fl=document.getElementById('family-list');if(fl){fl.innerHTML='';state.members.forEach(m=>{fl.innerHTML+=`<div class="member-item"><span>${m.avatar} ${m.name} ${m.id===state.adminId?'👑':''} (⭐️ ${m.points})</span><div><button onclick="setAdmin('${m.id}')" style="font-size:22px;">👑</button><button onclick="renameAnyMember('${m.id}')" style="font-size:22px;">✏️</button></div></div>`;});}
let sl=document.getElementById('switch-list');if(sl){sl.innerHTML='<div class="player-selector-title">🔄 Сменить героя:</div>';state.members.forEach(m=>{if(m.id!==state.currentUserId)sl.innerHTML+=`<button class="btn-choice" onclick="switchProfile('${m.id}')">${m.name} (⭐️ ${m.points})</button>`;});}}
function openPlayerSelector(){if(!state.members.length)return;let html='';state.members.forEach(m=>{html+=`<div class="member-item" style="cursor:pointer" onclick="selectPlayerFromModal('${m.id}')"><span>${m.avatar} ${m.name} ${m.id===state.adminId?'👑':''}</span><span>⭐️ ${m.points}</span></div>`;});document.getElementById('player-list-modal').innerHTML=html;document.getElementById('playerSelectModal').style.display='block';document.getElementById('overlay').style.display='block';}
function selectPlayerFromModal(id){if(id===state.currentUserId){closeModal();return;}state.currentUserId=id;localStorage.setItem('currentUserId',id);saveToGitHub();updateUI();closeModal();showStatus(`✅ Теперь вы играете за ${state.members.find(m=>m.id===id)?.name}`);}
function openTransferBonus(){let cp=state.members.find(m=>m.id===state.currentUserId);let op=state.members.filter(m=>m.id!==state.currentUserId);if(op.length===0){showStatus('❌ Нет других игроков',true);closeModal();return;}
let html='';op.forEach(p=>{html+=`<div class="member-item" style="cursor:pointer" onclick="transferToPlayer('${p.id}')"><span>${p.avatar} ${p.name}</span><span>⭐️ ${p.points}</span></div>`;});document.getElementById('transfer-list').innerHTML=html;document.getElementById('transferModal').style.display='block';document.getElementById('overlay').style.display='block';}
async function transferToPlayer(id){let cp=state.members.find(m=>m.id===state.currentUserId);let target=state.members.find(m=>m.id===id);let amt=prompt(`Сколько бонусов передать ${target.name}? (У тебя ${cp.points})`,'10');if(amt&&!isNaN(parseInt(amt))){let a=parseInt(amt);if(a>cp.points){showStatus(`❌ У тебя только ${cp.points} бонусов`,true);return;}if(a<=0){showStatus('❌ Сумма >0',true);return;}
cp.points-=a;target.points+=a;await saveToGitHub();updateUI();await addTechMessage(`💰 ${cp.name} передал(а) ${a}⭐️ игроку ${target.name}!`);showStatus(`✅ Передано ${a}⭐️`);closeModal();closeModal();}}
async function confirmCreateQuest(){let txt=document.getElementById('new-quest-text').value,reward=parseInt(document.getElementById('quest-reward').value)||10;if(txt&&window.tempCoords){state.quests.push({id:Date.now().toString(),x:window.tempCoords.x,y:window.tempCoords.y,text:txt,reward:reward});document.getElementById('new-quest-text').value='';document.getElementById('quest-reward').value='10';await saveToGitHub();renderQuestsOnMap();let author=state.members.find(m=>m.id===state.currentUserId);await addTechMessage(`📋 ${author?.name} создал(а) задание: "${txt}" (+${reward}⭐️) в зоне ${window.tempCoords.room}`);}cancelQuest();}
async function completeTask(){if(currentTaskIndex!==null&&state.quests[currentTaskIndex]){let q=state.quests[currentTaskIndex],p=state.members.find(m=>m.id===state.currentUserId);if(p){p.points+=q.reward;state.quests.splice(currentTaskIndex,1);await saveToGitHub();renderQuestsOnMap();updateUI();showStatus(`✅ +${q.reward} бонусов!`);await addTechMessage(`🎉 ${p.name} выполнил(а) задание "${q.text}" и получил(а) +${q.reward}⭐️`);}}closeAll();}
async function addTechMessage(t){let s=state.members.find(m=>m.id===state.currentUserId);let isAdminMsg=t.includes('ЗАПРАШИВАЕТ')||t.includes('админа');state.messages.tech.push({id:Date.now().toString(),sender:"⚙️ Система",text:t,time:new Date().toLocaleTimeString()});if(state.messages.tech.length>200)state.messages.tech=state.messages.tech.slice(-200);await saveToGitHub();
if(currentChatTab!=='tech'){unreadCounts.tech++;updateBadges();}
if(currentChatTab==='tech'&&document.getElementById('chatMessages')){let cd=document.getElementById('chatMessages');let msgDiv=document.createElement('div');msgDiv.className='chat-message';if(isAdminMsg)msgDiv.classList.add('admin-notice');msgDiv.innerHTML=`<span class="chat-sender">⚙️ Система:</span> ${t}`;cd.appendChild(msgDiv);cd.scrollTop=cd.scrollHeight;}}
async function addGeneralMessage(t){let s=state.members.find(m=>m.id===state.currentUserId);state.messages.general.push({id:Date.now().toString(),sender:s?.name||"Аноним",text:t,time:new Date().toLocaleTimeString()});if(state.messages.general.length>200)state.messages.general=state.messages.general.slice(-200);await saveToGitHub();
if(currentChatTab!=='general'){unreadCounts.general++;updateBadges();}
if(currentChatTab==='general'&&document.getElementById('chatMessages')){let cd=document.getElementById('chatMessages');let msgDiv=document.createElement('div');msgDiv.className='chat-message';msgDiv.innerHTML=`<span class="chat-sender">${s?.name||"Аноним"}:</span> ${t}`;cd.appendChild(msgDiv);cd.scrollTop=cd.scrollHeight;}}
async function sendChatMessage(){let inp=document.getElementById('chatInput'),t=inp.value.trim();if(t){await addGeneralMessage(t);inp.value='';await openChat();}}
async function openChat(){await loadFromGitHub();let cd=document.getElementById('chatMessages');if(cd){cd.innerHTML='';let msgs=currentChatTab==='general'?state.messages.general:state.messages.tech;msgs.slice(-50).forEach(m=>{let msgDiv=document.createElement('div');msgDiv.className='chat-message';if(m.class)msgDiv.classList.add(m.class);msgDiv.innerHTML=`<span class="chat-sender">${m.sender}:</span> ${m.text}`;cd.appendChild(msgDiv);});cd.scrollTop=cd.scrollHeight;}
if(currentChatTab==='general')unreadCounts.general=0;else unreadCounts.tech=0;
updateBadges();
document.getElementById('chatModal').style.display='flex';document.getElementById('overlay').style.display='block';}
function switchChatTab(tab){currentChatTab=tab;document.querySelectorAll('.chat-tab').forEach((t,i)=>{if((tab==='general'&&i===0)||(tab==='tech'&&i===1))t.classList.add('active');else t.classList.remove('active');});openChat();}
function closeChat(){document.getElementById('chatModal').style.display='none';closeAll();}
async function requestCash(){let cp=state.members.find(m=>m.id===state.currentUserId);if(!cp)return;let amt=prompt(`Сколько бонусов обменять на деньги? (У тебя ${cp.points})`,'10');if(amt&&!isNaN(parseInt(amt))){let a=parseInt(amt);if(a>cp.points){showStatus(`❌ У тебя только ${cp.points}⭐️`,true);return;}if(a<=0){showStatus('❌ Сумма >0',true);return;}
await addTechMessage(`💵 ${cp.name} ЗАПРАШИВАЕТ ОБМЕН ${a}⭐️ на реальные деньги! Ждём ответа админа.`);showStatus(`✅ Запрос отправлен в чат!`);alert(`✅ Запрос на обмен ${a}⭐️ отправлен админу в чат!`);closeModal();}}
async function addNewMember(){let n=prompt("Имя игрока:");if(n){let newId=Date.now().toString();state.members.push({id:newId,name:n,points:0,avatar:'👤'});if(state.members.length===1){state.adminId=newId;state.currentUserId=newId;localStorage.setItem('currentUserId',newId);}await saveToGitHub();updateUI();await addTechMessage(`👋 Новый игрок ${n} присоединился к семье!`);}}
async function renameAnyMember(id){let u=state.members.find(m=>m.id===id),n=prompt("Новое имя:",u?.name);if(n&&u){let oldName=u.name;u.name=n;await saveToGitHub();updateUI();await addTechMessage(`✏️ Игрок ${oldName} теперь ${n}`);}}
async function renameCurrentPlayer(){let u=state.members.find(m=>m.id===state.currentUserId),n=prompt("Ваше имя:",u?.name);if(n&&u){let oldName=u.name;u.name=n;await saveToGitHub();updateUI();await addTechMessage(`✏️ Игрок ${oldName} теперь ${n}`);}}
function openAvatarPicker(){document.getElementById('avatarModal').style.display='block';document.getElementById('overlay').style.display='block';}
async function setAvatar(emoji){let u=state.members.find(m=>m.id===state.currentUserId);if(u){u.avatar=emoji;await saveToGitHub();updateUI();await addTechMessage(`🎭 ${u.name} сменил(а) аватар на ${emoji}`);}closeAll();}
function cancelQuest(){scale=oldPos.s;posX=oldPos.x;posY=oldPos.y;container.style.transition='transform 0.4s';updateTransform();closeAll();}
function openQuest(idx){currentTaskIndex=idx;document.getElementById('taskText').innerText=state.quests[idx].text;document.getElementById('taskReward').innerHTML=`⭐️ Награда: +${state.quests[idx].reward} бонусов`;document.getElementById('taskModal').style.display='block';document.getElementById('overlay').style.display='block';}
function closeModal(){document.getElementById('tokenModal').style.display='none';document.getElementById('avatarModal').style.display='none';document.getElementById('playerSelectModal').style.display='none';document.getElementById('transferModal').style.display='none';document.getElementById('overlay').style.display='none';}
function closeAll(){document.querySelectorAll('.modal').forEach(m=>m.style.display='none');document.getElementById('sidebar').classList.remove('active');document.getElementById('overlay').style.display='none';}
function toggleSidebar(){document.getElementById('sidebar').classList.add('active');document.getElementById('overlay').style.display='block';}
async function switchProfile(id){state.currentUserId=id;localStorage.setItem('currentUserId',id);await saveToGitHub();updateUI();closeAll();await addTechMessage(`🔄 Теперь играет ${state.members.find(m=>m.id===id)?.name}`);}
async function setAdmin(id){state.adminId=id;await saveToGitHub();updateUI();await addTechMessage(`👑 Права администратора переданы ${state.members.find(m=>m.id===id)?.name}`);}
const emojis=['🐱','🐶','🦊','🐼','🐨','🐯','🦁','🦄','🐷','🐸','🐮','🦒'];
document.getElementById('emoji-grid').innerHTML=emojis.map(e=>`<span onclick="setAvatar('${e}')" style="font-size:38px;cursor:pointer;">${e}</span>`).join('');
if(!loadToken()){document.getElementById('tokenModal').style.display='block';document.getElementById('overlay').style.display='block';}else loadFromGitHub();
setTimeout(()=>{posX=(view.offsetWidth-1000*0.4)/2;posY=(view.offsetHeight-1000*0.4)/2;scale=0.4;updateTransform();},600);
</script>
