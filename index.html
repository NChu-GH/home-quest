<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Семейные Квесты</title>
    <style>
        body { 
            background-color: #e0f7fa; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 10px; font-family: 'Comic Sans MS', cursive, sans-serif; 
            margin: 0; overflow-x: hidden;
        }

        /* КРУПНАЯ ВЕРХНЯЯ ПАНЕЛЬ */
        .top-bar { 
            display: flex; justify-content: space-between; align-items: stretch;
            width: 100%; max-width: 600px; margin-bottom: 15px; gap: 10px;
        }
        
        .profile-card { 
            background: white; padding: 15px; border-radius: 25px; 
            border: 4px solid #00796b; display: flex; align-items: center; gap: 15px; 
            flex: 2; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .avatar-circle { 
            width: 70px; height: 70px; background: #eee; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 40px; cursor: pointer; border: 4px solid #00796b; 
            overflow: hidden; background-size: cover; background-position: center; flex-shrink: 0;
        }

        .btn-group { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        
        .menu-btn, .chat-btn { 
            height: 100%; min-height: 50px; border-radius: 20px; cursor: pointer; 
            font-weight: bold; font-family: inherit; font-size: 18px; border-width: 4px;
            display: flex; justify-content: center; align-items: center;
        }
        .menu-btn { background: #ff9800; color: white; border-style: solid; border-color: #e65100; }
        .chat-btn { background: #4caf50; color: white; border-style: solid; border-color: #2e7d32; position: relative; }
        
        #chat-badge { 
            position: absolute; top: -5px; right: -5px; background: #ff5252; color: white; 
            border-radius: 50%; padding: 4px 10px; font-size: 16px; border: 2px solid white;
        }

        /* ПРЯМОУГОЛЬНОЕ ИГРОВОЕ ПОЛЕ (ВЕРТИКАЛЬНОЕ) */
        .game-container { 
            position: relative; width: 100%; max-width: 600px; 
            aspect-ratio: 9 / 14; /* Прямоугольный формат под экран */
            background-image: url('bathroom.png');
            background-size: cover; /* Растягиваем картинку на весь прямоугольник */
            background-position: center;
            border: 8px solid #004d40; border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); cursor: crosshair; touch-action: none;
        }

        .arrow { position: absolute; width: 60px; cursor: pointer; animation: bounce 1.5s infinite; transform: translate(-50%, -50%); z-index: 20; }
        @keyframes bounce { 0%, 100% { transform: translate(-50%, -50%); } 50% { transform: translate(-50%, -70%); } }

        /* ОКНА */
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 25px; border-radius: 35px; border: 6px solid #00796b; 
            text-align: center; width: 90%; max-width: 450px; z-index: 1000;
        }
        .btn-choice { width: 100%; padding: 18px; margin: 8px 0; border-radius: 20px; border: 4px solid #00796b; cursor: pointer; font-family: inherit; font-size: 22px; background: white; font-weight: bold; }
        
        .chat-input { width: 100%; padding: 15px; border-radius: 15px; border: 3px solid #00796b; font-family: inherit; font-size: 18px; box-sizing: border-box; }

        .sidebar { 
            position: fixed; right: -100%; top: 0; width: 85%; height: 100%; 
            background: white; border-left: 8px solid #ff9800; transition: 0.4s; 
            padding: 30px; z-index: 1000; overflow-y: auto; box-sizing: border-box;
        }
        .sidebar.active { right: 0; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div id="p-card" class="profile-card">
            <div id="current-avatar" class="avatar-circle" onclick="openAvatarPicker()"></div>
            <div style="flex:1">
                <b id="current-user-name" style="font-size: 22px;">Загрузка...</b>
                <div style="color: #00796b; font-weight: bold; font-size: 20px;">⭐️ <span id="score-val">0</span> <button onclick="renameCurrentPlayer()" style="background:none; border:none; font-size:20px; cursor:pointer;">✏️</button></div>
            </div>
        </div>
        <div class="btn-group">
            <button class="chat-btn" onclick="openChat()">💬<span id="chat-badge" style="display:none;">0</span></button>
            <button class="menu-btn" onclick="toggleSidebar()">⚙️</button>
        </div>
    </div>

    <div id="game-map" class="game-container" onclick="mapClick(event)"></div>

    <div id="overlay" onclick="closeAll()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:500;"></div>

    <!-- Модалки -->
    <div id="createQuestModal" class="modal">
        <h2>Новое задание 📝</h2>
        <input type="text" id="new-quest-text" placeholder="Что сделать?" class="chat-input" style="margin-bottom:15px;">
        <button class="btn-choice" style="background:#4caf50; color:white;" onclick="confirmCreateQuest()">СОЗДАТЬ ✅</button>
        <button class="btn-choice" onclick="closeAll()">ОТМЕНА</button>
    </div>

    <div id="taskModal" class="modal">
        <h2 id="taskText" style="font-size:28px;">Задание</h2>
        <button class="btn-choice" style="background:#00796b; color:white;" onclick="completeTask()">ГОТОВО! ✅</button>
        <button class="btn-choice" onclick="closeAll()">ЗАКРЫТЬ</button>
    </div>

    <div id="chatModal" class="modal">
        <h2>Чат 💬</h2>
        <div id="chat-box" style="height:250px; overflow-y:auto; background:#f1f8e9; padding:15px; border-radius:20px; margin-bottom:10px; display:flex; flex-direction:column-reverse; text-align:left;"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="chat-input" class="chat-input" placeholder="...">
            <button class="chat-btn" onclick="sendChat()" style="width:70px;">🚀</button>
        </div>
        <button class="btn-choice" onclick="closeAll()" style="margin-top:15px;">ЗАКРЫТЬ</button>
    </div>

    <div id="avatarModal" class="modal">
        <h3>Аватар 🎭</h3>
        <button class="btn-choice" onclick="document.getElementById('photo-input').click()">📸 ФОТО</button>
        <input type="file" id="photo-input" style="display:none;" onchange="handlePhoto(this)">
        <div id="emoji-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin:20px 0;"></div>
        <button class="btn-choice" onclick="closeAll()">ОТМЕНА</button>
    </div>

    <div id="sidebar" class="sidebar">
        <h2 style="font-size:30px;">🏠 Семья</h2>
        <div id="family-list" style="background:#fff3e0; padding:15px; border-radius:20px; font-size:20px;"></div>
        <button class="btn-choice" style="background:#4caf50; color:white;" onclick="addNewMember()">+ ИГРОК</button>
        <h3 style="font-size:24px;">🔄 СМЕНИТЬ:</h3>
        <div id="switch-list"></div>
        <button class="btn-choice" onclick="closeAll()" style="margin-top:30px; background:#eee;">ЗАКРЫТЬ</button>
    </div>

    <script>
        let state;
        const storageKey = 'familyAppV3';

        const saved = localStorage.getItem(storageKey);
        if (saved) {
            state = JSON.parse(saved);
        } else {
            state = { familyName: "Наша Семья", currentUserIndex: 0, adminIndex: 0, quests: [], messages: [], members: [{name: "Админ", points: 0, avatar: "👤", isPhoto: false, lastRead: Date.now()}] };
        }

        function save() {
            localStorage.setItem(storageKey, JSON.stringify(state));
            updateUI();
        }

        function updateUI() {
            const user = state.members[state.currentUserIndex];
            document.getElementById('current-user-name').innerText = user.name;
            document.getElementById('score-val').innerText = user.points;
            
            const avaDiv = document.getElementById('current-avatar');
            if (user.isPhoto) { avaDiv.innerText = ''; avaDiv.style.backgroundImage = `url(${user.avatar})`; }
            else { avaDiv.innerText = user.avatar; avaDiv.style.backgroundImage = 'none'; }

            const map = document.getElementById('game-map');
            map.querySelectorAll('.arrow').forEach(a => a.remove());
            state.quests.forEach((q, i) => {
                const img = document.createElement('img');
                img.src = 'arrow.png'; img.className = 'arrow';
                img.style.left = q.x + '%'; 
                img.style.top = q.y + '%';
                img.onclick = (e) => { e.stopPropagation(); openQuest(i); };
                map.appendChild(img);
            });

            const fList = document.getElementById('family-list');
            const sList = document.getElementById('switch-list');
            fList.innerHTML = ''; sList.innerHTML = '';
            state.members.forEach((m, i) => {
                fList.innerHTML += `<div style="margin-bottom:10px;">${m.avatar} ${m.name} ${i === state.adminIndex ? '👑' : ''}</div>`;
                if(i !== state.currentUserIndex) sList.innerHTML += `<button class="btn-choice" onclick="switchProfile(${i})">${m.name}</button>`;
            });

            updateBadge();
        }

        function mapClick(e) {
            if(state.currentUserIndex !== state.adminIndex) return;
            const rect = document.getElementById('game-map').getBoundingClientRect();
            const xPct = ((e.clientX - rect.left) / rect.width) * 100;
            const yPct = ((e.clientY - rect.top) / rect.height) * 100;
            window.tempCoords = { x: xPct, y: yPct };
            document.getElementById('createQuestModal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function confirmCreateQuest() {
            const txt = document.getElementById('new-quest-text').value;
            if(!txt) return;
            state.quests.push({ x: window.tempCoords.x, y: window.tempCoords.y, text: txt, reward: 10 });
            document.getElementById('new-quest-text').value = '';
            closeAll(); save();
        }

        function openQuest(idx) {
            window.activeQuestIdx = idx;
            document.getElementById('taskText').innerText = state.quests[idx].text;
            document.getElementById('taskModal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function completeTask() {
            state.members[state.currentUserIndex].points += state.quests[window.activeQuestIdx].reward;
            state.quests.splice(window.activeQuestIdx, 1);
            closeAll(); save();
        }

        function updateBadge() {
            const user = state.members[state.currentUserIndex];
            const count = state.messages.filter(m => m.date > (user.lastRead || 0) && m.text.includes('@' + user.name)).length;
            const badge = document.getElementById('chat-badge');
            badge.style.display = count > 0 ? 'inline-block' : 'none';
            badge.innerText = count;
        }

        function openChat() {
            state.members[state.currentUserIndex].lastRead = Date.now();
            document.getElementById('chatModal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            renderChat(); save();
        }

        function renderChat() {
            const user = state.members[state.currentUserIndex];
            const box = document.getElementById('chat-box');
            box.innerHTML = state.messages.map(m => `
                <div style="margin-bottom:10px; padding:10px; border-radius:15px; background:white; font-size:16px;">
                    <b>${m.author}:</b> ${m.text}
                </div>`).reverse().join('');
        }

        function sendChat() {
            const inp = document.getElementById('chat-input');
            if(!inp.value.trim()) return;
            state.messages.push({ author: state.members[state.currentUserIndex].name, text: inp.value, date: Date.now() });
            inp.value = ''; renderChat(); save();
        }

        function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display='none'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
        function switchProfile(i) { state.currentUserIndex = i; closeAll(); save(); }
        function addNewMember() { let n = prompt("Имя:"); if(n) { state.members.push({name: n, points: 0, avatar: '👤', isPhoto: false}); save(); } }
        function renameCurrentPlayer() { let n = prompt("Имя:", state.members[state.currentUserIndex].name); if(n) { state.members[state.currentUserIndex].name = n; save(); } }
        function openAvatarPicker() { document.getElementById('avatarModal').style.display='block'; document.getElementById('overlay').style.display='block'; }
        function setAvatar(e) { state.members[state.currentUserIndex].avatar = e; state.members[state.currentUserIndex].isPhoto = false; save(); closeAll(); }
        function handlePhoto(input) { if (input.files && input.files[0]) { const reader = new FileReader(); reader.onload = (e) => { state.members[state.currentUserIndex].avatar = e.target.result; state.members[state.currentUserIndex].isPhoto = true; save(); closeAll(); }; reader.readAsDataURL(input.files[0]); } }

        const emojis = ['🐱','🐶','🦊','🐼','🐨','🐯','🦁','🦄','👤','🐷','🦁','🦒'];
        document.getElementById('emoji-grid').innerHTML = emojis.map(e => `<span onclick="setAvatar('${e}')" style="font-size:40px; cursor:pointer;">${e}</span>`).join('');

        updateUI();
    </script>
</body>
</html>
