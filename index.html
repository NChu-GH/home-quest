<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Диагностика Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Диагностика подключения к Supabase</h2>
    <div id="log"></div>

    <script>
        const SUPABASE_URL = 'https://kpibkmvhyevebjjpvwxn.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_MiKitncKVznOIY28I14BjQ_3MdpLUB7';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function log(msg) {
            const div = document.getElementById('log');
            div.innerHTML += '<div>' + msg + '</div>';
        }
        
        async function test() {
            log('🔍 Проверка подключения...');
            
            // Проверяем, работает ли клиент
            log('✅ Supabase клиент создан');
            
            // Пробуем прочитать из таблицы players
            try {
                log('📡 Запрос к таблице players...');
                const { data, error } = await supabase.from('players').select('*');
                
                if (error) {
                    log('❌ Ошибка: ' + error.message);
                    if (error.message.includes('relation') || error.message.includes('does not exist')) {
                        log('⚠️ Таблица "players" не существует! Выполни SQL-скрипт в Supabase.');
                    } else if (error.message.includes('permission')) {
                        log('⚠️ Нет прав доступа. Проверь RLS или политики доступа.');
                    } else if (error.message.includes('fetch')) {
                        log('⚠️ Проблема с сетью или CORS. Проверь интернет и попробуй открыть файл через локальный сервер.');
                    }
                } else {
                    log('✅ Успешно! Найдено игроков: ' + (data?.length || 0));
                    if (data?.length === 0) {
                        log('📝 База пуста. Можно создавать первого игрока.');
                    } else {
                        log('📋 Список игроков: ' + JSON.stringify(data));
                    }
                }
            } catch (err) {
                log('❌ Критическая ошибка: ' + err.message);
            }
        }
        
        test();
    </script>
</body>
</html>
