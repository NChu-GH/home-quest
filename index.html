<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой Дом - Перезагрузка</title>
    <style>
        body { background-color: #e0f7fa; padding: 0; margin: 0; font-family: 'Comic Sans MS', cursive, sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        .main-wrapper { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; }
        
        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-bar { display: flex; justify-content: space-between; padding: 10px; gap: 8px; z-index: 100; background: #e0f7fa; }
        .profile-card { background: white; padding: 10px; border-radius: 20px; border: 4px solid #00796b; display: flex; align-items: center; gap: 10px; flex: 1; position: relative; }
        .avatar-circle { width: 50px; height: 50px; background: #eee; border-radius: 50%; border: 3px solid #00796b; display: flex; justify-content: center; align-items: center; font-size: 24px; }
        .menu-btn { background: #ff9800; color: white; border: 3px solid #e65100; border-radius: 15px; padding: 10px 15px; cursor: pointer; font-weight: bold; }

        /* КАРТА */
        .map-viewport { flex: 1; width: 100%; position: relative; overflow: hidden; background: #cfd8dc; touch-action: none; }
        #map-container { position: absolute; width: 1000px; height: 1000px; transform-origin: 0 0; left: 0; top: 0; }
        .layer { position: absolute; top: 0; left: 0; width: 1000px; height: 1000px; pointer-events: none; background-size: contain; background-repeat: no-repeat; }
        
        /* КНОПКИ */
        .zoom-controls { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 110; }
        .z-btn { width: 50px; height: 50px; border-radius: 15px; border: 4px solid #004d40; background: white; font-size: 26px; font-weight: bold; cursor: pointer; }

        /* МОДАЛКИ (БИРЮЗОВАЯ РАМКА) */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 500; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 30px; border: 6px solid #00796b; text-align: center; width: 80%; max-width: 400px; z-index: 1000; }
        .btn-choice { width: 100%; padding: 12px; margin: 5px 0; border-radius: 15px; border: 3px solid #00796b; cursor: pointer; font-family: inherit; font-weight: bold; background: white; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="top-bar">
        <div class="profile-card">
            <div id="current-avatar" class="avatar-circle">👤</div>
            <div>
                <b id="current-user-name">Загрузка...</b>
                <div style="color: #00796b; font-size: 14px;">⭐️ <span id="score-val">0</span></div>
            </div>
        </div>
        <button class="menu-btn" onclick="toggleSidebar()">⚙️</button>
    </div>

    <div class="map-viewport" id="viewport">
        <div id="map-container">
            <!-- СЛОИ КОМНАТ -->
            <div class="layer" style="background-image: url('Sanuzel1.png');"></div>
            <div class="layer" style="background-image: url('Koridor.png');"></div>
            <div class="layer" style="background-image: url('Gostinaya.png');"></div>
            <div class="layer" style="background-image: url('Spalnya1.png');"></div>
            <div class="layer" style="background-image: url('Spalnya2.png');"></div>
            <div class="layer" style="background-image: url('Vannaya.png');"></div>
            <div class="layer" style="background-image: url('Sanuzel2.png');"></div>
            <div class="layer" style="background-image: url('Kuhnya.png');"></div>
            <div class="layer" style="background-image: url('Balcon.png');"></div>
            <!-- СЛОИ МЕБЕЛИ -->
            <div class="layer" style="background-image: url('Stiralka.png');"></div>
            <div class="layer" style="background-image: url('Unitaz1.png');"></div>
            <div class="layer" style="background-image: url('Tumbochka.png');"></div>
            <div id="quest-arrows"></div>
        </div>
        <div class="zoom-controls">
            <button class="z-btn" onclick="applyZoom(0.2)">+</button>
            <button class="z-btn" onclick="applyZoom(-0.2)">−</button>
        </div>
    </div>
</div>

<div id="overlay" onclick="closeAll()" class="overlay"></div>

<!-- ПРОСТОЕ МЕНЮ -->
<div id="sidebar" class="modal">
    <h2 style="color:#00796b;">Семья</h2>
    <div id="family-list"></div>
    <button class="btn-choice" style="background:#4caf50; color:white;" onclick="addNewMember()">➕ Игрок</button>
    <button class="btn-choice" onclick="closeAll()">Закрыть</button>
</div>

<script>
    let state;
    const storageKey = 'FamilyApp_Persistent_Storage';
    const container = document.getElementById('map-container');
    const view = document.getElementById('viewport');

    let scale = 0.5, posX = 0, posY = 0;
    let isDragging = false, startX, startY;

    function updateTransform() {
        container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    function applyZoom(delta) {
        scale = Math.min(Math.max(0.1, scale + delta), 3);
        updateTransform();
    }

    // Управление
    view.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY; });
    window.addEventListener('mousemove', e => { if (isDragging) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); } });
    window.addEventListener('mouseup', () => isDragging = false);

    view.addEventListener('touchstart', e => {
        if (e.touches.length === 1) { isDragging = true; startX = e.touches[0].clientX - posX; startY = e.touches[0].clientY - posY; }
    }, {passive: false});
    view.addEventListener('touchmove', e => {
        if (isDragging) { e.preventDefault(); posX = e.touches[0].clientX - startX; posY = e.touches[0].clientY - startY; updateTransform(); }
    }, {passive: false});
    view.addEventListener('touchend', () => isDragging = false);

    function loadData() {
        const saved = localStorage.getItem(storageKey);
        state = saved ? JSON.parse(saved) : { currentUserIndex: 0, members: [{name: "Админ", points: 0, avatar: "👤"}] };
        updateUI();
    }

    function updateUI() {
        const user = state.members[state.currentUserIndex];
        document.getElementById('current-user-name').innerText = user.name;
        document.getElementById('score-val').innerText = user.points;
        document.getElementById('current-avatar').innerText = user.avatar;
    }

    function toggleSidebar() { document.getElementById('sidebar').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
    function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('overlay').style.display = 'none'; }
    function addNewMember() { 
        let n = prompt("Имя игрока:"); 
        if(n) { state.members.push({name:n, points:0, avatar:'👤'}); localStorage.setItem(storageKey, JSON.stringify(state)); updateUI(); closeAll(); } 
    }

    loadData();
    updateTransform();
</script>
</body>
</html>
