<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой Дом: Интерактивный План</title>
    <style>
        body { background-color: #e0f7fa; display: flex; flex-direction: column; align-items: center; padding: 10px; font-family: 'Comic Sans MS', cursive, sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        .main-wrapper { width: 100%; max-width: 500px; display: flex; flex-direction: column; height: 100%; }
        
        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-bar { display: flex; justify-content: space-between; align-items: stretch; margin-bottom: 10px; gap: 8px; z-index: 100; }
        .profile-card { background: white; padding: 10px; border-radius: 20px; border: 4px solid #00796b; display: flex; align-items: center; gap: 10px; flex: 2; position: relative; min-width: 0; }
        .crown-icon { position: absolute; top: -15px; left: 5px; font-size: 25px; transform: rotate(-15deg); display: none; z-index: 10; }
        .is-admin .crown-icon { display: block; }
        .avatar-circle { width: 55px; height: 55px; background: #eee; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: pointer; border: 3px solid #00796b; overflow: hidden; background-size: cover; background-position: center; flex-shrink: 0; }
        .chat-btn, .menu-btn { min-height: 45px; border-radius: 15px; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 16px; border: 3px solid; display: flex; justify-content: center; align-items: center; padding: 5px 15px; }
        .menu-btn { background: #ff9800; color: white; border-color: #e65100; }
        .chat-btn { background: #4caf50; color: white; border-color: #2e7d32; position: relative; }

        /* ИГРОВОЕ ПОЛЕ И СЛОИ */
        .map-viewport { flex: 1; width: 100%; position: relative; overflow: hidden; border: 6px solid #004d40; border-radius: 20px; background: #f0f0f0; touch-action: none; }
        #map-outer { position: absolute; transform-origin: 0 0; width: 1000px; height: 1000px; transition: transform 0.1s linear; }
        
        .layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background-size: contain; background-repeat: no-repeat; }
        #base-layer { background-image: url('Kvartira.png'); pointer-events: auto; } /* Базовый слой принимает клики */

        .arrow { position: absolute; width: 50px; height: 50px; cursor: pointer; animation: bounce 1.5s infinite; transform: translate(-50%, -50%); z-index: 50; pointer-events: auto; }
        @keyframes bounce { 0%, 100% { transform: translate(-50%, -50%); } 50% { transform: translate(-50%, -75%); } }

        /* ОКНА */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 500; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 30px; border: 5px solid #00796b; text-align: center; width: 85%; max-width: 400px; z-index: 1000; box-shadow: 0 0 40px rgba(0,0,0,0.4); }
        .btn-choice { width: 100%; padding: 15px; margin: 5px 0; border-radius: 15px; border: 3px solid #00796b; cursor: pointer; font-family: inherit; font-size: 18px; background: white; font-weight: bold; }
        
        .sidebar { position: fixed; right: -500px; top: 0; width: 85%; max-width: 400px; height: 100%; background: white; border-left: 8px solid #ff9800; transition: 0.3s; padding: 25px; z-index: 1000; overflow-y: auto; box-sizing: border-box; }
        .sidebar.active { right: 0; }
        .member-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 2px solid #ffcc80; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #00796b; font-family: inherit; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="top-bar">
            <div id="p-card" class="profile-card">
                <div class="crown-icon">👑</div>
                <div id="current-avatar" class="avatar-circle" onclick="openAvatarPicker()"></div>
                <div style="flex:1; min-width: 0;">
                    <b id="current-user-name">...</b>
                    <div style="color: #00796b; font-weight: bold; font-size: 16px;">⭐️ <span id="score-val">0</span></div>
                </div>
            </div>
            <div class="btn-group">
                <button class="chat-btn" onclick="openChat()">💬</button>
                <button class="menu-btn" onclick="toggleSidebar()">⚙️</button>
            </div>
        </div>

        <div class="map-viewport" id="viewport">
            <div id="map-outer">
                <!-- Базовый план -->
                <div id="base-layer" class="layer"></div>
                
                <!-- Слои мебели (накладываются сверху) -->
                <div class="layer" style="background-image: url('lapomoyka.png');"></div>
                <div class="layer" style="background-image: url('unitaz.png');"></div>
                <div class="layer" style="background-image: url('wash_machine.png');"></div>
                <div class="layer" style="background-image: url('laundry.png');"></div>
                <div class="layer" style="background-image: url('tumba.png');"></div>
                <div class="layer" style="background-image: url('veshalka.png');"></div>
                <div class="layer" style="background-image: url('shoe_cab.png');"></div>
                <div class="layer" style="background-image: url('clothes_cab.png');"></div>
                <div class="layer" style="background-image: url('household_cab.png');"></div>
                <div class="layer" style="background-image: url('sport_cab.png');"></div>

                <!-- Контейнер для стрелочек заданий -->
                <div id="quest-container"></div>
            </div>
        </div>
    </div>

    <div id="overlay" onclick="closeAll()" class="overlay"></div>

    <!-- Модалки -->
    <div id="createQuestModal" class="modal">
        <h2>Добавить задание 📝</h2>
        <input type="text" id="new-quest-text" placeholder="Напиши задачу...">
        <button class="btn-choice" style="background:#4caf50; color:white;" onclick="confirmCreateQuest()">ПОСТАВИТЬ ✅</button>
        <button class="btn-choice" onclick="closeAll()">ОТМЕНА</button>
    </div>

    <div id="taskModal" class="modal">
        <h2 id="taskText" style="color:#00796b;">...</h2>
        <button class="btn-choice" style="background:#00796b; color:white;" onclick="completeTask()">ВЫПОЛНЕНО ✅</button>
    </div>

    <div id="sidebar" class="sidebar">
        <h2 style="color:#00796b;">🏠 Семья</h2>
        <div id="family-list"></div>
        <button class="btn-choice" style="background:#4caf50; color:white;" onclick="addNewMember()">➕ НОВЫЙ ИГРОК</button>
        <h3 style="margin-top:25px; color:#e65100;">🔄 СМЕНИТЬ ГЕРОЯ:</h3>
        <div id="switch-list"></div>
        <button class="btn-choice" onclick="closeAll()" style="margin-top:30px; background:#eee;">ЗАКРЫТЬ</button>
    </div>

    <script>
        let state;
        const storageKey = 'familyApp_INTERACTIVE_V1';
        const mapOuter = document.getElementById('map-outer');
        const viewport = document.getElementById('viewport');
        
        let scale = 0.5, posX = -250, posY = -250, isDragging = false, startX, startY;
        let lastTap = 0;

        function updateTransform() { mapOuter.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

        // Перемещение
        viewport.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) { isDragging = true; startX = e.touches.pageX - posX; startY = e.touches.pageY - posY; }
        }, { passive: false });
        viewport.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) { e.preventDefault(); posX = e.touches.pageX - startX; posY = e.touches.pageY - startY; updateTransform(); }
        }, { passive: false });
        viewport.addEventListener('touchend', () => isDragging = false);

        // Двойной клик для создания задачи
        viewport.addEventListener('click', (e) => {
            if (state.currentUserIndex !== state.adminIndex) return;
            const now = Date.now();
            if (now - lastTap < 300) {
                const rect = document.getElementById('base-layer').getBoundingClientRect();
                window.tempCoords = { x: (e.clientX - rect.left) / scale, y: (e.clientY - rect.top) / scale };
                document.getElementById('createQuestModal').style.display = 'block';
                document.getElementById('overlay').style.display = 'block';
            }
            lastTap = now;
        });

        // Данные
        function loadData() {
            const saved = localStorage.getItem(storageKey);
            state = saved ? JSON.parse(saved) : { familyName: "Наш Дом", currentUserIndex: 0, adminIndex: 0, quests: [], members: [{name: "Админ", points: 0, avatar: "👤"}] };
            updateUI();
        }
        function save() { localStorage.setItem(storageKey, JSON.stringify(state)); updateUI(); }

        function updateUI() {
            const user = state.members[state.currentUserIndex];
            document.getElementById('current-user-name').innerText = user.name;
            document.getElementById('score-val').innerText = user.points;
            document.getElementById('p-card').classList.toggle('is-admin', state.currentUserIndex === state.adminIndex);
            
            const avaDiv = document.getElementById('current-avatar');
            avaDiv.innerText = user.avatar;

            // Отрисовка задач
            const qContainer = document.getElementById('quest-container');
            qContainer.innerHTML = '';
            state.quests.forEach((q, i) => {
                const img = document.createElement('img');
                img.src = 'arrow.png'; img.className = 'arrow';
                img.style.left = q.x + 'px'; img.style.top = q.y + 'px';
                img.onclick = (e) => { e.stopPropagation(); openQuest(i); };
                qContainer.appendChild(img);
            });

            // Списки в меню
            const fList = document.getElementById('family-list');
            const sList = document.getElementById('switch-list');
            fList.innerHTML = ''; sList.innerHTML = '';
            state.members.forEach((m, i) => {
                fList.innerHTML += `<div class="member-item">${m.name} ${i === state.adminIndex ? '👑' : ''} <button onclick="setAdmin(${i})" style="border:none; background:none; cursor:pointer;">⭐</button></div>`;
                if(i !== state.currentUserIndex) sList.innerHTML += `<button class="btn-choice" onclick="switchProfile(${i})">${m.name}</button>`;
            });
        }

        function confirmCreateQuest() {
            const txt = document.getElementById('new-quest-text').value;
            if(txt) { state.quests.push({ x: window.tempCoords.x, y: window.tempCoords.y, text: txt }); document.getElementById('new-quest-text').value = ''; }
            closeAll(); save();
        }
        function openQuest(idx) { window.activeIdx = idx; document.getElementById('taskText').innerText = state.quests[idx].text; document.getElementById('taskModal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
        function completeTask() { state.members[state.currentUserIndex].points += 10; state.quests.splice(window.activeIdx, 1); closeAll(); save(); }
        function switchProfile(i) { state.currentUserIndex = i; closeAll(); save(); }
        function setAdmin(i) { state.adminIndex = i; save(); }
        function addNewMember() { let n = prompt("Имя:"); if(n) { state.members.push({name: n, points: 0, avatar: '👤'}); save(); } }
        function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display='none'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
        
        loadData();
        updateTransform();
    </script>
</body>
</html>
