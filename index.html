<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Семейные Квесты - Возврат Героев</title>
    <style>
        body { background-color: #e0f7fa; display: flex; flex-direction: column; align-items: center; padding: 10px; font-family: 'Comic Sans MS', cursive, sans-serif; margin: 0; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-between; align-items: stretch; width: 100%; max-width: 600px; margin-bottom: 15px; gap: 10px; }
        .profile-card { background: white; padding: 15px; border-radius: 25px; border: 4px solid #00796b; display: flex; align-items: center; gap: 15px; flex: 2; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; }
        .crown-icon { position: absolute; top: -20px; left: 10px; font-size: 35px; transform: rotate(-15deg); display: none; z-index: 10; }
        .is-admin .crown-icon { display: block; }
        .avatar-circle { width: 70px; height: 70px; background: #eee; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 40px; cursor: pointer; border: 3px solid #00796b; overflow: hidden; background-size: cover; background-position: center; flex-shrink: 0; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .menu-btn, .chat-btn { height: 100%; min-height: 55px; border-radius: 20px; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 20px; border-width: 4px; display: flex; justify-content: center; align-items: center; }
        .menu-btn { background: #ff9800; color: white; border-style: solid; border-color: #e65100; }
        .chat-btn { background: #4caf50; color: white; border-style: solid; border-color: #2e7d32; position: relative; }
        #chat-badge { position: absolute; top: -8px; right: -8px; background: #ff5252; color: white; border-radius: 50%; padding: 4px 10px; font-size: 16px; border: 2px solid white; font-weight: bold; display: none; }
        .game-container { position: relative; width: 100%; max-width: 600px; aspect-ratio: 9 / 14; background-image: url('bathroom.png'); background-size: cover; background-position: center; border: 8px solid #004d40; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); cursor: crosshair; touch-action: none; }
        .arrow { position: absolute; width: 60px; cursor: pointer; animation: bounce 1.5s infinite; transform: translate(-50%, -50%); z-index: 20; }
        @keyframes bounce { 0%, 100% { transform: translate(-50%, -50%); } 50% { transform: translate(-50%, -70%); } }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 500; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 35px; border: 6px solid #00796b; text-align: center; width: 90%; max-width: 450px; z-index: 1000; box-shadow: 0 0 50px rgba(0,0,0,0.4); }
        .btn-choice { width: 100%; padding: 18px; margin: 8px 0; border-radius: 20px; border: 4px solid #00796b; cursor: pointer; font-family: inherit; font-size: 22px; background: white; font-weight: bold; }
        .sidebar { position: fixed; right: -500px; top: 0; width: 85%; height: 100%; background: white; border-left: 8px solid #ff9800; transition: 0.4s; padding: 30px; z-index: 1000; overflow-y: auto; box-sizing: border-box; }
        .sidebar.active { right: 0; }
        .member-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 2px solid #ffcc80; }
        .mini-ava { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #00796b; background-size: cover; background-position: center; display: inline-block; vertical-align: middle; text-align: center; line-height: 45px; font-size: 24px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div id="p-card" class="profile-card">
            <div class="crown-icon">👑</div>
            <div id="current-avatar" class="avatar-circle" onclick="openAvatarPicker()"></div>
            <div style="flex:1; min-width: 0;">
                <b id="current-user-name" style="font-size: 24px;">...</b>
                <div style="color: #00796b; font-weight: bold; font-size: 22px;">⭐️ <span id="score-val">0</span> <button onclick="renameCurrentPlayer()" style="border:none; background:none; font-size:20px; cursor:pointer;">✏️</button></div>
            </div>
        </div>
        <div class="btn-group">
            <button class="chat-btn" onclick="openChat()">💬<div id="chat-badge">0</div></button>
            <button class="menu-btn" onclick="toggleSidebar()">⚙️</button>
        </div>
    </div>

    <div id="game-map" class="game-container" onclick="mapClick(event)"></div>

    <div id="overlay" onclick="closeAll()" class="overlay"></div>

    <!-- Модалки (кратко для экономии места, логика внутри) -->
    <div id="createQuestModal" class="modal">
        <h2>Задание 📝</h2>
        <input type="text" id="new-quest-text" placeholder="Что сделать?" style="width:100%; padding:15px; border-radius:15px; border:3px solid #00796b; font-size:18px; margin-bottom:15px; box-sizing:border-box;">
        <button class="btn-choice" style="background:#4caf50; color:white;" onclick="confirmCreateQuest()">ОК ✅</button>
        <button class="btn-choice" onclick="closeAll()">ОТМЕНА</button>
    </div>

    <div id="taskModal" class="modal">
        <h2 id="taskText">...</h2>
        <button class="btn-choice" style="background:#00796b; color:white;" onclick="completeTask()">ГОТОВО! ✅</button>
    </div>

    <div id="chatModal" class="modal">
        <h2>Чат 💬</h2>
        <div id="chat-box" style="height:250px; overflow-y:auto; background:#f1f8e9; padding:15px; border-radius:20px; margin-bottom:10px; display:flex; flex-direction:column-reverse; text-align:left; font-size:18px;"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="chat-input" style="flex:1; padding:15px; border-radius:15px; border:3px solid #00796b; font-size:18px;" placeholder="...">
            <button class="chat-btn" onclick="sendChat()" style="width:80px;">🚀</button>
        </div>
        <button class="btn-choice" onclick="closeAll()">ЗАКРЫТЬ</button>
    </div>

    <div id="avatarModal" class="modal">
        <h3>Аватар 🎭</h3>
        <button class="btn-choice" onclick="document.getElementById('photo-input').click()">📸 ФОТО</button>
        <input type="file" id="photo-input" style="display:none;" accept="image/*" onchange="handlePhoto(this)">
        <div id="emoji-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin:20px 0;"></div>
        <button class="btn-choice" onclick="closeAll()">ОТМЕНА</button>
    </div>

    <div id="sidebar" class="sidebar">
        <h2 style="font-size:32px; color:#00796b;">🏡 Семья</h2>
        <div id="family-list" style="background:#fff3e0; padding:15px; border-radius:20px; margin-bottom:20px;"></div>
        <button class="btn-choice" style="background:#4caf50; color:white;" onclick="addNewMember()">➕ ИГРОК</button>
        <h3 style="font-size:26px; margin-top:30px; color:#e65100;">🔄 СМЕНИТЬ:</h3>
        <div id="switch-list"></div>
        <button class="btn-choice" onclick="closeAll()" style="margin-top:40px; background:#eee;">ЗАКРЫТЬ</button>
    </div>

    <script>
        let state;
        const storageKey = 'familyAppV3';

        // --- СУПЕР-ФУНКЦИЯ СПАСЕНИЯ ДАННЫХ ---
        function loadData() {
            const v3 = localStorage.getItem(storageKey);
            const v2 = localStorage.getItem('familyAppV2');
            const v1 = localStorage.getItem('familyApp');
            const legacy = localStorage.getItem('familyApp'); // на всякий случай

            if (v3) {
                state = JSON.parse(v3);
            } else if (v2 || v1 || legacy) {
                const old = JSON.parse(v2 || v1 || legacy);
                state = {
                    familyName: old.familyName || "Наша Семья",
                    currentUserIndex: 0,
                    adminIndex: 0,
                    quests: [],
                    messages: [{author:'Система', text:'Герои спасены! ✨', date:Date.now()}],
                    members: old.members.map(m => ({
                        name: m.name || "Герой",
                        points: m.points || 0,
                        avatar: m.avatar || "👤",
                        isPhoto: m.isPhoto || false,
                        lastRead: Date.now()
                    }))
                };
                alert("Ура! Я нашел твоих героев в старой памяти и вернул их! 🎉");
            } else {
                state = {
                    familyName: "Наша Семья", currentUserIndex: 0, adminIndex: 0,
                    quests: [], messages: [], members: [{name: "Админ", points: 0, avatar: "👤", isPhoto: false, lastRead: Date.now()}]
                };
            }
            save();
        }

        function save() {
            localStorage.setItem(storageKey, JSON.stringify(state));
            updateUI();
        }

        function updateUI() {
            const user = state.members[state.currentUserIndex] || state.members[0];
            document.getElementById('current-user-name').innerText = user.name;
            document.getElementById('score-val').innerText = user.points;
            document.getElementById('p-card').classList.toggle('is-admin', state.currentUserIndex === state.adminIndex);
            
            const avaDiv = document.getElementById('current-avatar');
            if (user.isPhoto) { avaDiv.innerText = ''; avaDiv.style.backgroundImage = `url(${user.avatar})`; }
            else { avaDiv.innerText = user.avatar; avaDiv.style.backgroundImage = 'none'; }

            const map = document.getElementById('game-map');
            map.querySelectorAll('.arrow').forEach(a => a.remove());
            state.quests.forEach((q, i) => {
                const img = document.createElement('img');
                img.src = 'arrow.png'; img.className = 'arrow';
                img.style.left = q.x + '%'; img.style.top = q.y + '%';
                img.onclick = (e) => { e.stopPropagation(); openQuest(i); };
                map.appendChild(img);
            });

            const fList = document.getElementById('family-list');
            const sList = document.getElementById('switch-list');
            fList.innerHTML = ''; sList.innerHTML = '';
            state.members.forEach((m, i) => {
                let ava = m.isPhoto ? `<div class="mini-ava" style="background-image:url(${m.avatar})"></div>` : `<div class="mini-ava">${m.avatar}</div>`;
                fList.innerHTML += `<div class="member-item">
                    <span>${ava} ${m.name} ${i === state.adminIndex ? '👑' : ''}</span>
                    <div>
                        <button onclick="setAdmin(${i})" style="border:none; background:none; font-size:28px; cursor:pointer;">👑</button>
                        <button onclick="renameAnyMember(${i})" style="border:none; background:none; font-size:28px; cursor:pointer;">✏️</button>
                    </div>
                </div>`;
                if(i !== state.currentUserIndex) {
                    sList.innerHTML += `<button class="btn-choice" onclick="switchProfile(${i})">Вход: ${m.name}</button>`;
                }
            });

            const count = state.messages.filter(m => m.date > (user.lastRead || 0) && m.text.includes('@' + user.name)).length;
            const badge = document.getElementById('chat-badge');
            badge.style.display = count > 0 ? 'flex' : 'none';
            badge.innerText = count;
        }

        // --- ЛОГИКА ОКОН И ДЕЙСТВИЙ ---
        function mapClick(e) {
            if(state.currentUserIndex !== state.adminIndex) return;
            const rect = document.getElementById('game-map').getBoundingClientRect();
            window.tempCoords = { x: ((e.clientX - rect.left) / rect.width) * 100, y: ((e.clientY - rect.top) / rect.height) * 100 };
            document.getElementById('createQuestModal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function confirmCreateQuest() {
            const txt = document.getElementById('new-quest-text').value;
            if(!txt) return;
            state.quests.push({ x: window.tempCoords.x, y: window.tempCoords.y, text: txt, reward: 10 });
            document.getElementById('new-quest-text').value = '';
            closeAll(); save();
        }

        function openQuest(idx) {
            window.activeIdx = idx;
            document.getElementById('taskText').innerText = state.quests[idx].text;
            document.getElementById('taskModal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function completeTask() {
            state.members[state.currentUserIndex].points += state.quests[window.activeIdx].reward;
            state.quests.splice(window.activeIdx, 1);
            closeAll(); save();
        }

        function openChat() {
            state.members[state.currentUserIndex].lastRead = Date.now();
            document.getElementById('chatModal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            renderChat(); save();
        }

        function renderChat() {
            const box = document.getElementById('chat-box');
            box.innerHTML = state.messages.map(m => `<div style="margin-bottom:10px; padding:12px; border-radius:15px; background:white; border:1px solid #eee;">
                <b style="color:#00796b" onclick="replyTo('${m.author}')">${m.author}:</b> ${m.text}</div>`).reverse().join('');
        }

        function sendChat() {
            const inp = document.getElementById('chat-input');
            if(!inp.value.trim()) return;
            state.messages.push({ author: state.members[state.currentUserIndex].name, text: inp.value, date: Date.now() });
            inp.value = ''; renderChat(); save();
        }

        function replyTo(n) { const i = document.getElementById('chat-input'); i.value = `@${n}, ` + i.value; i.focus(); }
        function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display='none'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
        function switchProfile(i) { state.currentUserIndex = i; closeAll(); save(); }
        function setAdmin(i) { state.adminIndex = i; save(); }
        function addNewMember() { let n = prompt("Имя:"); if(n) { state.members.push({name: n, points: 0, avatar: '👤', isPhoto: false, lastRead: Date.now()}); save(); } }
        function renameCurrentPlayer() { let n = prompt("Имя:", state.members[state.currentUserIndex].name); if(n) { state.members[state.currentUserIndex].name = n; save(); } }
        function renameAnyMember(i) { let n = prompt("Имя:", state.members[i].name); if(n) { state.members[i].name = n; save(); } }
        function openAvatarPicker() { closeAll(); document.getElementById('avatarModal').style.display='block'; document.getElementById('overlay').style.display='block'; }
        function setAvatar(e) { state.members[state.currentUserIndex].avatar = e; state.members[state.currentUserIndex].isPhoto = false; save(); closeAll(); }
        function handlePhoto(input) { if (input.files && input.files) { const reader = new FileReader(); reader.onload = (e) => { state.members[state.currentUserIndex].avatar = e.target.result; state.members[state.currentUserIndex].isPhoto = true; save(); closeAll(); }; reader.readAsDataURL(input.files); } }

        const emojis = ['🐱','🐶','🦊','🐼','🐨','🐯','🦁','🦄','🐷','🐸','🐮','🦒'];
        document.getElementById('emoji-grid').innerHTML = emojis.map(e => `<span onclick="setAvatar('${e}')" style="font-size:50px; cursor:pointer;">${e}</span>`).join('');

        loadData();
    </script>
</body>
</html>
