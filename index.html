<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Семейный Квест - Облачная Версия</title>
    <style>
        body { background-color: #e0f7fa; display: flex; flex-direction: column; align-items: center; padding: 0; font-family: 'Comic Sans MS', cursive, sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        .main-wrapper { width: 100%; max-width: 500px; display: flex; flex-direction: column; height: 100%; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: stretch; padding: 10px; gap: 8px; z-index: 100; flex-shrink: 0; }
        .profile-card { background: white; padding: 10px; border-radius: 25px; border: 4px solid #00796b; display: flex; align-items: center; gap: 10px; flex: 2; position: relative; min-width: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .avatar-circle { width: 60px; height: 60px; background: #eee; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; border: 3px solid #00796b; background-size: cover; flex-shrink: 0; cursor: pointer; }
        .crown-icon { position: absolute; top: -18px; left: 5px; font-size: 32px; transform: rotate(-15deg); display: none; }
        .is-admin .crown-icon { display: block; }

        .btn-group { display: flex; flex-direction: column; gap: 5px; flex: 0.8; }
        .menu-btn, .chat-btn { height: 100%; min-height: 45px; border-radius: 18px; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 16px; border: 3px solid; display: flex; justify-content: center; align-items: center; }
        .menu-btn { background: #ff9800; color: white; border-color: #e65100; }
        .chat-btn { background: #4caf50; color: white; border-color: #2e7d32; }

        .map-viewport { flex: 1; width: 100%; position: relative; overflow: hidden; background: #cfd8dc; touch-action: none; border-top: 2px solid #004d40; }
        #map-container { position: absolute; width: 1000px; height: 1000px; transform-origin: center center; cursor: crosshair; }
        .layer { position: absolute; top: 0; left: 0; width: 1000px; height: 1000px; background-size: contain; background-repeat: no-repeat; pointer-events: auto; }
        
        #quest-arrows { position: absolute; top: 0; left: 0; width: 1000px; height: 1000px; pointer-events: none; z-index: 60; }
        .arrow { position: absolute; width: 45px; height: 45px; cursor: pointer; animation: bounce 1.5s infinite; transform: translate(-50%, -50%); pointer-events: auto; font-size: 35px; text-shadow: 0 4px 6px rgba(0,0,0,0.2); text-align: center; }
        @keyframes bounce { 0%, 100% { transform: translate(-50%, -50%); } 50% { transform: translate(-50%, -75%); } }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 35px; border: 6px solid #00796b; text-align: center; width: 85%; max-width: 420px; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 500; }
        .btn-choice { width: 100%; padding: 14px; margin: 8px 0; border-radius: 20px; border: 3px solid #00796b; cursor: pointer; font-family: inherit; font-size: 18px; font-weight: bold; background: white; }

        .sidebar { position: fixed; right: -550px; top: 0; width: 85%; max-width: 400px; height: 100%; background: white; border-left: 8px solid #ff9800; transition: 0.4s; padding: 30px; z-index: 1000; overflow-y: auto; box-sizing: border-box; }
        .sidebar.active { right: 0; }
        input, select { width: 100%; padding: 12px; border-radius: 15px; border: 3px solid #00796b; font-family: inherit; font-size: 16px; margin-bottom: 12px; box-sizing: border-box; }
        
        .zoom-controls { position: absolute; bottom: 15px; right: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 110; }
        .z-btn { width: 50px; height: 50px; border-radius: 15px; border: 4px solid #004d40; background: white; font-size: 26px; font-weight: bold; cursor: pointer; }
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #00796b; }
        
        .member-item { display: flex; justify-content: space-between; align-items: center; background: #e0f2f1; padding: 8px 12px; border-radius: 12px; margin-bottom: 6px; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .member-item:hover { background: #b2dfdb; }
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .avatar-option { font-size: 30px; cursor: pointer; padding: 5px; text-align: center; border: 2px solid transparent; border-radius: 10px; }
        .avatar-option:hover { background: #e0f7fa; border-color: #00796b; }
    </style>
</head>
<body>

<div id="loader" class="loading-screen">Загрузка данных... ☁️</div>

<div class="main-wrapper">
    <div class="top-bar">
        <div id="p-card" class="profile-card">
            <div class="crown-icon">👑</div>
            <div id="current-avatar" class="avatar-circle" onclick="openAvatarPicker()">👤</div>
            <div style="flex:1; min-width: 0;">
                <b id="current-user-name">...</b>
                <div style="color: #00796b; font-weight: bold; font-size: 18px;">⭐️ <span id="score-val">0</span> <button onclick="renameCurrentPlayer()" style="background:none; border:none; font-size:18px; cursor:pointer; padding:0; margin-left:5px;">✏️</button></div>
            </div>
        </div>
        <div class="btn-group">
            <button class="chat-btn" onclick="syncData()">🔄</button>
            <button class="menu-btn" onclick="toggleSidebar()">⚙️</button>
        </div>
    </div>

    <div class="map-viewport" id="viewport">
        <div id="map-container">
            <!-- Добавлены data-name для автоматического распознавания мебели и комнат -->
            <div class="layer" data-name="Санузел 1" style="background-image: url('Sanuzel1.png');"></div>
            <div class="layer" data-name="Коридор" style="background-image: url('Koridor.png');"></div>
            <div class="layer" data-name="Гостиная" style="background-image: url('Gostinaya.png');"></div>
            <div class="layer" data-name="Спальня 1" style="background-image: url('Spalnya1.png');"></div>
            <div class="layer" data-name="Спальня 2" style="background-image: url('Spalnya2.png');"></div>
            <div class="layer" data-name="Ванная" style="background-image: url('Vannaya.png');"></div>
            <div class="layer" data-name="Санузел 2" style="background-image: url('Sanuzel2.png');"></div>
            <div class="layer" data-name="Кухня" style="background-image: url('Kuhnya.png');"></div>
            <div class="layer" data-name="Балкон" style="background-image: url('Balcon.png');"></div>
            <div class="layer" data-name="Лапомойка" style="background-image: url('Lapomoika.png');"></div>
            <div class="layer" data-name="Унитаз" style="background-image: url('Unitaz1.png');"></div>
            <div class="layer" data-name="Стиральная машина" style="background-image: url('Stiralka.png');"></div>
            <div class="layer" data-name="Корзина для белья" style="background-image: url('Korzina.png');"></div>
            <div class="layer" data-name="Тумбочка" style="background-image: url('Tumbochka.png');"></div>
            <div class="layer" data-name="Вешалка" style="background-image: url('Veshalka.png');"></div>
            <div class="layer" data-name="Шкаф 1" style="background-image: url('Shkaf1.png');"></div>
            <div class="layer" data-name="Шкаф 2" style="background-image: url('Shkaf2.png');"></div>
            <div class="layer" data-name="Шкаф 3" style="background-image: url('Shkaf3.png');"></div>
            <div class="layer" data-name="Шкаф 4" style="background-image: url('Shkaf4.png');"></div>
            <div class="layer" data-name="Шкаф 5" style="background-image: url('Shkaf5.png');"></div>
            <div id="quest-arrows"></div>
        </div>
        <div class="zoom-controls">
            <button class="z-btn" onclick="btnZoom(0.2, true)">+</button>
            <button class="z-btn" onclick="btnZoom(-0.2, true)">−</button>
        </div>
    </div>
</div>

<div id="overlay" onclick="closeAll()" class="overlay"></div>

<!-- Настройки (Сайдбар) -->
<div id="sidebar" class="sidebar">
    <h2>Настройки ⚙️</h2>
    
    <h3>Название семьи</h3>
    <input type="text" id="family-name-input" placeholder="Фамилия / Название">
    <button class="btn-choice" style="background:#4caf50; color:white; font-size:16px; padding:8px;" onclick="saveFamilyName()">Сохранить название</button>
    <hr>
    
    <h3>Участники (нажмите для переключения)</h3>
    <div id="members-list"></div>
    
    <h4>Добавить участника</h4>
    <input type="text" id="new-member-name" placeholder="Имя участника">
    <select id="new-member-role">
        <option value="member">Участник</option>
        <option value="admin">Администратор 👑</option>
    </select>
    <button class="btn-choice" style="background:#00796b; color:white; font-size:16px; padding:10px;" onclick="addNewMember()">Добавить человека</button>
    
    <br><br>
    <button class="btn-choice" onclick="toggleSidebar()">Закрыть настройки</button>
</div>

<!-- Модальное окно создания задания -->
<div id="createQuestModal" class="modal">
    <h2 id="create-modal-title">Создать задание 📝</h2>
    <input type="text" id="new-quest-text" placeholder="Что нужно сделать?">
    <button class="btn-choice" style="background:#4caf50; color:white;" onclick="confirmCreateQuest()">ПОСТАВИТЬ ✅</button>
    <button class="btn-choice" onclick="closeAll()">ОТМЕНА ❌</button>
</div>

<!-- Модальное окно просмотра задания -->
<div id="taskModal" class="modal">
    <h2 id="taskText">...</h2>
    <p>Награда за выполнение: ⭐️ 10</p>
    <button class="btn-choice" style="background:#4caf50; color:white;" onclick="completeCurrentQuest()">ВЫПОЛНЕНО 🎉</button>
    <button class="btn-choice" style="background:#f44336; color:white; font-size:14px; padding:8px;" onclick="deleteCurrentQuest()">Удалить квест 🗑</button>
    <button class="btn-choice" onclick="closeAll()">ЗАКРЫТЬ</button>
</div>

<!-- Модальное окно выбора аватара -->
<div id="avatarModal" class="modal">
    <h2>Выберите аватар 👤</h2>
    <div class="avatar-grid">
        <div class="avatar-option" onclick="selectAvatar('🧙‍♂️')">🧙‍♂️</div>
        <div class="avatar-option" onclick="selectAvatar('🧝‍♀️')">🧝‍♀️</div>
        <div class="avatar-option" onclick="selectAvatar('🐱')">🐱</div>
        <div class="avatar-option" onclick="selectAvatar('🐶')">🐶</div>
        <div class="avatar-option" onclick="selectAvatar('🦊')">🦊</div>
        <div class="avatar-option" onclick="selectAvatar('🦁')">🦁</div>
        <div class="avatar-option" onclick="selectAvatar('🐼')">🐼</div>
        <div class="avatar-option" onclick="selectAvatar('🤖')">🤖</div>
    </div>
    <br>
    <button class="btn-choice" onclick="closeAll()">Закрыть</button>
</div>

<script>
    // Корректная глубокая инициализация без перезаписи профиля
    let appState = JSON.parse(localStorage.getItem('familyQuestState')) || {};
    
    if (!appState.familyName) appState.familyName = "Наша семья";
    if (!appState.members || appState.members.length === 0) {
        appState.members = [
            { name: "Мама", role: "admin", avatar: "👩‍🦰", score: 0 },
            { name: "Папа", role: "member", avatar: "👨", score: 0 }
        ];
    }
    if (!appState.currentUser) {
        appState.currentUser = appState.members[0];
    }
    if (!appState.quests) appState.quests = [];

    let zoom = 0.6;
    let panX = 0, panY = 0;
    
    let isDragging = false;
    let startX, startY;
    
    let startDist = 0;
    let startZoom = 0;

    let lastClickCoords = { x: 0, y: 0 };
    let activeQuestId = null;
    let detectedLocationName = "";

    const mapContainer = document.getElementById('map-container');
    const viewport = document.getElementById('viewport');

    window.onload = function() {
        document.getElementById('loader').style.display = 'none';
        initMapControls();
        renderAppState();
        centerMap();
    };

    function centerMap() {
        const vRect = viewport.getBoundingClientRect();
        panX = (vRect.width - 1000 * zoom) / 2;
        panY = (vRect.height - 1000 * zoom) / 2;
        updateTransform();
    }

    function saveState() {
        localStorage.setItem('familyQuestState', JSON.stringify(appState));
        renderAppState();
    }

    function syncData() {
        renderAppState();
        alert("Данные успешно обновлены! 🔄");
    }

    function renderAppState() {
        document.getElementById('current-user-name').innerText = `${appState.familyName}: ${appState.currentUser.name}`;
        document.getElementById('current-avatar').innerText = appState.currentUser.avatar || "👤";
        document.getElementById('score-val').innerText = appState.currentUser.score;

        if(appState.currentUser.role === 'admin') {
            document.getElementById('p-card').classList.add('is-admin');
        } else {
            document.getElementById('p-card').classList.remove('is-admin');
        }

        document.getElementById('family-name-input').value = appState.familyName;

        const listDiv = document.getElementById('members-list');
        listDiv.innerHTML = '';
        appState.members.forEach((m, idx) => {
            const isCurrent = m.name === appState.currentUser.name;
            listDiv.innerHTML += `
                <div class="member-item" style="${isCurrent ? 'border: 3px solid #00796b; background: #b2dfdb;' : ''}" onclick="switchProfile(${idx})">
                    <span>${m.avatar || '👤'} <b>${m.name}</b> (${m.role === 'admin' ? 'Админ 👑' : 'Участник'}) — ⭐️ ${m.score}</span>
                    ${idx > 0 ? `<button onclick="event.stopPropagation(); removeMember(${idx})" style="background:none; border:none; color:red; cursor:pointer; font-size:16px;">❌</button>` : ''}
                </div>
            `;
        });

        renderQuests();
    }

    function switchProfile(idx) {
        appState.currentUser = appState.members[idx];
        saveState();
        alert(`Вы переключились на профиль: ${appState.currentUser.name} ${appState.currentUser.role === 'admin' ? '👑' : ''}`);
    }

    function saveFamilyName() {
        const name = document.getElementById('family-name-input').value.trim();
        if(name) {
            appState.familyName = name;
            saveState();
            alert("Название семьи изменено! 🎉");
        }
    }

    function renameCurrentPlayer() {
        const newName = prompt("Введите новое имя профиля:", appState.currentUser.name);
        if(newName && newName.trim()) {
            const oldName = appState.currentUser.name;
            
            const index = appState.members.findIndex(m => m.name === oldName);
            if(index !== -1) {
                appState.members[index].name = newName.trim();
            }
            appState.currentUser.name = newName.trim();
            saveState();
        }
    }

    function addNewMember() {
        const nameInput = document.getElementById('new-member-name');
        const roleSelect = document.getElementById('new-member-role');
        const name = nameInput.value.trim();
        
        if(!name) {
            alert("Введите имя участника!");
            return;
        }
        
        if(appState.members.some(m => m.name.toLowerCase() === name.toLowerCase())) {
            alert("Участник с таким именем уже существует!");
            return;
        }

        appState.members.push({
            name: name,
            role: roleSelect.value,
            avatar: "👤",
            score: 0
        });

        nameInput.value = '';
        saveState();
        alert("Участник успешно добавлен! 👍");
    }

    function removeMember(index) {
        if(confirm("Удалить этого участника?")) {
            if(appState.members[index].name === appState.currentUser.name) {
                appState.currentUser = appState.members[0];
            }
            appState.members.splice(index, 1);
            saveState();
        }
    }

    function openAvatarPicker() {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('avatarModal').style.display = 'block';
    }

    function selectAvatar(emoji) {
        appState.currentUser.avatar = emoji;
        const index = appState.members.findIndex(m => m.name === appState.currentUser.name);
        if(index !== -1) {
            appState.members[index].avatar = emoji;
        }
        closeAll();
        saveState();
    }

    function initMapControls() {
        updateTransform();

        // Двойной клик на ПК
        mapContainer.addEventListener('dblclick', function(e) {
            handleCreationGesture(e.clientX, e.clientY, e.target);
        });

        // Двойной тап на смартфонах
        let lastTap = 0;
        mapContainer.addEventListener('touchend', function(e) {
            if (e.touches.length > 0) return; 
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                const touch = e.changedTouches[0];
                handleCreationGesture(touch.clientX, touch.clientY, e.target);
                e.preventDefault();
            }
            lastTap = currentTime;
        });

        function handleCreationGesture(clientX, clientY, target) {
            if (appState.currentUser.role !== 'admin') {
                alert("Только Администратор 👑 может добавлять задания!");
                return;
            }
            if (target.classList.contains('arrow')) return;

            const rect = mapContainer.getBoundingClientRect();
            const x = (clientX - rect.left) / zoom;
            const y = (clientY - rect.top) / zoom;

            lastClickCoords = { x, y };
            
            // Распознавание имени объекта/мебели по тегу или фону
            detectedLocationName = "произвольное место";
            if(target.classList.contains('layer') && target.getAttribute('data-name')) {
                detectedLocationName = target.getAttribute('data-name');
            }

            document.getElementById('create-modal-title').innerText = `Задание: ${detectedLocationName} 📝`;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('createQuestModal').style.display = 'block';
        }

        // Зум в точку курсора колесиком мыши (ПК)
        viewport.addEventListener('wheel', function(e) {
            e.preventDefault();
            const rect = mapContainer.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const zoomFactor = 0.08;
            const oldZoom = zoom;

            if (e.deltaY < 0) {
                zoom = Math.min(2.5, zoom + zoomFactor);
            } else {
                zoom = Math.max(0.2, zoom - zoomFactor);
            }

            // Корректируем панораму, чтобы точка под курсором оставалась на месте
            panX -= (mouseX / oldZoom) * (zoom - oldZoom);
            panY -= (mouseY / oldZoom) * (zoom - oldZoom);

            updateTransform();
        }, { passive: false });

        // Перетаскивание карты мышкой (ПК)
        viewport.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('z-btn') || e.target.closest('.top-bar') || e.target.closest('.modal')) return;
            isDragging = true;
            startX = e.clientX - panX;
            startY = e.clientY - panY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Мультитач тач-события на смартфоне (Скролл + Зум в центр пальцев)
        viewport.addEventListener('touchstart', (e) => {
            const target = e.target;
            if (target.classList.contains('z-btn') || target.closest('.top-bar') || target.closest('.modal')) return;

            if (e.touches.length === 1) {
                isDragging = true;
                startX = e.touches[0].clientX - panX;
                startY = e.touches[0].clientY - panY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                startDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                startZoom = zoom;
            }
        });

        viewport.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && isDragging) {
                panX = e.touches[0].clientX - startX;
                panY = e.touches[0].clientY - startY;
                updateTransform();
            } else if (e.touches.length === 2) {
                const currentDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                
                const rect = mapContainer.getBoundingClientRect();
                // Находим центр между двумя пальцами
                const touchX = ((e.touches[0].clientX + e.touches[1].clientX) / 2) - rect.left;
                const touchY = ((e.touches[0].clientY + e.touches[1].clientY) / 2) - rect.top;
                
                const oldZoom = zoom;
                const factor = currentDist / startDist;
                zoom = Math.max(0.2, Math.min(2.5, startZoom * factor));

                panX -= (touchX / oldZoom) * (zoom - oldZoom);
                panY -= (touchY / oldZoom) * (zoom - oldZoom);

                updateTransform();
            }
        });

        viewport.addEventListener('touchend', (e) => {
            if (e.touches.length === 0) {
                isDragging = false;
            }
        });
    }

    function btnZoom(amount, useCenter) {
        const oldZoom = zoom;
        zoom = Math.max(0.2, Math.min(2.5, zoom + amount));
        
        if (useCenter) {
            const vRect = viewport.getBoundingClientRect();
            const centerX = vRect.width / 2 - panX;
            const centerY = vRect.height / 2 - panY;
            panX -= (centerX / oldZoom) * (zoom - oldZoom);
            panY -= (centerY / oldZoom) * (zoom - oldZoom);
        }
        updateTransform();
    }

    function updateTransform() {
        mapContainer.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
    }

    function confirmCreateQuest() {
        const textInput = document.getElementById('new-quest-text');
        if(!textInput.value.trim()) {
            alert("Введите описание задания!");
            return;
        }

        const newQuest = {
            id: Date.now(),
            text: `${detectedLocationName}: ${textInput.value.trim()}`,
            x: lastClickCoords.x,
            y: lastClickCoords.y
        };

        appState.quests.push(newQuest);
        textInput.value = '';
        closeAll();
        saveState();
    }

    function renderQuests() {
        const container = document.getElementById('quest-arrows');
        container.innerHTML = '';

        appState.quests.forEach(q => {
            const arrowEl = document.createElement('div');
            arrowEl.className = 'arrow';
            arrowEl.style.left = `${q.x}px`;
            arrowEl.style.top = `${q.y}px`;
            arrowEl.innerText = '📍';
            arrowEl.onclick = function(e) {
                e.stopPropagation();
                openQuestTask(q.id);
            };
            container.appendChild(arrowEl);
        });
    }

    function openQuestTask(id) {
        const quest = appState.quests.find(q => q.id === id);
        if(quest) {
            activeQuestId = id;
            document.getElementById('taskText').innerText = quest.text;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('taskModal').style.display = 'block';
        }
    }

    function completeCurrentQuest() {
        if(activeQuestId) {
            appState.currentUser.score += 10;
            const index = appState.members.findIndex(m => m.name === appState.currentUser.name);
            if(index !== -1) {
                appState.members[index].score = appState.currentUser.score;
            }
            appState.quests = appState.quests.filter(q => q.id !== activeQuestId);
            activeQuestId = null;
            closeAll();
            saveState();
            alert("Поздравляем! Вам начислено 10 очков! 🎉");
        }
    }

    function deleteCurrentQuest() {
        if(activeQuestId && confirm("Вы уверены, что хотите удалить это задание?")) {
            appState.quests = appState.quests.filter(q => q.id !== activeQuestId);
            activeQuestId = null;
            closeAll();
            saveState();
        }
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        if(document.getElementById('sidebar').classList.contains('active')) {
            document.getElementById('overlay').style.display = 'block';
        } else {
            document.getElementById('overlay').style.display = 'none';
        }
    }

    function closeAll() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('createQuestModal').style.display = 'none';
        document.getElementById('taskModal').style.display = 'none';
        document.getElementById('avatarModal').style.display = 'none';
        document.getElementById('sidebar').classList.remove('active');
    }
</script>
</body>
</html>
