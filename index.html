<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Семейный Квест - Финал</title>
    <style>
        body { background-color: #e0f7fa; display: flex; flex-direction: column; align-items: center; padding: 0; margin: 0; height: 100vh; overflow: hidden; font-family: 'Comic Sans MS', cursive, sans-serif; }
        .main-wrapper { width: 100%; max-width: 500px; display: flex; flex-direction: column; height: 100%; }
        
        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-bar { display: flex; justify-content: space-between; align-items: stretch; padding: 10px; gap: 8px; z-index: 100; flex-shrink: 0; }
        .profile-card { background: white; padding: 10px; border-radius: 25px; border: 4px solid #00796b; display: flex; align-items: center; gap: 10px; flex: 2; position: relative; min-width: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .crown-icon { position: absolute; top: -18px; left: 5px; font-size: 32px; transform: rotate(-15deg); display: none; z-index: 10; }
        .is-admin .crown-icon { display: block; }
        .avatar-circle { width: 60px; height: 60px; background: #eee; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; cursor: pointer; border: 3px solid #00796b; overflow: hidden; background-size: cover; background-position: center; flex-shrink: 0; }
        
        .btn-group { display: flex; flex-direction: column; gap: 5px; flex: 0.8; }
        .menu-btn, .chat-btn { height: 100%; min-height: 45px; border-radius: 18px; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 16px; border: 3px solid; display: flex; justify-content: center; align-items: center; }
        .menu-btn { background: #ff9800; color: white; border-color: #e65100; }
        .chat-btn { background: #4caf50; color: white; border-color: #2e7d32; }

        /* ИГРОВОЕ ПОЛЕ */
        .map-viewport { flex: 1; width: 100%; position: relative; overflow: hidden; background: #cfd8dc; touch-action: none; border-top: 2px solid #004d40; }
        #map-container { position: absolute; width: 1000px; height: 1000px; transform-origin: 0 0; }
        .layer { position: absolute; top: 0; left: 0; width: 1000px; height: 1000px; pointer-events: none; background-size: contain; background-repeat: no-repeat; transition: filter 0.3s; }
        
        /* СВЕЧЕНИЕ МЕБЕЛИ */
        .highlight { filter: drop-shadow(0 0 25px #00e5ff) brightness(1.4) !important; }

        #quest-arrows { position: absolute; top: 0; left: 0; width: 1000px; height: 1000px; pointer-events: none; z-index: 60; }
        .arrow { position: absolute; width: 55px; height: 55px; cursor: pointer; animation: bounce 1.5s infinite; transform: translate(-50%, -50%); pointer-events: auto; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3)); }
        @keyframes bounce { 0%, 100% { transform: translate(-50%, -50%); } 50% { transform: translate(-50%, -80%); } }

        /* БИРЮЗОВАЯ РАМКА 6PX И СКРУГЛЕНИЕ 35PX */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 500; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 35px; border: 6px solid #00796b; text-align: center; width: 85%; max-width: 420px; z-index: 1000; box-shadow: 0 0 50px rgba(0,0,0,0.4); }
        .btn-choice { width: 100%; padding: 16px; margin: 8px 0; border-radius: 20px; border: 3px solid #00796b; cursor: pointer; font-family: inherit; font-size: 20px; background: white; font-weight: bold; }

        .sidebar { position: fixed; right: -550px; top: 0; width: 85%; max-width: 420px; height: 100%; background: white; border-left: 8px solid #ff9800; transition: 0.4s; padding: 30px; z-index: 1000; overflow-y: auto; box-sizing: border-box; }
        .sidebar.active { right: 0; }
        .member-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 2px solid #ffcc80; }
        input { width: 100%; padding: 15px; border-radius: 15px; border: 3px solid #00796b; font-family: inherit; font-size: 18px; box-sizing: border-box; margin-bottom: 10px; }
        .zoom-controls { position: absolute; bottom: 15px; right: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 110; }
        .z-btn { width: 50px; height: 50px; border-radius: 15px; border: 4px solid #004d40; background: white; font-size: 26px; font-weight: bold; color: #004d40; cursor: pointer; }
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #00796b; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader" class="loading-screen">Синхронизация с облаком... ☁️</div>

<div class="main-wrapper">
    <div class="top-bar">
        <div id="p-card" class="profile-card">
            <div class="crown-icon">👑</div>
            <div id="current-avatar" class="avatar-circle" onclick="openAvatarPicker()">👤</div>
            <div style="flex:1; min-width: 0;">
                <b id="current-user-name">...</b>
                <div style="color: #00796b; font-weight: bold; font-size: 18px;">⭐️ <span id="score-val">0</span> <button onclick="renameCurrentPlayer()" style="background:none; border:none; font-size:18px; cursor:pointer;">✏️</button></div>
            </div>
        </div>
        <div class="btn-group">
            <button class="chat-btn" onclick="syncData()">🔄</button>
            <button class="menu-btn" onclick="toggleSidebar()">⚙️</button>
        </div>
    </div>

    <div class="map-viewport" id="viewport">
        <div id="map-container">
            <!-- СЛОИ КОМНАТ -->
            <div class="layer" style="background-image: url('Sanuzel1.png');"></div>
            <div class="layer" style="background-image: url('Koridor.png');"></div>
            <div class="layer" style="background-image: url('Gostinaya.png');"></div>
            <div class="layer" style="background-image: url('Spalnya1.png');"></div>
            <div class="layer" style="background-image: url('Spalnya2.png');"></div>
            <div class="layer" style="background-image: url('Vannaya.png');"></div>
            <div class="layer" style="background-image: url('Sanuzel2.png');"></div>
            <div class="layer" style="background-image: url('Kuhnya.png');"></div>
            <div class="layer" style="background-image: url('Balcon.png');"></div>
            <!-- СЛОИ МЕБЕЛИ С ЛОКАЛЬНЫМИ ID ДЛЯ ПОДСВЕТКИ -->
            <div id="obj-Lapomoika" class="layer" style="background-image: url('Lapomoika.png');"></div>
            <div id="obj-Unitaz1" class="layer" style="background-image: url('Unitaz1.png');"></div>
            <div id="obj-Stiralka" class="layer" style="background-image: url('Stiralka.png');"></div>
            <div id="obj-Korzina" class="layer" style="background-image: url('Korzina.png');"></div>
            <div id="obj-Tumbochka" class="layer" style="background-image: url('Tumbochka.png');"></div>
            <div id="obj-Veshalka" class="layer" style="background-image: url('Veshalka.png');"></div>
            <div id="obj-Shkaf1" class="layer" style="background-image: url('Shkaf1.png');"></div>
            <div id="obj-Shkaf2" class="layer" style="background-image: url('Shkaf2.png');"></div>
            <div id="obj-Shkaf3" class="layer" style="background-image: url('Shkaf3.png');"></div>
            <div id="obj-Shkaf4" class="layer" style="background-image: url('Shkaf4.png');"></div>
            <div id="obj-Shkaf5" class="layer" style="background-image: url('Shkaf5.png');"></div>
            <div id="quest-arrows"></div>
        </div>
        <div class="zoom-controls">
            <button class="z-btn" onclick="btnZoom(0.3)">+</button>
            <button class="z-btn" onclick="btnZoom(-0.3)">−</button>
        </div>
    </div>
</div>

<div id="overlay" onclick="closeAll()" class="overlay"></div>

<!-- МОДАЛКИ С ТРЕБУЕМЫМ СТИЛЕМ -->
<div id="createQuestModal" class="modal">
    <h2 id="modal-title">Задание 📝</h2>
    <p id="furniture-hint" style="color:#00796b; font-weight:bold; margin-bottom:10px;"></p>
    <input type="text" id="new-quest-text" placeholder="Какое задание хотите здесь назначить?">
    <button class="btn-choice" style="background:#4caf50; color:white;" onclick="confirmCreateQuest()">ПОСТАВИТЬ ✅</button>
    <button class="btn-choice" onclick="cancelQuest()">ОТМЕНА ❌</button>
</div>

<div id="taskModal" class="modal">
    <h2 id="taskText">...</h2>
    <button class="btn-choice" style="background:#00796b; color:white;" onclick="completeTask()">ГОТОВО ✅</button>
    <button class="btn-choice" onclick="closeAll()">ЗАКРЫТЬ 🔙</button>
</div>

<div id="sidebar" class="sidebar">
    <h2 style="color:#00796b;">🏡 Семья</h2>
    <div id="family-list" style="background:#fff3e0; padding:15px; border-radius:20px; margin-bottom:20px;"></div>
    <button class="btn-choice" style="background:#4caf50; color:white; border:none;" onclick="addNewMember()">➕ ДОБАВИТЬ ИГРОКА</button>
    <div id="switch-list"></div>
    <button class="btn-choice" onclick="closeAll()" style="margin-top:40px; background:#eee;">ЗАКРЫТЬ ❌</button>
</div>

<div id="avatarModal" class="modal">
    <h2>Аватар героя 🎭</h2>
    <div id="emoji-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:20px 0;"></div>
    <button class="btn-choice" onclick="closeAll()">🔙 НАЗАД</button>
</div>

<script>
    const SCRIPT_URL = 'google.com';
    
    let state = { currentUserIndex: 0, adminIndex: 0, quests: [], members: [] };
    const container = document.getElementById('map-container');
    const view = document.getElementById('viewport');
    const qBox = document.getElementById('quest-arrows');
    
    const furnitureZones = [
        { id: 'Lapomoika', name: '🐾 Лапомойка', x: 745, y: 405, r: 85 }, { id: 'Unitaz1', name: '🚽 Унитаз', x: 865, y: 405, r: 85 },
        { id: 'Stiralka', name: '🧼 Стиральная машина', x: 865, y: 555, r: 95 }, { name: '🧺 Корзина', x: 765, y: 555, r: 85 },
        { id: 'Veshalka', name: '🧥 Вешалка', x: 690, y: 420, r: 75 }, { name: '🗄 Тумбочка', x: 640, y: 500, r: 60 },
        { id: 'Shkaf1', name: '👟 Шкаф для обуви', x: 505, y: 620, r: 85 }, { id: 'Shkaf2', name: '👗 Шкаф для одежды', x: 410, y: 620, r: 85 },
        { id: 'Shkaf3', name: '🧹 Хоз. шкаф', x: 330, y: 630, r: 75 }, { id: 'Shkaf4', name: '⛺️ Шкаф спорт', x: 330, y: 710, r: 75 },
        { id: 'Shkaf5', name: '📦 Доп. шкаф', x: 330, y: 790, r: 75 }
    ];

    let scale = 0.5, posX = 0, posY = 0, isDragging = false, startX, startY, lastTap = 0, initialDist = null, initialScale = 0, oldPos = {s: 0.5, x: 0, y: 0};

    function updateTransform() { container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
    function applyZoom(delta, clientX, clientY) {
        const rect = view.getBoundingClientRect();
        const newScale = Math.min(Math.max(0.1, scale + delta), 4);
        posX = (clientX - rect.left) - (clientX - rect.left - posX) * (newScale / scale);
        posY = (clientY - rect.top) - (clientY - rect.top - posY) * (newScale / scale);
        scale = newScale; updateTransform();
    }
    function btnZoom(delta) { applyZoom(delta, view.offsetWidth / 2, view.offsetHeight / 2); }

    // ТАЧ И ПК СЦЕНАРИИ УПРАВЛЕНИЯ
    view.addEventListener('touchstart', e => {
        if (e.touches.length === 1) { isDragging = true; startX = e.touches.clientX - posX; startY = e.touches.clientY - posY; container.style.transition = 'none'; }
        else if (e.touches.length === 2) { isDragging = false; initialDist = Math.hypot(e.touches.clientX - e.touches.clientX, e.touches.clientY - e.touches.clientY); initialScale = scale; }
    }, {passive: false});

    view.addEventListener('touchmove', e => {
        e.preventDefault();
        if (e.touches.length === 1 && isDragging) { posX = e.touches.clientX - startX; posY = e.touches.clientY - startY; }
        else if (e.touches.length === 2 && initialDist) {
            const currentDist = Math.hypot(e.touches.clientX - e.touches.clientX, e.touches.clientY - e.touches.clientY);
            applyZoom((initialScale * (currentDist / initialDist)) - scale, (e.touches.clientX + e.touches.clientX)/2, (e.touches.clientY + e.touches.clientY)/2);
        }
        updateTransform();
    }, {passive: false});

    view.addEventListener('touchend', () => { isDragging = false; initialDist = null; });
    view.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY; container.style.transition = 'none'; });
    window.addEventListener('mousemove', e => { if (isDragging) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); } });
    window.addEventListener('mouseup', () => isDragging = false);
    view.addEventListener('wheel', e => { e.preventDefault(); applyZoom(e.deltaY < 0 ? 0.1 : -0.1, e.clientX, e.clientY); }, {passive:false});

    // ТУК-ТУК КЛИК С СИЯНИЕМ И УМНЫМ МАСШТАБОМ
    view.addEventListener('click', e => {
        if (state.members.length > 0 && state.currentUserIndex !== state.adminIndex) return;
        const now = Date.now();
        if (now - lastTap < 300) {
            const rect = container.getBoundingClientRect();
            const mapX = (e.clientX - rect.left) / scale, mapY = (e.clientY - rect.top) / scale;
            let found = furnitureZones.find(f => Math.hypot(f.x - mapX, f.y - mapY) < f.r);
            
            if(found) {
                const el = document.getElementById('obj-' + found.id);
                if(el) { el.classList.add('highlight'); setTimeout(() => el.classList.remove('highlight'), 1000); }
            }
            oldPos = {s: scale, x: posX, y: posY};
            applyZoom(1.4 - scale, e.clientX, e.clientY);
            container.style.transition = 'transform 0.4s ease-out';
            window.tempCoords = { x: mapX, y: mapY };
            setTimeout(() => {
                document.getElementById('furniture-hint').innerText = found ? `Объект: ${found.name}` : "Пустая зона комнат";
                document.getElementById('createQuestModal').style.display='block';
                document.getElementById('overlay').style.display='block';
            }, 350);
        }
        lastTap = now;
    });

    // СИНХРОНИЗАЦИЯ ОБЛАКА JSON С GOOGLE SHEETS
    async function syncData() {
        document.getElementById('loader').style.display = 'flex';
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            state.members = []; state.quests = [];
            
            for(let i = 1; i < data.length; i++) {
                const row = data[i];
                if (!row[0]) continue;
                if(row[0] === 'member') state.members.push({name: row[1], points: parseInt(row[2]) || 0, avatar: row[3] || '👤'});
                if(row[0] === 'quest') state.quests.push({text: row[1], x: parseFloat(row[2]), y: parseFloat(row[3])});
                if(row[0] === 'config') { state.adminIndex = parseInt(row[2]) || 0; state.currentUserIndex = parseInt(row[3]) || 0; }
            }
            if(state.members.length === 0) { state.members.push({name: "Админ", points: 0, avatar: "👤"}); }
            updateUI();
        } catch (e) { console.error("Ошибка сети", e); }
        document.getElementById('loader').style.display = 'none';
    }

    async function pushToCloud() {
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({action: 'clear'}), mode: 'no-cors' });
            for (let m of state.members) {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type: 'member', name: m.name, val1: m.points, val2: m.avatar}), mode: 'no-cors' });
            }
            for (let q of state.quests) {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type: 'quest', name: q.text, val1: q.x, val2: q.y}), mode: 'no-cors' });
            }
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type: 'config', val1: state.adminIndex, val2: state.currentUserIndex}), mode: 'no-cors' });
        } catch(e) { console.error(e); }
    }

    function updateUI() {
        const user = state.members[state.currentUserIndex] || state.members[0];
        if(!user) return;
        document.getElementById('current-user-name').innerText = user.name;
        document.getElementById('score-val').innerText = user.points;
        document.getElementById('current-avatar').innerText = user.avatar;
        document.getElementById('p-card').classList.toggle('is-admin', state.currentUserIndex === state.adminIndex);
        
        qBox.innerHTML = '';
        state.quests.forEach((q, i) => {
            const img = document.createElement('img'); img.src = 'arrow.png'; img.className = 'arrow';
            img.style.left = q.x + 'px'; img.style.top = q.y + 'px';
            img.onclick = e => { e.stopPropagation(); openQuest(i); };
            qBox.appendChild(img);
        });

        const fList = document.getElementById('family-list'); fList.innerHTML = '';
        const sList = document.getElementById('switch-list'); sList.innerHTML = '<h3 style="color:#e65100">🔄 Сменить героя:</h3>';
        state.members.forEach((m, i) => {
            fList.innerHTML += `<div class="member-item"><span>${m.avatar} ${m.name} ${i===state.adminIndex?'👑':''}</span><div><button onclick="setAdmin(${i})" style="border:none;background:none;font-size:24px;">👑</button><button onclick="renameAnyMember(${i})" style="border:none;background:none;font-size:24px;">✏️</button></div></div>`;
            if(i !== state.currentUserIndex) sList.innerHTML += `<button class="btn-choice" onclick="switchProfile(${i})">${m.name}</button>`;
        });
    }

    function confirmCreateQuest() {
        const txt = document.getElementById('new-quest-text').value;
        if(txt) { state.quests.push({ x: window.tempCoords.x, y: window.tempCoords.y, text: txt }); document.getElementById('new-quest-text').value = ''; pushToCloud().then(updateUI); }
        cancelQuest();
    }
    function completeTask() { state.members[state.currentUserIndex].points += 10; state.quests.splice(window.activeIdx, 1); pushToCloud().then(updateUI); closeAll(); }
    function addNewMember() { let n = prompt("Имя игрока:"); if(n) { state.members.push({name:n, points:0, avatar:'👤'}); pushToCloud().then(updateUI); } }
    function renameCurrentPlayer() { let n = prompt("Имя:", state.members[state.currentUserIndex].name); if(n) { state.members[state.currentUserIndex].name = n; pushToCloud().then(updateUI); } }
    function renameAnyMember(i) { let n = prompt("Имя:", state.members[i].name); if(n) { state.members[i].name = n; pushToCloud().then(updateUI); } }
    function openAvatarPicker() { document.getElementById('avatarModal').style.display='block'; document.getElementById('overlay').style.display='block'; }
    function setAvatar(e) { state.members[state.currentUserIndex].avatar = e; pushToCloud().then(() => { updateUI(); closeAll(); }); }
    function cancelQuest() { scale = oldPos.s; posX = oldPos.x; posY = oldPos.y; container.style.transition = 'transform 0.4s'; updateTransform(); closeAll(); }
    function openQuest(idx) { window.activeIdx = idx; document.getElementById('taskText').innerText = state.quests[idx].text; document.getElementById('taskModal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
    function closeAll() { document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display='none'; }
    function toggleSidebar() { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
    function switchProfile(i) { state.currentUserIndex = i; pushToCloud().then(updateUI); closeAll(); }
    function setAdmin(i) { state.adminIndex = i; pushToCloud().then(updateUI); }

    const emojis = ['🐱','🐶','🦊','🐼','🐨','🐯','🦁','🦄','🐷','🐸','🐮','🦒'];
    document.getElementById('emoji-grid').innerHTML = emojis.map(e => `<span onclick="setAvatar('${e}')" style="font-size:35px; cursor:pointer;">${e}</span>`).join('');
    
    syncData();
    setTimeout(() => { posX = (view.offsetWidth - 1000*0.4)/2; posY = (view.offsetHeight - 1000*0.4)/2; scale=0.4; updateTransform(); }, 600);
</script>
</body>
</html>
