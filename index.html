<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Семейный Квест</title>
    <style>
        body { background-color: #e0f7fa; font-family: 'Comic Sans MS', cursive, sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 30px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { background: #ff9800; border: none; padding: 10px 20px; border-radius: 30px; margin: 5px; cursor: pointer; font-weight: bold; }
        input { padding: 10px; border-radius: 30px; border: 2px solid #00796b; width: 90%; margin: 10px 0; }
        .player-card { background: #fff3e0; border-radius: 20px; padding: 10px 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .sidebar { position: fixed; right: -550px; top: 0; width: 85%; max-width: 420px; height: 100%; background: white; border-left: 8px solid #ff9800; transition: 0.4s; padding: 30px; z-index: 1000; overflow-y: auto; }
        .sidebar.active { right: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 500; }
        .status { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; border-radius: 10px; font-size: 11px; z-index: 999; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 35px; border: 6px solid #00796b; text-align: center; width: 85%; max-width: 420px; z-index: 1000; }
        .btn-choice { width: 100%; padding: 16px; margin: 8px 0; border-radius: 20px; border: 3px solid #00796b; cursor: pointer; font-weight: bold; }
        .member-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 2px solid #ffcc80; }
    </style>
</head>
<body>

<div id="statusMsg" class="status"></div>
<div id="overlay" class="overlay" onclick="closeSidebar()"></div>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <span id="currentAvatar" style="font-size: 40px; cursor: pointer;" onclick="openAvatarPicker()">👤</span>
            <span id="currentName" style="font-size: 24px; font-weight: bold;"></span>
        </div>
        <div style="background: gold; padding: 8px 15px; border-radius: 30px;">⭐️ <span id="currentPoints">0</span></div>
    </div>
    
    <button onclick="addPoints()" style="background:#4caf50; color:white; width:100%; margin: 15px 0;">🎁 +10 бонусов</button>
    <button onclick="toggleSidebar()" style="width:100%;">⚙️ Меню</button>
    
    <h3>👨‍👩‍👧‍👦 Семья</h3>
    <div id="playersList"></div>
</div>

<div id="sidebar" class="sidebar">
    <h2>🏡 Семья</h2>
    <div id="familyList"></div>
    <button class="btn-choice" style="background:#4caf50; color:white;" onclick="addMember()">➕ ДОБАВИТЬ ИГРОКА</button>
    <div id="switchList"></div>
    <button class="btn-choice" onclick="closeSidebar()">ЗАКРЫТЬ ❌</button>
</div>

<div id="avatarModal" class="modal">
    <h2>Аватар героя 🎭</h2>
    <div id="avatarGrid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:20px 0;"></div>
    <button class="btn-choice" onclick="closeModal()">ЗАКРЫТЬ</button>
</div>

<script>
    // ==================== ТВОИ НАСТРОЙКИ ====================
    const GITHUB_TOKEN = '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';  // ВСТАВЬ СВОЙ ТОКЕН
    const REPO_OWNER = 'NChu-GH';
    const REPO_NAME = 'home-quest';
    const DATA_FILE = 'family-data.json';
    // ====================================================

    let players = [];
    let currentPlayerId = null;
    let adminId = null;

    function showStatus(msg, isError = false) {
        const el = document.getElementById('statusMsg');
        el.innerHTML = msg;
        el.style.background = isError ? 'rgba(255,0,0,0.8)' : 'rgba(0,0,0,0.7)';
        setTimeout(() => { el.innerHTML = ''; }, 3000);
    }

    async function loadData() {
        try {
            const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${DATA_FILE}?t=${Date.now()}`;
            const res = await fetch(url);
            if (res.ok) {
                const data = await res.json();
                players = data.players || [];
                adminId = data.adminId || (players[0]?.id || null);
                currentPlayerId = data.currentPlayerId || (players[0]?.id || null);
            } else {
                players = [];
                adminId = null;
                currentPlayerId = null;
            }
        } catch(e) {
            players = [];
            adminId = null;
            currentPlayerId = null;
        }
        
        const savedId = localStorage.getItem('playerId');
        if (savedId && players.find(p => p.id === savedId)) {
            currentPlayerId = savedId;
        } else if (players.length > 0) {
            currentPlayerId = players[0].id;
            localStorage.setItem('playerId', currentPlayerId);
        }
        
        renderUI();
    }

    async function saveData() {
        if (!GITHUB_TOKEN || GITHUB_TOKEN === 'ghp_твой_токен_сюда') {
            showStatus('⚠️ Вставь GitHub токен в код', true);
            return false;
        }
        
        const dataToSave = {
            players: players,
            adminId: adminId,
            currentPlayerId: currentPlayerId,
            updated: new Date().toISOString()
        };
        
        try {
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(dataToSave, null, 2))));
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`;
            
            // Получаем текущий файл (если есть)
            let sha = null;
            const getRes = await fetch(url);
            if (getRes.ok) {
                const existing = await getRes.json();
                sha = existing.sha;
            }
            
            // Сохраняем
            const res = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: 'Обновление данных',
                    content: content,
                    sha: sha
                })
            });
            
            if (res.ok) {
                showStatus('✅ Сохранено в GitHub');
                return true;
            } else {
                const err = await res.text();
                showStatus('❌ Ошибка: ' + err.substring(0, 100), true);
                return false;
            }
        } catch(e) {
            showStatus('❌ Ошибка: ' + e.message, true);
            return false;
        }
    }

    function renderUI() {
        const current = players.find(p => p.id === currentPlayerId);
        
        if (players.length === 0) {
            document.getElementById('currentName').innerText = 'Нет игроков';
            document.getElementById('currentPoints').innerText = '0';
            document.getElementById('currentAvatar').innerText = '👤';
            document.getElementById('playersList').innerHTML = '<div>Нажмите "Меню" → "Добавить игрока"</div>';
            return;
        }
        
        document.getElementById('currentName').innerText = current.name;
        document.getElementById('currentPoints').innerText = current.points;
        document.getElementById('currentAvatar').innerText = current.avatar;
        
        let playersHtml = '';
        for (let p of players) {
            playersHtml += `<div class="player-card">
                <div>${p.avatar} ${p.name} ${p.id === adminId ? '👑' : ''}</div>
                <div>⭐️ ${p.points}</div>
            </div>`;
        }
        document.getElementById('playersList').innerHTML = playersHtml;
        
        // Семейный список в меню
        let familyHtml = '';
        for (let p of players) {
            familyHtml += `<div class="member-item">
                <span>${p.avatar} ${p.name} ${p.id === adminId ? '👑' : ''}</span>
                <div>
                    <button onclick="setAsAdmin('${p.id}')" style="font-size:24px;">👑</button>
                    <button onclick="renamePlayer('${p.id}')" style="font-size:24px;">✏️</button>
                </div>
            </div>`;
        }
        document.getElementById('familyList').innerHTML = familyHtml;
        
        // Список смены игрока
        let switchHtml = '<h3>🔄 Сменить героя:</h3>';
        for (let p of players) {
            if (p.id !== currentPlayerId) {
                switchHtml += `<button class="btn-choice" onclick="switchPlayer('${p.id}')">${p.name}</button>`;
            }
        }
        document.getElementById('switchList').innerHTML = switchHtml;
    }

    async function addMember() {
        let name = prompt('Имя игрока:');
        if (!name) return;
        
        const newId = Date.now().toString();
        players.push({
            id: newId,
            name: name,
            points: 0,
            avatar: '👤'
        });
        
        if (players.length === 1) {
            adminId = newId;
            currentPlayerId = newId;
            localStorage.setItem('playerId', newId);
        }
        
        await saveData();
        renderUI();
    }

    async function addPoints() {
        const player = players.find(p => p.id === currentPlayerId);
        if (player) {
            player.points += 10;
            await saveData();
            renderUI();
        }
    }

    async function renamePlayer(id) {
        const player = players.find(p => p.id === id);
        let newName = prompt('Новое имя:', player.name);
        if (newName) {
            player.name = newName;
            await saveData();
            renderUI();
        }
    }

    async function setAsAdmin(id) {
        adminId = id;
        await saveData();
        renderUI();
    }

    async function switchPlayer(id) {
        currentPlayerId = id;
        localStorage.setItem('playerId', id);
        await saveData();
        renderUI();
        closeSidebar();
    }

    async function setAvatar(avatar) {
        const player = players.find(p => p.id === currentPlayerId);
        if (player) {
            player.avatar = avatar;
            await saveData();
            renderUI();
            closeModal();
        }
    }

    function openAvatarPicker() {
        const avatars = ['🐱','🐶','🦊','🐼','🐨','🐯','🦁','🦄','🐷','🐸','🐮','🦒'];
        let html = '';
        for (let a of avatars) {
            html += `<span onclick="setAvatar('${a}')" style="font-size:35px; cursor:pointer; margin:5px; display:inline-block;">${a}</span>`;
        }
        document.getElementById('avatarGrid').innerHTML = html;
        document.getElementById('avatarModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('avatarModal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.add('active');
        document.getElementById('overlay').style.display = 'block';
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('overlay').style.display = 'none';
    }

    loadData();
</script>
</body>
</html>
