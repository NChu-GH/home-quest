<script>
    let state;
    const storageKey = 'FamilyApp_Persistent_Storage'; 
    const container = document.getElementById('map-container');
    const view = document.getElementById('viewport');
    
    // ОБНОВЛЕННАЯ БАЗА ЗОН: Шкафы 2, 3, 4, 5 теперь на местах
    const zones = [
        { id: 'Lapomoika', name: '🐾 Лапомойка', x: 745, y: 405, r: 80 },
        { id: 'Unitaz1', name: '🚽 Унитаз', x: 865, y: 405, r: 80 },
        { id: 'Stiralka', name: '🧼 Стиральная машина', x: 865, y: 555, r: 90 },
        { id: 'Korzina', name: '🧺 Корзина', x: 765, y: 555, r: 80 },
        { id: 'Veshalka', name: '🧥 Вешалка', x: 690, y: 420, r: 75 },
        { id: 'Tumbochka', name: '🗄 Тумбочка', x: 640, y: 500, r: 60 },
        { id: 'Shkaf1', name: '👟 Шкаф для обуви', x: 505, y: 620, r: 80 },
        { id: 'Shkaf2', name: '👗 Шкаф для одежды', x: 410, y: 620, r: 80 }, // Сдвинул левее
        { id: 'Shkaf3', name: '🧹 Хоз. шкаф', x: 330, y: 630, r: 70 },       // Сдвинул в угол
        { id: 'Shkaf4', name: '⛺️ Шкаф ремонт/спорт', x: 330, y: 710, r: 70 }, // Ниже по стене
        { id: 'Shkaf5', name: '📦 Доп. хранение', x: 330, y: 790, r: 70 }      // Пятый шкаф
    ];

    let scale = 0.5, posX = -250, posY = -250, isDragging = false, startX, startY, lastTap = 0;
    let initialDist = null, initialScale = 0, oldPos = {s: 0.5, x: -250, y: -250};

    function updateTransform() { container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

    function applyZoom(delta, clientX, clientY) {
        const rect = view.getBoundingClientRect();
        const mouseX = clientX - rect.left, mouseY = clientY - rect.top;
        const newScale = Math.min(Math.max(0.1, scale + delta), 4);
        posX = mouseX - (mouseX - posX) * (newScale / scale);
        posY = mouseY - (mouseY - posY) * (newScale / scale);
        scale = newScale; updateTransform();
    }

    function btnZoom(delta) { applyZoom(delta, view.offsetWidth/2, view.offsetHeight/2); }

    view.addEventListener('touchstart', e => {
        if (e.touches.length === 1) { isDragging = true; startX = e.touches[0].clientX - posX; startY = e.touches[0].clientY - posY; container.style.transition = 'none'; }
        else if (e.touches.length === 2) { 
            isDragging = false; 
            initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            initialScale = scale;
        }
    }, {passive: false});

    view.addEventListener('touchmove', e => {
        e.preventDefault();
        if (e.touches.length === 1 && isDragging) { posX = e.touches[0].clientX - startX; posY = e.touches[0].clientY - startY; }
        else if (e.touches.length === 2 && initialDist) {
            const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            applyZoom((initialScale * (currentDist / initialDist)) - scale, (e.touches[0].clientX + e.touches[1].clientX)/2, (e.touches[0].clientY + e.touches[1].clientY)/2);
        }
        updateTransform();
    }, {passive: false});

    view.addEventListener('touchend', () => { isDragging = false; initialDist = null; });
    view.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY; container.style.transition = 'none'; });
    window.addEventListener('mousemove', e => { if (isDragging) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); } });
    window.addEventListener('mouseup', () => isDragging = false);
    view.addEventListener('wheel', e => { e.preventDefault(); applyZoom(e.deltaY < 0 ? 0.1 : -0.1, e.clientX, e.clientY); }, {passive:false});

    view.addEventListener('click', e => {
        if (state.currentUserIndex !== state.adminIndex) return;
        const now = Date.now();
        if (now - lastTap < 300) {
            const rect = container.getBoundingClientRect();
            const mapX = (e.clientX - rect.left) / scale, mapY = (e.clientY - rect.top) / scale;
            let found = zones.find(f => Math.hypot(f.x - mapX, f.y - mapY) < f.r);
            
            if(found) {
                const el = document.getElementById('obj-' + found.id);
                if(el) { el.classList.add('highlight'); setTimeout(() => el.classList.remove('highlight'), 1000); }
            }

            oldPos = {s: scale, x: posX, y: posY};
            applyZoom(1.4 - scale, e.clientX, e.clientY);
            container.style.transition = 'transform 0.4s ease-out';
            window.tempCoords = { x: mapX, y: mapY };
            setTimeout(() => {
                document.getElementById('furniture-hint').innerText = found ? `Объект: ${found.name}` : "Пустая зона";
                document.getElementById('createQuestModal').style.display='block';
                document.getElementById('overlay').style.display='block';
            }, 350);
        }
        lastTap = now;
    });

    function loadData() {
        const saved = localStorage.getItem(storageKey);
        state = saved ? JSON.parse(saved) : { familyName: "Дом", currentUserIndex: 0, adminIndex: 0, quests: [], members: [{name: "Админ", points: 0, avatar: "👤"}] };
        updateUI(); 
        posX = (view.offsetWidth - 1000 * scale) / 2; posY = (view.offsetHeight - 1000 * scale) / 2;
        updateTransform();
    }
    function save() { localStorage.setItem(storageKey, JSON.stringify(state)); updateUI(); }
    function cancelQuest() { scale = oldPos.s; posX = oldPos.x; posY = oldPos.y; container.style.transition = 'transform 0.4s'; updateTransform(); closeAll(); }
    function confirmCreateQuest() {
        const txt = document.getElementById('new-quest-text').value;
        if(txt) state.quests.push({ x: window.tempCoords.x, y: window.tempCoords.y, text: txt });
        document.getElementById('new-quest-text').value = ''; cancelQuest(); save();
    }
    function updateUI() {
        const user = state.members[state.currentUserIndex];
        document.getElementById('current-user-name').innerText = user.name;
        document.getElementById('score-val').innerText = user.points;
        const qBox = document.getElementById('quest-arrows'); qBox.innerHTML = '';
        state.quests.forEach((q, i) => {
            const img = document.createElement('img'); img.src = 'arrow.png'; img.className = 'arrow';
            img.style.left = q.x + 'px'; img.style.top = q.y + 'px';
            img.onclick = e => { e.stopPropagation(); openQuest(i); };
            qBox.appendChild(img);
        });
        const fList = document.getElementById('family-list'); fList.innerHTML = '';
        const sList = document.getElementById('switch-list'); sList.innerHTML = '<h3>🔄 Сменить героя:</h3>';
        state.members.forEach((m, i) => {
            fList.innerHTML += `<div class="member-item"><span>${m.avatar} ${m.name} ${i===state.adminIndex?'👑':''}</span><div><button onclick="setAdmin(${i})" style="border:none;background:none;font-size:24px;">👑</button><button onclick="renameAnyMember(${i})" style="border:none;background:none;font-size:24px;">✏️</button></div></div>`;
            if(i !== state.currentUserIndex) sList.innerHTML += `<button class="btn-choice" onclick="switchProfile(${i})">${m.name}</button>`;
        });
    }
    function addNewMember() { let n = prompt("Имя игрока:"); if(n) { state.members.push({name:n, points:0, avatar:'👤'}); save(); } }
    function renameCurrentPlayer() { let n = prompt("Имя:", state.members[state.currentUserIndex].name); if(n) { state.members[state.currentUserIndex].name = n; save(); } }
    function renameAnyMember(i) { let n = prompt("Имя:", state.members[i].name); if(n) { state.members[i].name = n; save(); } }
    function openAvatarPicker() { document.getElementById('avatarModal').style.display='block'; document.getElementById('overlay').style.display='block'; }
    function setAvatar(e) { state.members[state.currentUserIndex].avatar = e; save(); closeAll(); }
    function openQuest(idx) { window.activeIdx = idx; document.getElementById('taskText').innerText = state.quests[idx].text; document.getElementById('taskModal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
    function completeTask() { state.members[state.currentUserIndex].points += 10; state.quests.splice(window.activeIdx, 1); closeAll(); save(); }
    function closeAll() { document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display='none'; }
    function toggleSidebar() { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
    function switchProfile(i) { state.currentUserIndex = i; closeAll(); save(); }
    function setAdmin(i) { state.adminIndex = i; save(); }

    const emojis = ['🐱','🐶','🦊','🐼','🐨','🐯','🦁','🦄','🐷','🐸','🐮','🦒'];
    document.getElementById('emoji-grid').innerHTML = emojis.map(e => `<span onclick="setAvatar('${e}')" style="font-size:35px; cursor:pointer;">${e}</span>`).join('');
    loadData();
</script>
