<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Семейный Квест</title>
    <style>
        *{box-sizing:border-box}
        body{background:#e0f7fa;font-family:'Comic Sans MS',cursive,sans-serif;margin:0;padding:0;height:100vh;overflow:hidden;font-size:18px}
        .main-wrapper{width:100%;max-width:500px;margin:0 auto;display:flex;flex-direction:column;height:100%}
        .top-bar{display:flex;justify-content:space-between;align-items:stretch;padding:10px;gap:8px}
        .profile-card{background:white;padding:6px 12px;border-radius:30px;border:3px solid #00796b;display:flex;align-items:center;gap:10px;flex:2;position:relative;cursor:pointer}
        .crown-icon{position:absolute;top:-16px;left:5px;font-size:28px;display:none}
        .is-admin .crown-icon{display:block}
        .avatar-circle{width:50px;height:50px;background:#eee;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;border:2px solid #00796b}
        .user-info{flex:1}
        .user-name{font-weight:bold;font-size:20px;display:block}
        .bonus-line{display:flex;align-items:center;gap:6px;font-size:16px}
        .bonus-line button{background:none;border:none;font-size:18px;cursor:pointer}
        .date-display{font-size:12px;color:#00796b;margin-top:4px}
        .btn-group{display:flex;gap:10px;flex:1}
        .menu-btn,.chat-btn{flex:1;border-radius:30px;cursor:pointer;font-weight:bold;font-size:20px;border:3px solid;display:flex;align-items:center;justify-content:center}
        .chat-btn{background:#4caf50;color:white;border-color:#2e7d32}
        .menu-btn{background:#ff9800;color:white;border-color:#e65100}
        .badge{position:absolute;top:-8px;right:-8px;background:red;color:white;border-radius:20px;padding:2px 6px;font-size:11px}
        .map-viewport{flex:1;position:relative;overflow:hidden;background:#cfd8dc;touch-action:none}
        #map-container{position:absolute;width:1000px;height:1000px;transform-origin:0 0}
        .layer{position:absolute;top:0;left:0;width:1000px;height:1000px;pointer-events:none;background-size:contain;background-repeat:no-repeat}
        .furniture-highlight{filter:drop-shadow(0 0 18px #00e5ff) brightness(1.3)!important}
        #quest-arrows{position:absolute;top:0;left:0;width:1000px;height:1000px;pointer-events:none;z-index:60}
        .arrow{position:absolute;width:40px;height:40px;cursor:pointer;animation:bounce 1.5s infinite;transform:translate(-50%,-50%);pointer-events:auto}
        @keyframes bounce{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,-75%)}}
        .overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:500}
        .modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:35px;border:4px solid #00796b;text-align:center;width:85%;max-width:380px;z-index:1000}
        .btn-choice{width:100%;padding:12px;margin:6px 0;border-radius:35px;border:2px solid #00796b;cursor:pointer;font-size:17px;font-weight:bold;background:white}
        .sidebar{position:fixed;right:-550px;top:0;width:85%;max-width:420px;height:100%;background:white;border-left:8px solid #ff9800;transition:0.4s;padding:25px;z-index:1000;overflow-y:auto}
        .sidebar.active{right:0}
        .member-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:2px solid #ffcc80}
        .zoom-controls{position:absolute;bottom:15px;right:15px;display:flex;flex-direction:column;gap:8px;z-index:110}
        .z-btn{width:50px;height:50px;border-radius:18px;border:3px solid #004d40;background:white;font-size:26px;cursor:pointer}
        .status-msg{position:fixed;bottom:10px;left:10px;background:rgba(0,0,0,0.7);color:white;padding:5px 10px;border-radius:18px;font-size:12px;z-index:999}
        .chat-messages{height:280px;overflow-y:auto;background:#f5f5f5;border-radius:18px;padding:10px;margin:8px 0;font-size:13px;text-align:left}
        .chat-message{padding:6px;border-bottom:1px solid #ddd}
        .chat-sender{font-weight:bold;color:#00796b}
        .chat-time{font-size:9px;color:#999;margin-left:6px}
        .event-message{color:#666;font-style:italic}
        .admin-message{background:#ffe0b3;border-left:4px solid #ff9800;padding:6px;margin:4px 0;border-radius:8px}
        .chat-input-area{display:flex;gap:8px;margin-top:8px}
        .chat-input-area input{flex:1;padding:10px;border-radius:35px;border:2px solid #00796b;font-size:15px}
        .select-row{display:flex;gap:8px;margin:8px 0;align-items:center;flex-wrap:wrap}
        .select-row select{flex:2;padding:8px;border-radius:35px;border:2px solid #00796b}
        .double-buttons{display:flex;gap:10px;margin-top:8px}
        .double-buttons button{flex:1}
        .danger-btn{background:#f44336!important;color:white!important}
        input,button{font-family:inherit}
        .small-text{font-size:14px}
    </style>
</head>

function applyZoom(d,cx,cy){let r=view.getBoundingClientRect(),ns=Math.min(Math.max(0.1,scale+d),4);posX=(cx-r.left)-(cx-r.left-posX)*(ns/scale);posY=(cy-r.top)-(cy-r.top-posY)*(ns/scale);scale=ns;updateTransform();}
function btnZoom(d){applyZoom(d,view.offsetWidth/2,view.offsetHeight/2);}
view.addEventListener('touchstart',e=>{if(e.touches.length===1){isDragging=true;startX=e.touches[0].clientX-posX;startY=e.touches[0].clientY-posY;container.style.transition='none';}else if(e.touches.length===2){isDragging=false;initialDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);initialScale=scale;}},{passive:false});
view.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&isDragging){posX=e.touches[0].clientX-startX;posY=e.touches[0].clientY-startY;updateTransform();}else if(e.touches.length===2&&initialDist){let cd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);applyZoom((initialScale*(cd/initialDist))-scale,(e.touches[0].clientX+e.touches[1].clientX)/2,(e.touches[0].clientY+e.touches[1].clientY)/2);}},{passive:false});
view.addEventListener('touchend',()=>{isDragging=false;initialDist=null;});
view.addEventListener('mousedown',e=>{isDragging=true;startX=e.clientX-posX;startY=e.clientY-posY;container.style.transition='none';});
window.addEventListener('mousemove',e=>{if(isDragging){posX=e.clientX-startX;posY=e.clientY-startY;updateTransform();}});
window.addEventListener('mouseup',()=>isDragging=false);
view.addEventListener('wheel',e=>{e.preventDefault();applyZoom(e.deltaY<0?0.1:-0.1,e.clientX,e.clientY);},{passive:false});

view.addEventListener('click',e=>{
    if(state.members.length>0 && state.currentUserId !== state.adminId) return;
    let now=Date.now();
    if(now-lastTap<300){
        let rect=container.getBoundingClientRect();
        let mapX=(e.clientX-rect.left)/scale, mapY=(e.clientY-rect.top)/scale;
        let found=null;
        for(let f of furnitureZones){
            let dx=f.x-mapX, dy=f.y-mapY;
            if(Math.sqrt(dx*dx+dy*dy)<f.r){found=f;break;}
        }
        let zoneName = found ? found.name : "Комната";
        if(found){
            let el=document.getElementById('obj-'+found.id);
            if(el){el.classList.add('furniture-highlight');setTimeout(()=>el.classList.remove('furniture-highlight'),800);}
            showStatus(`📍 ${zoneName}`, false);
        } else { showStatus(`📍 ${zoneName}`, false); }
        oldPos={s:scale,x:posX,y:posY};
        applyZoom(1.4-scale,e.clientX,e.clientY);
        container.style.transition='transform 0.4s ease-out';
        window.tempTarget = { name: zoneName, x: mapX, y: mapY };
        setTimeout(()=>{
            document.getElementById('furniture-hint').innerHTML = `📍 ${zoneName}`;
            document.getElementById('createQuestModal').style.display='block';
            document.getElementById('overlay').style.display='block';
        },350);
    }
    lastTap=now;
});

function updateBadge(){
    let b=document.getElementById('chatBadge');
    if(unreadCount>0){b.style.display='flex';b.innerText=unreadCount>99?'99+':unreadCount;}
    else b.style.display='none';
}
function showStatus(m,e){let el=document.getElementById('statusMsg');el.innerHTML=m;el.style.background=e?'rgba(255,0,0,0.8)':'rgba(0,0,0,0.7)';setTimeout(()=>el.innerHTML='',3000);}
function loadToken(){let t=localStorage.getItem('githubToken');if(t&&t.startsWith('ghp_')){githubToken=t;return true;}return false;}
function saveToken(){let t=document.getElementById('tokenInput').value.trim();if(t&&t.startsWith('ghp_')){githubToken=t;localStorage.setItem('githubToken',t);showStatus('✅ Токен сохранён');closeModal();loadFromGitHub();}else showStatus('❌ Неверный токен',true);}
function skipToken(){showStatus('⚠️ Режим просмотра',true);closeModal();loadFromGitHub();}
async function loadFromGitHub(){document.getElementById('loader').style.display='flex';try{let res=await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${DATA_FILE}?t=${Date.now()}`);if(res.ok){let d=await res.json();state.members=d.members||[];state.quests=d.quests||[];state.messages=d.messages||[];state.adminId=d.adminId||(state.members[0]?.id||null);state.currentUserId=d.currentUserId||(state.members[0]?.id||null);}else{state.members=[];state.quests=[];state.messages=[];state.adminId=null;state.currentUserId=null;}}catch(e){state.members=[];state.quests=[];state.messages=[];state.adminId=null;state.currentUserId=null;}
let sid=localStorage.getItem('currentUserId');if(sid&&state.members.find(m=>m.id===sid))state.currentUserId=sid;else if(state.members.length>0){state.currentUserId=state.members[0].id;localStorage.setItem('currentUserId',state.currentUserId);}
updateUI();renderQuests();updateBadge();document.getElementById('loader').style.display='none';}
async function saveToGitHub(){if(!githubToken){showStatus('⚠️ Нет токена',true);return false;}
let data={members:state.members,quests:state.quests,messages:state.messages,adminId:state.adminId,currentUserId:state.currentUserId,updated:new Date().toISOString()};
try{let content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),url=`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`;
let shaRes=await fetch(url,{headers:{'Authorization':`token ${githubToken}`}}),sha=null;if(shaRes.ok){let ex=await shaRes.json();sha=ex.sha;}
let res=await fetch(url,{method:'PUT',headers:{'Authorization':`token ${githubToken}`,'Content-Type':'application/json'},body:JSON.stringify({message:'Обновление',content:content,sha:sha})});
if(res.ok){showStatus('✅ Сохранено');return true;}else{let err=await res.text();showStatus('❌ '+err,true);return false;}}catch(e){showStatus('❌ '+e.message,true);return false;}}
function renderQuests(){qBox.innerHTML='';if(!state.quests)return;state.quests.forEach((q,i)=>{let img=document.createElement('img');img.src='arrow.png';img.className='arrow';if(q.type==='adult'){img.style.filter='drop-shadow(0 0 5px #ff4444)';}img.style.left=q.x+'px';img.style.top=q.y+'px';img.onclick=e=>{e.stopPropagation();if(state.currentUserId===state.adminId){openAdminTask(i);}else{openQuest(i);}};qBox.appendChild(img);if(q.repeat && q.repeat!=='none'){let mark=document.createElement('div');mark.innerText='🔄';mark.style.position='absolute';mark.style.left=(q.x+12)+'px';mark.style.top=(q.y+12)+'px';mark.style.background='#ff9800';mark.style.borderRadius='50%';mark.style.width='16px';mark.style.height='16px';mark.style.fontSize='10px';mark.style.display='flex';mark.style.alignItems='center';mark.style.justifyContent='center';mark.style.color='white';mark.style.pointerEvents='none';qBox.appendChild(mark);}if(q.type==='adult'){let star=document.createElement('div');star.innerText='⭐';star.style.position='absolute';star.style.left=(q.x-12)+'px';star.style.top=(q.y-12)+'px';star.style.fontSize='14px';star.style.pointerEvents='none';qBox.appendChild(star);}});}
function updateUI(){let user=state.members.find(m=>m.id===state.currentUserId)||state.members[0];if(!user&&state.members.length===0){document.getElementById('current-user-name').innerText='Нет игроков';document.getElementById('score-val').innerText='0';document.getElementById('current-avatar').innerText='👤';document.getElementById('p-card').classList.remove('is-admin');return;}
document.getElementById('current-user-name').innerText=user.name;document.getElementById('score-val').innerText=user.points;document.getElementById('current-avatar').innerText=user.avatar;document.getElementById('p-card').classList.toggle('is-admin',state.currentUserId===state.adminId);
let fl=document.getElementById('family-list');if(fl){fl.innerHTML='';state.members.forEach(m=>{fl.innerHTML+=`<div class="member-item"><span>${m.avatar} ${m.name} ${m.role==='adult'?'🔞':''} ${m.id===state.adminId?'👑':''} (⭐️ ${m.points})</span><div><button onclick="setAdmin('${m.id}')" style="font-size:20px;">👑</button><button onclick="renameAnyMember('${m.id}')" style="font-size:20px;">✏️</button><button onclick="toggleRole('${m.id}')" style="font-size:18px;background:none;border:none;cursor:pointer;">${m.role==='adult'?'👶':'🔞'}</button></div></div>`;});}
let sl=document.getElementById('switch-list');if(sl){sl.innerHTML='<h3>🔄 Сменить героя:</h3>';state.members.forEach(m=>{if(m.id!==state.currentUserId)sl.innerHTML+=`<button class="btn-choice" onclick="switchProfile('${m.id}')">${m.name} ${m.role==='adult'?'🔞':''} (⭐️ ${m.points})</button>`;});}}
async function toggleRole(id){let u=state.members.find(m=>m.id===id);if(u){u.role=u.role==='adult'?'child':'adult';await saveToGitHub();updateUI();await addChatMessage(`🔄 ${u.name} теперь ${u.role==='adult'?'взрослый':'ребёнок'}`,true);}}
function openPlayerSelector(){if(!state.members.length)return;let html='';state.members.forEach(m=>{html+=`<div class="member-item" style="cursor:pointer" onclick="selectPlayer('${m.id}')"><span>${m.avatar} ${m.name} ${m.role==='adult'?'🔞':''}</span><span>⭐️ ${m.points}</span></div>`;});document.getElementById('player-list-modal').innerHTML=html;document.getElementById('playerSelectModal').style.display='block';document.getElementById('overlay').style.display='block';}
function selectPlayer(id){if(id===state.currentUserId){closeModal();return;}state.currentUserId=id;localStorage.setItem('currentUserId',id);saveToGitHub();updateUI();closeModal();showStatus(`✅ Теперь вы ${state.members.find(m=>m.id===id)?.name}`);addChatMessage(`🔄 ${state.members.find(m=>m.id===id)?.name} теперь играет`,true);}
function openTransferBonus(){let cp=state.members.find(m=>m.id===state.currentUserId);let op=state.members.filter(m=>m.id!==state.currentUserId);if(op.length===0){showStatus('❌ Нет других игроков',true);closeModal();return;}
let html='';op.forEach(p=>{html+=`<div class="member-item" style="cursor:pointer" onclick="transferTo('${p.id}')"><span>${p.avatar} ${p.name}</span><span>⭐️ ${p.points}</span></div>`;});document.getElementById('transfer-list').innerHTML=html;document.getElementById('transferModal').style.display='block';document.getElementById('overlay').style.display='block';}
async function transferTo(id){let cp=state.members.find(m=>m.id===state.currentUserId);let target=state.members.find(m=>m.id===id);let amt=prompt(`Сколько передать ${target.name}? (У вас ${cp.points})`,'10');if(amt){let a=parseInt(amt);if(a>cp.points){showStatus(`❌ Недостаточно бонусов`,true);return;}if(a<=0){showStatus('❌ Сумма >0',true);return;}
cp.points-=a;target.points+=a;await saveToGitHub();updateUI();addChatMessage(`💰 ${cp.name} передал(а) ${a}⭐️ игроку ${target.name}!`,true);showStatus(`✅ Передано ${a}⭐️`);closeModal();closeModal();}}
async function confirmCreateQuest(){let txt=document.getElementById('new-quest-text').value,reward=parseInt(document.getElementById('quest-reward').value)||10,qtype=document.getElementById('quest-type').value,repeat=document.getElementById('quest-repeat').value;if(txt&&window.tempTarget){let q={id:Date.now().toString(),createdAt:new Date().toISOString(),x:window.tempTarget.x,y:window.tempTarget.y,text:txt,reward:reward,target:window.tempTarget.name,type:qtype,repeat:repeat,lastCompletedAt:null};state.quests.push(q);document.getElementById('new-quest-text').value='';document.getElementById('quest-reward').value='10';document.getElementById('quest-type').value='normal';document.getElementById('quest-repeat').value='none';await saveToGitHub();renderQuests();let author=state.members.find(m=>m.id===state.currentUserId);let rt=repeat!=='none'?` (повторяется ${formatRepeat(repeat)})`:'';let typeText=qtype==='adult'?'🔞 Взрослое ':'🟢 Обычное ';addChatMessage(`📋 ${author?.name} создал(а) ${typeText}задание: "${txt}" (+${reward}⭐️) для "${window.tempTarget.name}"${rt}`,true);}cancelQuest();}
function openEditQuest(idx){currentEditIndex=idx;let q=state.quests[idx];document.getElementById('edit-quest-text').value=q.text;document.getElementById('edit-quest-reward').value=q.reward;document.getElementById('edit-quest-type').value=q.type||'normal';document.getElementById('edit-quest-repeat').value=q.repeat||'none';document.getElementById('editQuestModal').style.display='block';document.getElementById('overlay').style.display='block';}
async function saveEditQuest(){if(currentEditIndex!==null&&state.quests[currentEditIndex]){let q=state.quests[currentEditIndex];q.text=document.getElementById('edit-quest-text').value;q.reward=parseInt(document.getElementById('edit-quest-reward').value)||10;q.type=document.getElementById('edit-quest-type').value;q.repeat=document.getElementById('edit-quest-repeat').value;await saveToGitHub();renderQuests();updateUI();addChatMessage(`✏️ Админ изменил задание: "${q.text}"`,true);closeModal();}}
async function deleteQuest(){if(currentEditIndex!==null&&confirm('Удалить задание?')){state.quests.splice(currentEditIndex,1);await saveToGitHub();renderQuests();updateUI();addChatMessage(`🗑 Админ удалил задание`,true);closeModal();}}
function openAdminTask(idx){currentTaskIndex=idx;let q=state.quests[idx];document.getElementById('adminTaskText').innerHTML=q.text;document.getElementById('adminTaskReward').innerHTML=`⭐️ Награда: +${q.reward} бонусов`;document.getElementById('adminTaskTypeMsg').innerHTML=q.type==='adult'?'🔞 Только для взрослых':'';document.getElementById('adminTaskRecurringMsg').innerHTML=q.repeat && q.repeat!=='none'?`🔄 ${formatRepeat(q.repeat)}`:'';document.getElementById('adminTaskModal').style.display='block';document.getElementById('overlay').style.display='block';}
function openEditFromAdmin(){if(currentTaskIndex!==null){closeAll();openEditQuest(currentTaskIndex);}}
function openQuest(idx){currentTaskIndex=idx;let q=state.quests[idx];document.getElementById('taskText').innerHTML=q.text;document.getElementById('taskReward').innerHTML=`⭐️ Награда: +${q.reward} бонусов`;document.getElementById('taskTypeMsg').innerHTML=q.type==='adult'?'🔞 Только для взрослых':'';document.getElementById('taskRecurringMsg').innerHTML=q.repeat && q.repeat!=='none'?`🔄 ${formatRepeat(q.repeat)}`:'';document.getElementById('taskModal').style.display='block';document.getElementById('overlay').style.display='block';}
async function completeTask(){if(currentTaskIndex!==null&&state.quests[currentTaskIndex]){let q=state.quests[currentTaskIndex],p=state.members.find(m=>m.id===state.currentUserId);if(p){if(q.type==='adult' && p.role!=='adult'){showStatus(`❌ Это задание только для взрослых!`,true);closeAll();return;}p.points+=q.reward;if(q.repeat && q.repeat!=='none'){q.lastCompletedAt=new Date().toISOString();addChatMessage(`🔄 Задание "${q.text}" выполнено! Следующее появление через ${formatRepeat(q.repeat)}`,true);}else{state.quests.splice(currentTaskIndex,1);}await saveToGitHub();renderQuests();updateUI();showStatus(`✅ +${q.reward} бонусов!`);addChatMessage(`🎉 ${p.name} выполнил(а) "${q.text}" и получил(а) +${q.reward}⭐️`,true);}}closeAll();}
async function addChatMessage(text,isEvent=false,isAdmin=false){let sender=state.members.find(m=>m.id===state.currentUserId);let time=new Date().toLocaleTimeString();state.messages.push({id:Date.now().toString(),sender:sender?.name||"Система",text:text,time:time,isEvent:isEvent,isAdmin:isAdmin});if(state.messages.length>200)state.messages=state.messages.slice(-200);await saveToGitHub();unreadCount++;updateBadge();if(document.getElementById('chatModal').style.display==='flex'){let cd=document.getElementById('chatMessages');let div=document.createElement('div');div.className='chat-message';if(isAdmin)div.classList.add('admin-message');else if(isEvent)div.classList.add('event-message');div.innerHTML=`<span class="chat-sender">${sender?.name||"Система"}:</span> ${text}<span class="chat-time">${time}</span>`;cd.appendChild(div);cd.scrollTop=cd.scrollHeight;}}
async function sendChatMessage(){let inp=document.getElementById('chatInput'),t=inp.value.trim();if(t){await addChatMessage(t,false,false);inp.value='';let cd=document.getElementById('chatMessages');if(cd){let div=document.createElement('div');div.className='chat-message';let sender=state.members.find(m=>m.id===state.currentUserId);div.innerHTML=`<span class="chat-sender">${sender?.name||"Аноним"}:</span> ${t}<span class="chat-time">${new Date().toLocaleTimeString()}</span>`;cd.appendChild(div);cd.scrollTop=cd.scrollHeight;}}}
async function openChat(){await loadFromGitHub();let cd=document.getElementById('chatMessages');if(cd){cd.innerHTML='';state.messages.slice(-50).forEach(m=>{let div=document.createElement('div');div.className='chat-message';if(m.isAdmin)div.classList.add('admin-message');else if(m.isEvent)div.classList.add('event-message');div.innerHTML=`<span class="chat-sender">${m.sender}:</span> ${m.text}<span class="chat-time">${m.time}</span>`;cd.appendChild(div);});cd.scrollTop=cd.scrollHeight;}unreadCount=0;updateBadge();document.getElementById('chatModal').style.display='flex';document.getElementById('overlay').style.display='block';}
function closeChat(){document.getElementById('chatModal').style.display='none';closeAll();}
async function requestCash(){let cp=state.members.find(m=>m.id===state.currentUserId);if(!cp)return;let a=parseInt(prompt(`Сколько бонусов обменять? (У вас ${cp.points})`,'10'));if(a>0&&a<=cp.points){await addChatMessage(`💵 ${cp.name} ЗАПРАШИВАЕТ ОБМЕН ${a}⭐️ на реальные деньги!`,true,true);showStatus(`✅ Запрос отправлен админу в чат!`);alert(`✅ Запрос на обмен ${a}⭐️ отправлен!`);}else showStatus('❌ Неверная сумма',true);closeModal();}
async function addNewMember(){let n=prompt("Имя игрока:");if(n){let newId=Date.now().toString();let role=confirm("Это взрослый? (ОК - взрослый, Отмена - ребёнок)")?'adult':'child';state.members.push({id:newId,name:n,points:0,avatar:'👤',role:role});if(state.members.length===1){state.adminId=newId;state.currentUserId=newId;localStorage.setItem('currentUserId',newId);}await saveToGitHub();updateUI();addChatMessage(`👋 Новый игрок ${n} (${role==='adult'?'взрослый':'ребёнок'}) присоединился!`,true);}}
async function renameAnyMember(id){let u=state.members.find(m=>m.id===id),n=prompt("Новое имя:",u?.name);if(n&&u){let old=u.name;u.name=n;await saveToGitHub();updateUI();addChatMessage(`✏️ Игрок ${old} теперь ${n}`,true);}}
async function renameCurrentPlayer(){let u=state.members.find(m=>m.id===state.currentUserId),n=prompt("Ваше имя:",u?.name);if(n&&u){let old=u.name;u.name=n;await saveToGitHub();updateUI();addChatMessage(`✏️ Игрок ${old} теперь ${n}`,true);}}
function openAvatarPicker(){document.getElementById('avatarModal').style.display='block';document.getElementById('overlay').style.display='block';}
async function setAvatar(emoji){let u=state.members.find(m=>m.id===state.currentUserId);if(u){u.avatar=emoji;await saveToGitHub();updateUI();addChatMessage(`🎭 ${u.name} сменил(а) аватар на ${emoji}`,true);}closeAll();}
function cancelQuest(){scale=oldPos.s;posX=oldPos.x;posY=oldPos.y;container.style.transition='transform 0.4s';updateTransform();closeAll();}
function closeModal(){document.querySelectorAll('.modal:not(#chatModal)').forEach(m=>m.style.display='none');document.getElementById('overlay').style.display='none';}
function closeAll(){document.querySelectorAll('.modal').forEach(m=>m.style.display='none');document.getElementById('sidebar').classList.remove('active');document.getElementById('overlay').style.display='none';}
function toggleSidebar(){document.getElementById('sidebar').classList.add('active');document.getElementById('overlay').style.display='block';}
async function switchProfile(id){state.currentUserId=id;localStorage.setItem('currentUserId',id);await saveToGitHub();updateUI();closeAll();addChatMessage(`🔄 Теперь играет ${state.members.find(m=>m.id===id)?.name}`,true);}
async function setAdmin(id){state.adminId=id;await saveToGitHub();updateUI();addChatMessage(`👑 Права админа переданы ${state.members.find(m=>m.id===id)?.name}`,true);}
const emojis=['🐱','🐶','🦊','🐼','🐨','🐯','🦁','🦄','🐷','🐸','🐮','🦒'];
document.getElementById('emoji-grid').innerHTML=emojis.map(e=>`<span onclick="setAvatar('${e}')" style="font-size:36px;cursor:pointer;">${e}</span>`).join('');
if(!loadToken()){document.getElementById('tokenModal').style.display='block';document.getElementById('overlay').style.display='block';}else loadFromGitHub();
setTimeout(()=>{posX=(view.offsetWidth-1000*0.4)/2;posY=(view.offsetHeight-1000*0.4)/2;scale=0.4;updateTransform();},600);
</script>
