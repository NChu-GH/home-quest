<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Семейный Квест - Диагностика</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="result" style="padding: 20px; font-family: sans-serif; white-space: pre-wrap;">Загрузка...</div>

    <script>
        // ВАШИ ДАННЫЕ - ПРОВЕРЬТЕ ЕЩЕ РАЗ
        const SUPABASE_URL = 'https://qyemgoxxlryqezuvmerw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_huHz5Ox00GXUNYW-ncHCRw_RU-49Kn6';
        
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);
        const resultDiv = document.getElementById('result');

        async function finalTest() {
            resultDiv.innerHTML = 'Отправляю запрос к таблице players...\n';
            
            // 1. Пробуем просто прочитать данные
            const { data, error } = await supabase.from('players').select('*');
            
            if (error) {
                resultDiv.innerHTML += `❌ ОШИБКА ПРИ ЧТЕНИИ:\n${error.message}\n\n`;
                resultDiv.innerHTML += `Это значит, что RLS скорее всего ВКЛЮЧЕН.\n`;
                resultDiv.innerHTML += `Зайдите в Table Editor Supabase, найдите таблицу players и ОТКЛЮЧИТЕ RLS.`;
                return;
            }
            
            resultDiv.innerHTML += `✅ УСПЕХ! Данные из таблицы получены:\n${JSON.stringify(data, null, 2)}\n\n`;
            resultDiv.innerHTML += `Теперь вы можете использовать полную версию приложения.`;
        }
        
        finalTest();
    </script>
</body>
</html>
